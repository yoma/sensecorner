<style>
:root{
  --accent:#B11F1F;
  --accent-soft:#FAEAEA;
  --bg:#F7F5F2;
  --text:#1E1E1E;

  --border:rgba(40,40,40,.16);

}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
.app{

}
.topbar{
  position:sticky;

  z-index:20;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  background:rgba(247,245,242,.78);
  border-bottom:0.5px solid rgba(35,35,35,.14);
  margin:0 -14px;
  padding:14px 14px 0;
}
.top-row{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;

}
.top-title{

  font-family:'Lora',serif;

.hub-badge{

.quick-nav{

}
.quick-nav-btn{

}
.tabs{

}
.tab-btn{
  flex:1;

  font-size:14px;
  font-weight:700;
  padding:10px 8px;
  cursor:pointer;
}
.tab-btn.active{
  color:var(--accent);

}
.onboarding-shell{

.onboarding-actions{

}
.btn{
  border:none;
  border-radius:12px;

.btn-primary{background:var(--accent);color:#fff}

.tab-panel{display:none;padding-top:14px}

.field{width:100%;border:0.5px solid #D9CFCB;border-radius:10px;padding:9px 10px;font:inherit;font-size:14px;margin-top:10px}

.qcat{

.qcat-head{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer}
.qcat-title{font-size:14px;font-weight:700}

.save-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.save-ind{font-size:12px;color:#2E7D32}
.photo-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}
.thumb{
  aspect-ratio:1/1;border-radius:12px;border:0.5px solid #D9CCCA;background:#F4EFED;

}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb-add{
  width:100%;height:100%;border:none;background:#F8EFED;color:#A8493F;cursor:pointer;

}
.thumb-del{

.badge-fs{background:#1a7a45}

.entry-actions{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:8px}

.more-btn{

}
.status-banner{
  border:0.5px solid #E5D7D4;border-radius:12px;background:#FFF9F8;padding:10px;font-size:12px;color:#6B7078;
}
.pill-row{display:flex;gap:8px;overflow:auto;padding:8px 0}
.pill{
  border:0.5px solid #DEC8C4;border-radius:999px;background:#fff;padding:6px 10px;white-space:nowrap;
  font-size:12px;font-weight:700;cursor:pointer;color:#6B4E49;
}
.pill.active{background:#FCECEA;color:#B24134;border-color:#E7B9B1}
.ins-card{
  border:0.5px solid #E3D8D5;border-radius:14px;background:#fff;padding:12px;margin-top:10px;
}
.ins-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.ins-title{font-size:14px;font-weight:800}
.scope-badge{font-size:10px;font-weight:800;border-radius:999px;padding:4px 8px;color:#fff}
.scope-all{background:#8B3A2E}
.scope-ds{background:#1a56b0}
.scope-fs{background:#1a7a45}
.scope-gen{background:#6B7280}

.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}

.ins-actions{display:flex;gap:8px;margin-top:10px}
.delta-row{display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:8px;margin-top:8px}
.mini-track{height:6px;background:#EEE7E4;border-radius:999px;overflow:hidden}
.mini-fill{height:100%;background:#B74D3F;border-radius:999px}
.new-dot{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;border-radius:999px;background:#B11F1F;color:#fff;font-size:10px;font-weight:800;margin-left:6px;
}
</style>

<body>

  <header class="topbar">

<input id="photoPicker" type="file" accept="image/*" style="display:none">

<script>
const SURL='https://ghuqjtdrkwssyqvcubcd.supabase.co';
const SKEY='sb_publishable_ShIeY18JCYiH8fyXm_anHw_Y1jP2skq';
var PK=['gevoeligheid','openheid','humor','directheid','avontuur','stabiliteit','vertrouwen','communicatie','onafhankelijkheid'];
var PL=['Gevoeligheid','Openheid','Humor','Directheid','Avontuur','Stabiliteit','Vertrouwen','Communicatie','Onafhankelijkheid'];
var OWN_CATS=[
  {id:'karakter',title:'Wie ben jij',icon:'🧠',prompts:[
    'Wie ben jij als persoon, los van wat je doet?',
    'Wat zijn je sterkste kanten en je valkuilen?',
    'Hoe ga je om met stress of conflict?',
    'Ben je meer van routine of verandering?'
  ]},
  {id:'interesses',title:'Energie & Levensstijl',icon:'⚡',prompts:[
    'Wat geeft jou energie in het dagelijks leven?',
    'Wat kost je vooral energie?',
    'Laad je op met mensen of met stilte?',
    'Welke rol speelt humor in je leven?'
  ]},
  {id:'relatie',title:'Verbinding & Behoeften',icon:'🔗',prompts:[
    'Hoe bouw jij vertrouwen op in relaties?',
    'Wat heb jij nodig van mensen dichtbij?',
    'Welke oude patronen zie je terug in contact?',
    'Wat zijn je duidelijke dealbreakers?'
  ]},
  {id:'gevoels',title:'Gevoelswereld & Richting',icon:'❤️',prompts:[
    'Hoe makkelijk deel jij gevoelens met anderen?',
    'Hoe ga jij om met sterke emoties?',
    'Wat drijft jou diep vanbinnen?',
    'Wat geeft je leven betekenis?'
  ]}
];

var HUB_KEY='ownsense_hub_profile_v2';
var HANDOFF_KEY='ownsense_handoff_v1';
var returnToApp='';
var SB_URL='';
var SB_ANON='';
var sb=null;
var hubState={
  display_name:'',
  photo_url:'',
  photo_urls:[],
  foto_analyse:'',
  props:{},
  categories:{},
  updated_at:new Date().toISOString(),
  cat_updated:{},
  insight_all:'',
  insight_ds:'',
  insight_fs:'',
  insight_gen:'',
  last_insight_count:0,
  last_insight_at:'',
  insight_scores_snap:{}
};
var ownTimeline=[];
var insightMeta={
  all:{tags:[],updated_at:''},
  ds:{tags:[],updated_at:''},
  fs:{tags:[],updated_at:''},
  gen:{tags:[],updated_at:''}
};
var activeInsightScope='all';
var hasNewInsightBadge=false;

PK.forEach(function(k){hubState.props[k]=0;});
OWN_CATS.forEach(function(c){
  hubState.categories[c.id]={a0:'',a1:'',a2:'',a3:''};
});

var tabButtons=document.querySelectorAll('[data-tab]');
var panels={
  profiel:document.getElementById('tab-profiel'),
  tijdlijn:document.getElementById('tab-tijdlijn'),
  inzichten:document.getElementById('tab-inzichten')
};

function activateTab(tabId){
  tabButtons.forEach(function(btn){
    btn.classList.toggle('active',btn.getAttribute('data-tab')===tabId);
  });
  Object.keys(panels).forEach(function(k){
    panels[k].classList.toggle('active',k===tabId);
  });
}

tabButtons.forEach(function(btn){
  btn.addEventListener('click',function(){
    activateTab(btn.getAttribute('data-tab'));
  });
});

function safeJsonParse(raw){
  try{return JSON.parse(raw);}catch(e){return null;}
}
function normTxt(v){
  return String(v||'').toLowerCase().replace(/[^a-z0-9à-ÿ]+/g,' ').trim();
}
function mergeMirrorEntriesIntoCategories(entries){
  if(!Array.isArray(entries)||!entries.length)return;
  if(!hubState.categories||typeof hubState.categories!=='object')hubState.categories={};
  OWN_CATS.forEach(function(cat){
    if(!hubState.categories[cat.id])hubState.categories[cat.id]={a0:'',a1:'',a2:'',a3:''};
    cat.prompts.forEach(function(prompt,idx){
      var key='a'+idx;
      if(String(hubState.categories[cat.id][key]||'').trim())return;
      var pNorm=normTxt(prompt);
      var hit=entries.find(function(en){
        var label=normTxt(en&&en.label);
        return label&&pNorm&&(label===pNorm||label.indexOf(pNorm)>=0||pNorm.indexOf(label)>=0);
      });
      if(hit&&String(hit.value||'').trim()){
        hubState.categories[cat.id][key]=String(hit.value).trim();
      }
    });
  });
}
function initQuickNav(){
  try{
    var qp=new URLSearchParams(window.location.search||'');
    returnToApp=String(qp.get('returnTo')||'').trim();
  }catch(_e){returnToApp='';}
  var ownHomeBtn=document.getElementById('ownHomeBtn');
  var backAppBtn=document.getElementById('backAppBtn');
  var cornerBtn=document.getElementById('cornerBtn');
  if(ownHomeBtn){
    ownHomeBtn.onclick=function(){window.location.href='ownsense.html';};
  }
  if(backAppBtn&&returnToApp){
    backAppBtn.style.display='inline-flex';
    backAppBtn.onclick=function(){window.location.href=returnToApp;};
  }
  if(cornerBtn){
    cornerBtn.onclick=function(){window.location.href='sensecorner.html';};
  }
}

function initSupabase(){
  try{
    if(sb)return sb;
    SB_URL=window.SUPABASE_URL||localStorage.getItem('sc_supabase_url')||SURL||'';
    SB_ANON=window.SUPABASE_ANON_KEY||localStorage.getItem('sc_supabase_anon_key')||SKEY||'';
    if(window.supabase&&SB_URL&&SB_ANON){
      sb=window.supabase.createClient(SB_URL,SB_ANON);
    }
  }catch(e){}
  return sb;
}

function getAnthropicKey(){
  return localStorage.getItem('anthropic_api_key')||localStorage.getItem('ds_ak')||'';
}

function stripHtml(s){
  return String(s||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
}

function detectSourceFromMsg(msg){
  var t=(stripHtml(msg.html||msg.content||'')+' '+String(msg.app_source||'')).toLowerCase();
  if(t.indexOf('datesense')>=0||t.indexOf('date')>=0)return'ds';
  if(t.indexOf('familysense')>=0||t.indexOf('family')>=0||t.indexOf('gezin')>=0)return'fs';
  return'gen';
}

function detectTopic(msgText){
  var t=String(msgText||'').toLowerCase();
  if(/werk|job|carri|stress/.test(t))return'werk & stress';
  if(/liefde|date|relatie|partner/.test(t))return'relatie';
  if(/famil|kind|ouder|gezin/.test(t))return'familie';
  if(/grens|conflict|ruzie/.test(t))return'grenzen';
  if(/energie|moe|uitgeput|rust/.test(t))return'energie';
  return'algemeen';
}

function scopeLabel(scope){
  if(scope==='ds')return'DateSense';
  if(scope==='fs')return'FamilySense';
  if(scope==='gen')return'Algemeen';
  return'Alle';
}

function monthKey(date){
  var d=new Date(date);
  if(isNaN(d.getTime()))return'Onbekend';
  return d.toLocaleDateString('nl-BE',{month:'long',year:'numeric'});
}

function fmtDateTime(date){
  var d=new Date(date);
  if(isNaN(d.getTime()))return'';
  return d.toLocaleDateString('nl-BE',{day:'2-digit',month:'2-digit',year:'numeric'})+' · '+d.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'});
}

async function uploadPhotoToStorage(file){
  var client=initSupabase();
  if(!client||!file)return '';
  var u=await client.auth.getUser();
  var uid=u&&u.data&&u.data.user&&u.data.user.id?u.data.user.id:'';
  if(!uid)return '';
  var ext=((file.name||'x.jpg').split('.').pop()||'jpg').toLowerCase();
  var path=uid+'/ownsense/'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'.'+ext;
  var up=await client.storage.from('sense-photos').upload(path,file,{upsert:true,contentType:file.type||'image/jpeg'});
  if(up&&up.error)throw new Error(up.error.message||'Upload mislukt');
  var pub=client.storage.from('sense-photos').getPublicUrl(path);
  var url=pub&&pub.data&&pub.data.publicUrl?String(pub.data.publicUrl):'';
  return url;
}

async function loadOwnFromSupabase(){
  var client=initSupabase();
  if(!client)return;
  try{
    var auth=await client.auth.getUser();
    var user=auth&&auth.data&&auth.data.user;
    if(!user)return;
    var res=await client.from('sense_profiles').select('*').eq('user_id',user.id).eq('name','OWN Sense').maybeSingle();
    if(res&&res.data){
      var row=res.data;
      var p=row.props||{};
      var pm=(p.meta&&typeof p.meta==='object')?p.meta:{};
      hubState.display_name=String((row.meta&&row.meta.display_name)||pm.display_name||p.display_name||hubState.display_name||'');
      hubState.photo_urls=Array.isArray(row.foto_urls)?row.foto_urls.slice(0,4):Array.isArray(p.foto_urls)?p.foto_urls.slice(0,4):hubState.photo_urls;
      hubState.foto_analyse=String(row.foto_analyse||p.foto_analyse||hubState.foto_analyse||'');
      if(!hubState.photo_url&&hubState.photo_urls.length)hubState.photo_url=String(hubState.photo_urls[0]||'');
      if(!hubState.photo_url)hubState.photo_url=String(pm.photo_url||'').trim();
      if(p.categories&&typeof p.categories==='object'){
        hubState.categories=Object.assign({},hubState.categories,p.categories);
      }
      PK.forEach(function(k){
        if(typeof p[k]==='number')hubState.props[k]=p[k];
      });
      hubState.insight_all=String(row.insight_all||hubState.insight_all||'');
      hubState.insight_ds=String(row.insight_ds||hubState.insight_ds||'');
      hubState.insight_fs=String(row.insight_fs||hubState.insight_fs||'');
      hubState.insight_gen=String(row.insight_gen||hubState.insight_gen||'');

      hubState.insight_scores_snap=(row.insight_scores_snap&&typeof row.insight_scores_snap==='object')?row.insight_scores_snap:(hubState.insight_scores_snap||{});

}

async function loadOwnTimelineFromSupabase(){
  var client=initSupabase();
  if(!client)return;
  try{
    var auth=await client.auth.getUser();
    var user=auth&&auth.data&&auth.data.user;
    if(!user)return;
    async function fetchBy(field){
      var q=client.from('sense_messages')
        .select('*')
        .eq('user_id',user.id)
        .eq(field,'OWN Sense')
        .order('created_at',{ascending:false})
        .limit(500);
      var res=await q;
      if(res&&res.error)throw new Error(res.error.message||'timeline fetch failed');
      return Array.isArray(res&&res.data)?res.data:[];
    }
    var rows=[];
    try{rows=await fetchBy('profile_name');}catch(_e){}
    if(!rows.length){
      try{rows=await fetchBy('dossier');}catch(_e2){}
    }
    if(rows.length||!ownTimeline.length)ownTimeline=rows;
    renderTimelineTab();
  }catch(e){}
}

async function saveOwnToSupabase(){
  var client=initSupabase();
  if(!client)return;
  try{
    var auth=await client.auth.getUser();
    var user=auth&&auth.data&&auth.data.user;
    if(!user)return;
    var propsOut={
      _v:1,
      categories:hubState.categories,
      foto_urls:hubState.photo_urls,
      foto_analyse:hubState.foto_analyse
    };
    PK.forEach(function(k){propsOut[k]=hubState.props[k]||0;});
    var payload={
      user_id:user.id,
      name:'OWN Sense',
      bericht_count:Math.max(hubState.last_insight_count||0,0),
      last_active:new Date().toISOString(),
      props:propsOut,
      foto_urls:hubState.photo_urls,
      foto_analyse:hubState.foto_analyse,
      insight_all:hubState.insight_all||null,
      insight_ds:hubState.insight_ds||null,
      insight_fs:hubState.insight_fs||null,

    };

function loadHubState(){
  var local=safeJsonParse(localStorage.getItem(HUB_KEY)||'');
  if(local&&typeof local==='object'){
    hubState=Object.assign({},hubState,local);
  }else{
    var old=safeJsonParse(localStorage.getItem('ownsense_profile_v1')||'');
    if(old&&Array.isArray(old.answers)){
      hubState.display_name=String(old.name||'').trim();
      hubState.photo_url=String(old.photo||'').trim();
    }
  }
  var mirror=safeJsonParse(localStorage.getItem('ownsense_datesense_v1')||'');
  if(mirror&&Array.isArray(mirror.entries)){
    mergeMirrorEntriesIntoCategories(mirror.entries);
    if(!hubState.display_name)hubState.display_name=String(mirror.display_name||'').trim();
    if(!hubState.photo_url)hubState.photo_url=String(mirror.photo_url||'').trim();
    if(!hubState.photo_url&&Array.isArray(hubState.photo_urls)&&hubState.photo_urls.length){
      hubState.photo_url=String(hubState.photo_urls[0]||'').trim();
    }
  }
  var handoff=safeJsonParse(localStorage.getItem(HANDOFF_KEY)||'');
  if(handoff&&typeof handoff==='object'){
    if(!hubState.display_name)hubState.display_name=String(handoff.display_name||'').trim();
    if(!hubState.photo_url)hubState.photo_url=String(handoff.photo_url||'').trim();
    if(Array.isArray(handoff.photo_urls)&&handoff.photo_urls.length&&!hubState.photo_urls.length){
      hubState.photo_urls=handoff.photo_urls.slice(0,4).map(function(u){return String(u||'').trim();}).filter(Boolean);
      if(!hubState.photo_url&&hubState.photo_urls.length)hubState.photo_url=hubState.photo_urls[0];
    }
    if(handoff.categories&&typeof handoff.categories==='object'){
      hubState.categories=Object.assign({},handoff.categories,hubState.categories||{});
    }
    if(handoff.props&&typeof handoff.props==='object'){
      PK.forEach(function(k){
        var v=parseInt(handoff.props[k],10);
        if(!isNaN(v)&&v>0)hubState.props[k]=v;
      });
    }
    if(Array.isArray(handoff.timeline)&&handoff.timeline.length&&!ownTimeline.length){
      ownTimeline=handoff.timeline.slice();
    }
  }
  if(!hubState.props)hubState.props={};
  PK.forEach(function(k){
    if(typeof hubState.props[k]!=='number')hubState.props[k]=0;
  });
  if(!Array.isArray(hubState.photo_urls))hubState.photo_urls=[];
  hubState.photo_urls=hubState.photo_urls.slice(0,4).map(function(u){return String(u||'');}).filter(Boolean);
  hubState.foto_analyse=String(hubState.foto_analyse||'');
  if(!hubState.categories)hubState.categories={};
  OWN_CATS.forEach(function(c){
    var cat=hubState.categories[c.id]||{};
    hubState.categories[c.id]={
      a0:String(cat.a0||''),
      a1:String(cat.a1||''),
      a2:String(cat.a2||''),
      a3:String(cat.a3||'')
    };
  });
  if(!hubState.cat_updated||typeof hubState.cat_updated!=='object')hubState.cat_updated={};
  hubState.insight_all=String(hubState.insight_all||'');
  hubState.insight_ds=String(hubState.insight_ds||'');
  hubState.insight_fs=String(hubState.insight_fs||'');
  hubState.insight_gen=String(hubState.insight_gen||'');
  hubState.last_insight_count=parseInt(hubState.last_insight_count,10)||0;
  hubState.last_insight_at=String(hubState.last_insight_at||'');
  if(!hubState.insight_scores_snap||typeof hubState.insight_scores_snap!=='object')hubState.insight_scores_snap={};
}

function calcPropsFromCategories(){
  var text='';
  var filledCount=0;
  OWN_CATS.forEach(function(c){
    var cat=hubState.categories[c.id]||{};
    ['a0','a1','a2','a3'].forEach(function(k){
      var v=String(cat[k]||'').trim();
      if(v)filledCount++;
      text+=' '+v.toLowerCase();
    });
  });
  if(!filledCount){
    var hasSavedProps=PK.some(function(k){return (parseInt(hubState.props[k],10)||0)>0;});
    if(!hasSavedProps){
      PK.forEach(function(k){hubState.props[k]=0;});
      return false;
    }
    return true;
  }
  function has(words){return words.some(function(w){return text.indexOf(w)>=0;});}
  hubState.props.gevoeligheid=has(['gevoel','emot','gevoelig','geraakt'])?74:36;
  hubState.props.openheid=has(['open','eerlijk','deel','kwets'])?72:38;
  hubState.props.humor=has(['humor','lachen','grap'])?68:34;
  hubState.props.directheid=has(['direct','duidelijk','rechtdoor'])?70:40;
  hubState.props.avontuur=has(['avontuur','nieuw','verandering','spontaan'])?69:37;
  hubState.props.stabiliteit=has(['rust','routine','structuur','zeker'])?73:42;
  hubState.props.vertrouwen=has(['vertrouwen','veilig','trouw'])?75:39;
  hubState.props.communicatie=has(['communicatie','gesprek','praten','uitspreken'])?71:41;
  hubState.props.onafhankelijkheid=has(['zelfstandig','eigen','ruimte'])?72:40;
  return true;
}
function hasMeaningfulOwnData(){
  var qFilled=0;
  OWN_CATS.forEach(function(c){
    var cat=hubState.categories[c.id]||{};
    ['a0','a1','a2','a3'].forEach(function(k){if(String(cat[k]||'').trim())qFilled++;});
  });
  if(qFilled>0)return true;
  if(Array.isArray(hubState.photo_urls)&&hubState.photo_urls.length>0)return true;
  if(String(hubState.photo_url||'').trim())return true;
  if(Array.isArray(ownTimeline)&&ownTimeline.length>0)return true;
  return false;
}

}

async function runPhotoAnalysis(){
  var box=document.getElementById('analysisBox');
  if(box)box.innerHTML='Analyse bezig...';
  var key=getAnthropicKey();
  if(!hubState.photo_urls.length){
    hubState.foto_analyse='';
    saveHubState();
    renderPhotoSection();
    return;
  }
  if(!key){
    hubState.foto_analyse='Geen API-key gevonden. Voeg een key toe via localStorage `anthropic_api_key` om heranalyse uit te voeren.';
    saveHubState();
    renderPhotoSection();
    return;
  }
  try{
    var prompt='Je bent OWN Sense Vision. Geef een korte, empathische analyse in het Nederlands over hoe deze persoon overkomt op anderen. Sluit aan bij 9 eigenschappen: gevoeligheid, openheid, humor, directheid, avontuur, stabiliteit, vertrouwen, communicatie, onafhankelijkheid. Geef 4-6 zinnen en noem 3 korte tags op het einde als "Tags: ...". URLS: '+hubState.photo_urls.join(', ');
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:380,
        messages:[{role:'user',content:prompt}]
      })
    });
    var j=await r.json();
    if(!r.ok)throw new Error((j&&j.error&&j.error.message)||'Analyse mislukt');
    var txt='';
    if(j&&Array.isArray(j.content)){
      j.content.forEach(function(c){
        if(c&&c.type==='text')txt+=String(c.text||'');
      });
    }
    hubState.foto_analyse=String(txt||'').trim();
    saveHubState();
    renderPhotoSection();
  }catch(e){
    hubState.foto_analyse='Analyse kon niet voltooid worden. Probeer later opnieuw.';
    saveHubState();
    renderPhotoSection();
  }
}

function renderTimelineTab(){
  var el=document.getElementById('timelineCard');
  if(!el)return;
  var total=ownTimeline.length;
  var appSet={};
  ownTimeline.forEach(function(m){appSet[detectSourceFromMsg(m)]=1;});
  var appCount=Object.keys(appSet).length||0;

  var html='<h3>Tijdlijn</h3><p class="subtle">Berichten over jezelf uit alle apps, dossier: OWN Sense.</p>'
    +'<div class="stats-row" style="margin-top:10px">'
    +'<div class="stat"><div class="stat-k">Totaal berichten</div><div class="stat-v">'+total+'</div></div>'
    +'<div class="stat"><div class="stat-k">Actieve apps</div><div class="stat-v">'+appCount+'</div></div>'
    +'</div>';

  if(!total){
    html+='<p class="placeholder" style="margin-top:12px">Nog geen OWN Sense berichten gevonden.</p>';
    el.innerHTML=html;
    return;
  }

  var groups={};
  ownTimeline.forEach(function(m){
    var key=monthKey(m.created_at);
    if(!groups[key])groups[key]=[];
    groups[key].push(m);
  });

  var monthOrder=Object.keys(groups).sort(function(a,b){
    var da=new Date(groups[a][0]&&groups[a][0].created_at||0).getTime();
    var db=new Date(groups[b][0]&&groups[b][0].created_at||0).getTime();
    return db-da;
  });

  monthOrder.forEach(function(mk){
    html+='<div class="month-group"><div class="month-label">'+mk+'</div>';
    groups[mk].forEach(function(m,idx){
      var src=detectSourceFromMsg(m);
      var badgeCls=src==='ds'?'badge-ds':(src==='fs'?'badge-fs':'badge-gen');
      var badgeTxt=src==='ds'?'DateSense':(src==='fs'?'FamilySense':'Algemeen');
      var raw=stripHtml(m.html||m.content||'');
      var topic=detectTopic(raw);
      var eid='entry-'+String(m.id||mk+'-'+idx).replace(/[^a-zA-Z0-9_-]/g,'');
      html+='<div class="entry" id="'+eid+'">'
        +'<div class="entry-top"><span class="badge-app '+badgeCls+'">'+badgeTxt+'</span>'
        +'<span class="entry-date">'+fmtDateTime(m.created_at)+'</span></div>'
        +'<div class="entry-text">'+raw.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>'
        +'<div class="entry-actions"><span class="topic-tag">'+topic+'</span>'
        +'<button class="more-btn" type="button" data-more="'+eid+'">meer tonen</button></div>'
        +'</div>';
    });
    html+='</div>';
  });

  el.innerHTML=html;
  el.querySelectorAll('[data-more]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=btn.getAttribute('data-more');
      var row=document.getElementById(id);
      if(!row)return;
      row.classList.toggle('expanded');
      btn.textContent=row.classList.contains('expanded')?'minder tonen':'meer tonen';
    });
  });
}

function timelineByScope(scope){
  if(scope==='ds')return ownTimeline.filter(function(m){return detectSourceFromMsg(m)==='ds';});
  if(scope==='fs')return ownTimeline.filter(function(m){return detectSourceFromMsg(m)==='fs';});
  if(scope==='gen')return ownTimeline.filter(function(m){return detectSourceFromMsg(m)==='gen';});
  return ownTimeline.slice();
}

function insightTextByScope(scope){
  if(scope==='ds')return hubState.insight_ds||'';
  if(scope==='fs')return hubState.insight_fs||'';
  if(scope==='gen')return hubState.insight_gen||'';
  return hubState.insight_all||'';
}

function setInsightTextByScope(scope,text){
  if(scope==='ds')hubState.insight_ds=text;
  else if(scope==='fs')hubState.insight_fs=text;
  else if(scope==='gen')hubState.insight_gen=text;
  else hubState.insight_all=text;
}

function extractTags(text){
  var t=String(text||'');
  var m=t.match(/Tags:\s*(.+)$/im);
  if(!m)return[];
  return m[1].split(/[,|]/).map(function(s){return s.trim();}).filter(Boolean).slice(0,6);
}

function snapshotScores(){
  var snap={};

  return snap;
}

    +'Gebruik 2-3 korte paragrafen, menselijk en concreet. Sluit af met "Tags: tag1, tag2, tag3". '
    +'Gebruik ook deze eigenschappen: '+JSON.stringify(snapshotScores())+'. '

async function recomputeInsight(scope,isAuto){
  var rows=timelineByScope(scope);
  if(!rows.length){
    setInsightTextByScope(scope,'Nog onvoldoende berichten voor dit inzicht.');
    insightMeta[scope].tags=[];
    insightMeta[scope].updated_at=new Date().toISOString();
    saveHubState();
    renderInsightsTab();
    return;
  }
  var key=getAnthropicKey();
  if(!key){
    setInsightTextByScope(scope,'Geen API-key gevonden voor herberekening.');
    insightMeta[scope].tags=[];
    insightMeta[scope].updated_at=new Date().toISOString();
    saveHubState();
    renderInsightsTab();
    return;
  }
  if(!isAuto)renderInsightsTab('Herberekenen...');
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:850,
        messages:[{role:'user',content:buildInsightPrompt(scope,rows)}]
      })
    });
    var j=await r.json();
    if(!r.ok)throw new Error((j&&j.error&&j.error.message)||'Inzicht mislukt');
    var out='';
    if(j&&Array.isArray(j.content)){
      j.content.forEach(function(c){if(c&&c.type==='text')out+=String(c.text||'');});
    }
    out=String(out||'').trim();
    setInsightTextByScope(scope,out);
    insightMeta[scope].tags=extractTags(out);
    insightMeta[scope].updated_at=new Date().toISOString();
    if(scope==='all'){
      hubState.last_insight_count=ownTimeline.length;
      hubState.last_insight_at=new Date().toISOString();
      hubState.insight_scores_snap=snapshotScores();
    }
    if(isAuto){
      hasNewInsightBadge=true;
      var b=document.getElementById('insightNewDot');
      if(b)b.style.display='inline-flex';
    }
    saveHubState();
  }catch(e){
    setInsightTextByScope(scope,'Kon inzicht nu niet herberekenen. Probeer opnieuw.');
    insightMeta[scope].tags=[];
    insightMeta[scope].updated_at=new Date().toISOString();
    saveHubState();
  }
  renderInsightsTab();
}

async function recomputeAllInsightsAuto(){
  await recomputeInsight('all',true);
  await recomputeInsight('ds',true);
  await recomputeInsight('fs',true);
  await recomputeInsight('gen',true);
}

function topDeltas(){
  if(!hasMeaningfulOwnData())return[];
  var prev=hubState.insight_scores_snap||{};
  var arr=PK.map(function(k,i){
    var cur=parseInt(hubState.props[k],10)||0;
    var old=parseInt(prev[k],10)||0;
    return {key:k,label:PL[i],cur:cur,delta:cur-old};
  });
  arr.sort(function(a,b){return Math.abs(b.delta)-Math.abs(a.delta);});
  return arr.slice(0,3);
}

function scopeBadgeClass(scope){
  if(scope==='ds')return'scope-ds';
  if(scope==='fs')return'scope-fs';
  if(scope==='gen')return'scope-gen';
  return'scope-all';
}

function renderInsightsTab(statusText){
  var el=document.getElementById('insightsCard');
  if(!el)return;
  var diff=Math.max(0,ownTimeline.length-(hubState.last_insight_count||0));
  var banner='Auto-update actief · '+(diff>=5?'achtergrond herberekening nodig (+5 drempel bereikt)':'up-to-date');
  if(statusText)banner=statusText;
  var scopes=['all','ds','fs','gen'];
  var pills='<div class="pill-row">'+scopes.map(function(s){
    return '<button class="pill'+(activeInsightScope===s?' active':'')+'" data-scope="'+s+'">'+scopeLabel(s)+'</button>';
  }).join('')+'</div>';
  var txt=insightTextByScope(activeInsightScope)||'Nog geen inzicht berekend.';
  var tags=(insightMeta[activeInsightScope]&&insightMeta[activeInsightScope].tags)||extractTags(txt);
  var upAt=(insightMeta[activeInsightScope]&&insightMeta[activeInsightScope].updated_at)||hubState.last_insight_at;
  var deltas=topDeltas();
  var evo='';
  if(deltas.length){
    evo='<h3 style="margin-top:14px">Evolutie</h3><p class="subtle">Grootste verandering sinds laatste inzichten-snapshot.</p>';
    deltas.forEach(function(d){
      var sign=d.delta>0?'↑ +'+d.delta+'%':(d.delta<0?'↓ '+d.delta+'%':'→ stabiel');
      evo+='<div class="delta-row"><span class="subtle">'+d.label+'</span>'
        +'<div class="mini-track"><div class="mini-fill" style="width:'+Math.max(0,Math.min(100,d.cur))+'%"></div></div>'
        +'<strong style="font-size:12px">'+sign+'</strong></div>';
    });
  }else{
    evo='<h3 style="margin-top:14px">Evolutie</h3><p class="subtle">Nog geen betrouwbare evolutie: vul eerst vragen/foto/tijdlijn aan.</p>';
  }

  el.innerHTML=''
    +'<h3>Inzichten</h3>'
    +'<div class="status-banner">'+banner+'</div>'
    +pills
    +'<div class="ins-card">'
    +'<div class="ins-head"><div class="ins-title">OWN Sensei reflectie</div>'
    +'<span class="scope-badge '+scopeBadgeClass(activeInsightScope)+'">'+scopeLabel(activeInsightScope)+'</span></div>'
    +'<div class="ins-time">'+(upAt?fmtDateTime(upAt):'nog niet berekend')+'</div>'
    +'<div class="ins-body">'+txt.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>'
    +'<div class="tags">'+(tags.length?tags.map(function(t){return'<span class="tag">'+t+'</span>';}).join(''):'<span class="subtle">Geen tags</span>')+'</div>'
    +'<div class="ins-actions">'
    +'<button class="btn btn-primary btn-small" id="recomputeNowBtn" type="button">Herbereken nu</button>'
    +'<button class="btn btn-muted btn-small" id="saveInsightBtn" type="button">Bewaar</button>'
    +'</div></div>'
    +evo;

  el.querySelectorAll('[data-scope]').forEach(function(b){
    b.addEventListener('click',function(){
      activeInsightScope=b.getAttribute('data-scope');
      renderInsightsTab();
    });
  });
  document.getElementById('recomputeNowBtn').addEventListener('click',function(){
    recomputeInsight(activeInsightScope,false);
  });
  document.getElementById('saveInsightBtn').addEventListener('click',function(){
    saveHubState();
    renderInsightsTab('Inzicht opgeslagen.');
  });
}

function renderProfileTab(){
  renderHero();
  renderProps();
  renderPhotoSection();
  renderQuestions();
}

document.getElementById('onboardingShell').style.display=IS_NEW_USER?'block':'none';
document.getElementById('hubShell').style.display=IS_NEW_USER?'none':'block';

loadOwnTimelineFromSupabase().finally(function(){
  renderTimelineTab();
  renderInsightsTab();

  if(diff>=5){
    recomputeAllInsightsAuto();
  }
});

document.getElementById('photoPicker').addEventListener('change',async function(e){
  var file=e.target.files&&e.target.files[0];
  if(!file)return;
  if(hubState.photo_urls.length>=4){e.target.value='';return;}
  try{
    var url=await uploadPhotoToStorage(file);
    if(!url){
      var reader=new FileReader();
      reader.onload=function(ev){
        var localUrl=String(ev.target&&ev.target.result||'');
        if(localUrl){
          hubState.photo_urls.push(localUrl);
          if(!hubState.photo_url)hubState.photo_url=localUrl;
          saveHubState();
          renderPhotoSection();
        }
      };
      reader.readAsDataURL(file);
    }else{
      hubState.photo_urls.push(url);
      if(!hubState.photo_url)hubState.photo_url=url;
      saveHubState();
      renderPhotoSection();
    }
  }catch(err){}
  e.target.value='';
});

var insightTabBtn=document.querySelector('[data-tab="inzichten"]');
if(insightTabBtn){
  insightTabBtn.addEventListener('click',function(){
    hasNewInsightBadge=false;
    var b=document.getElementById('insightNewDot');
    if(b)b.style.display='none';
    renderInsightsTab();
  });
  if(!document.getElementById('insightNewDot')){
    var dot=document.createElement('span');
    dot.id='insightNewDot';
    dot.className='new-dot';
    dot.style.display='none';
    dot.textContent='Nieuw';
    insightTabBtn.appendChild(dot);
  }
}
