<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DateSense — Jouw persoonlijke dating coach</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1a1a1a;display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
:root{--r:#AE0000;--rl:#FFF5F5;--g:#F8F9FA;--b:#E5E5E5;--m:#888;--t:#1A1A1A}
.phone{width:390px;height:844px;background:#fff;border-radius:44px;overflow:hidden;border:10px solid #111;position:relative;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.6)}
@media(max-height:900px){.phone{height:calc(100vh - 20px);border-radius:30px}}
.topbar{display:flex;align-items:center;padding:16px 20px 8px;gap:6px;flex-shrink:0;background:#fff}
.topbar-title{flex:1;font-size:14px;font-weight:600;text-align:center;color:var(--t)}
.ico{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:none;border:none}
.logobar{display:flex;align-items:center;gap:12px;padding:4px 20px 12px;background:#fff;flex-shrink:0;border-bottom:1px solid var(--b)}
.avatar{width:50px;height:50px;border-radius:25px;overflow:hidden;flex-shrink:0;border:2px solid var(--b);background:#eee;display:flex;align-items:center;justify-content:center}
.brand{font-size:24px;font-weight:800;color:var(--t);letter-spacing:-0.5px;line-height:1}
.brand .dot{color:var(--r)}
.tagline{font-size:11px;color:var(--r);font-style:italic;margin-top:2px}
.profbar{display:flex;align-items:center;gap:8px;padding:10px 20px;background:#fff;border-bottom:1px solid var(--b);flex-shrink:0}
.pdot{width:8px;height:8px;border-radius:4px;background:var(--r);flex-shrink:0}
.pname{flex:1;font-size:14px;font-weight:500;color:var(--t)}
.pswitch{font-size:13px;color:var(--r);cursor:pointer;font-weight:500;background:none;border:none}
.main{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}
.props-wrap{padding:12px 20px 0;flex-shrink:0}
.prop{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.pn{width:90px;font-size:12px;color:#333;flex-shrink:0}
.track{flex:1;height:5px;background:var(--b);border-radius:3px;overflow:hidden}
.fill{height:100%;background:var(--r);border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.pct{width:34px;font-size:11px;color:var(--r);font-weight:700;text-align:right}
.hint{font-size:11px;color:#aaa;text-align:center;line-height:1.6;padding:8px 20px 10px;font-style:italic;border-bottom:1px solid var(--b);flex-shrink:0}
.chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.msg-ai{display:flex;flex-direction:column;gap:4px}
.bbl-ai{background:var(--rl);border:1px solid #FFD5D5;border-radius:14px 14px 14px 4px;padding:12px 14px;font-size:13px;color:#333;line-height:1.6;max-width:90%}
.bbl-ai .sender{font-size:10px;font-weight:700;color:var(--r);margin-bottom:5px;letter-spacing:.8px}
.msg-user{display:flex;justify-content:flex-end}
.bbl-user{background:var(--r);border-radius:14px 14px 4px 14px;padding:12px 14px;font-size:13px;color:#fff;line-height:1.6;max-width:90%}
.seg-wrap{background:#fff;border-radius:8px;padding:10px 12px;margin-top:8px;border:1px solid #EEE;font-size:13px;line-height:2.1}
.seg{border-radius:3px;padding:2px 5px;cursor:pointer;display:inline}
.seg-own{background:#BBDEFB;color:#0D47A1}
.seg-contact{background:#FFE0B2;color:#BF360C}
.seg-legend{font-size:10px;color:#aaa;margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.seg-legend span{padding:1px 8px;border-radius:3px}
.ai-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.aa{padding:8px 14px;border-radius:18px;font-size:12px;border:none;cursor:pointer;font-family:inherit;font-weight:600}
.aa.r{background:var(--r);color:#fff}
.aa.g{background:var(--g);color:#555;border:1px solid var(--b)}
.typing{display:flex;align-items:center;gap:5px;padding:12px 14px;background:var(--rl);border:1px solid #FFD5D5;border-radius:14px;width:fit-content}
.typing span{width:7px;height:7px;border-radius:4px;background:var(--r);animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.inputbar{display:flex;align-items:center;gap:9px;padding:10px 16px;background:#fff;border-top:1px solid var(--b);flex-shrink:0}
.inputfield{flex:1;background:var(--g);border:none;border-radius:22px;padding:10px 16px;font-size:13px;color:#333;outline:none;font-family:inherit}
.inputfield::placeholder{color:#bbb}
.rnd{width:32px;height:32px;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;transition:transform .1s}
.rnd:active{transform:scale(.92)}
.rnd.gr{background:var(--g)}
.rnd.rd{background:var(--r)}
.nav{background:#fff;border-top:1px solid var(--b);display:flex;padding:8px 0 24px;flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;color:var(--m);transition:color .15s;background:none;border:none}
.tab.active{color:var(--r)}
.tab svg{width:21px;height:21px}
.tab span{font-size:9px;font-weight:600;letter-spacing:.3px}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none;cursor:pointer}
.overlay.show{display:block}
.drawer{position:absolute;top:0;left:0;width:80%;height:100%;background:#fff;z-index:51;padding:24px 22px;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.drawer.open{transform:translateX(0)}
.drow{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #F0F0F0;cursor:pointer}
.badge{background:#F0F0F0;border-radius:10px;padding:2px 9px;font-size:11px;color:var(--m);font-weight:600}
.dlabel{font-size:10px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1.1px;margin:16px 0 8px}
.dlabel:first-child{margin-top:0}
.home-wrap{padding:8px 20px 24px}
.mic-btn{width:114px;height:114px;border-radius:57px;background:var(--r);display:flex;align-items:center;justify-content:center;margin:12px auto 8px;cursor:pointer;border:none;transition:transform .1s;box-shadow:0 8px 24px rgba(174,0,0,.3)}
.mic-btn:active{transform:scale(.95)}
.mic-btn.sm{width:76px;height:76px;border-radius:38px;box-shadow:0 6px 18px rgba(174,0,0,.25)}
.home-sub{font-size:13px;color:var(--m);text-align:center;line-height:1.6;margin-bottom:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.btn-r{width:100%;padding:16px 10px;border-radius:13px;border:none;font-size:13px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;background:var(--r);color:#fff}
.btn-r:active{opacity:.85}
.btn-g{width:100%;padding:16px 10px;border-radius:13px;border:none;font-size:13px;font-weight:500;cursor:pointer;text-align:center;font-family:inherit;background:var(--g);color:#333}
.sh{font-size:10px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px}
.ncard{border-radius:12px;padding:13px 15px;background:var(--g);margin-bottom:9px;border-left:4px solid #999}
.ncard.s{border-left-color:var(--r)}
.ncard.a{border-left-color:#E07800}
.ncard.c{border-left-color:#0066CC}
.ncat{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px}
.ncard.s .ncat{color:var(--r)}
.ncard.a .ncat{color:#E07800}
.ncard.c .ncat{color:#0066CC}
.ntext{font-size:13px;color:#333;line-height:1.5}
.nlink{font-size:12px;color:var(--r);margin-top:5px;cursor:pointer;display:block}
.srow{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--b);cursor:pointer}
.sdot{width:9px;height:9px;border-radius:5px;background:var(--r);flex-shrink:0}
.del-btn{background:#FFF0F0;border:none;color:var(--r);font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:inherit}
.mbtn{padding:9px 14px;border-radius:20px;background:var(--g);border:1px solid var(--b);font-size:13px;cursor:pointer;font-family:inherit}
.mbtn.on{background:#FFE8E8;color:var(--r);border-color:#FFD5D5;font-weight:600}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--g);border-radius:11px;margin-bottom:9px;cursor:pointer}
.apikey-input{width:100%;padding:12px 16px;border:1.5px solid var(--b);border-radius:12px;font-size:13px;font-family:inherit;outline:none;color:var(--t);margin-bottom:12px}
.apikey-input:focus{border-color:var(--r)}
.apikey-btn{width:100%;padding:15px;background:var(--r);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.toast{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:100;white-space:nowrap;pointer-events:none;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hdate{font-size:10px;color:#bbb;text-align:center;margin:6px 0;font-weight:600;letter-spacing:.5px}
.cmp-row{display:flex;gap:3px;margin-bottom:4px;align-items:stretch}
.cmp-label{flex:2;font-size:12px;color:#555;padding:10px;background:#FAFAFA;border-radius:8px 0 0 8px;display:flex;align-items:center}
.cmp-val{flex:1;font-size:12px;text-align:center;padding:10px 6px;display:flex;align-items:center;justify-content:center}
.cmp-val.t1{background:#FFF5F5}
.cmp-val.t2{background:#F5F5FF;border-radius:0 8px 8px 0}
</style>
</head>
<body>
<div class="phone" id="app">
  <div class="overlay" id="ovl" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer"></div>
  <div class="topbar">
    <button class="ico" id="btnBack" onclick="goBack()" style="visibility:hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" width="20" height="20"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <div class="topbar-title" id="pageTitle">Home</div>
    <button class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" width="18" height="18"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 7 7c0 2.4-1.2 4.5-3 5.7V17H8v-2.3C6.2 13.5 5 11.4 5 9a7 7 0 0 1 7-7z"/></svg></button>
    <button class="ico" onclick="goScreen('apikey')"><svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </div>
  <div class="logobar">
    <div class="avatar"><svg width="50" height="50" viewBox="0 0 50 50"><rect width="50" height="50" fill="#E0E0E0"/><circle cx="25" cy="19" r="10" fill="#BDBDBD"/><ellipse cx="25" cy="42" rx="17" ry="12" fill="#BDBDBD"/></svg></div>
    <div><div class="brand">Date<span>Sense</span><span class="dot">.</span></div><div class="tagline">Jouw persoonlijke dating coach</div></div>
  </div>
  <div class="profbar" id="profbar" style="display:none">
    <button class="ico" onclick="openDrawer()" style="width:20px;height:20px"><svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" width="18" height="18"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="pdot"></div>
    <div class="pname" id="pname">OWN Sense</div>
    <button class="pswitch" onclick="openDrawer()">Wissel</button>
  </div>
  <div class="main" id="mainContent"></div>
  <div class="inputbar" id="inputbar" style="display:none">
    <button class="rnd gr" onclick="quickFill()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    <input class="inputfield" id="msgInput" placeholder="Typ, plak of import je berichten..." onkeydown="if(event.key==='Enter')sendMsg()"/>
    <button class="rnd rd" onclick="sendMsg()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg></button>
    <button class="rnd rd"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></button>
  </div>
  <div class="nav">
    <button class="tab active" id="tab-home" onclick="goScreen('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span>Home</span></button>
    <button class="tab" id="tab-senses" onclick="goScreen('senses')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Senses</span></button>
    <button class="tab" id="tab-own" onclick="goScreen('own')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M12 14c-5 0-8 2.5-8 4v2h16v-2c0-1.5-3-4-8-4z"/></svg><span>OWN</span></button>
    <button class="tab" id="tab-vertel" onclick="goScreen('vertel')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg><span>Vertel</span></button>
    <button class="tab" id="tab-import" onclick="goScreen('import')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Typ / Import</span></button>
  </div>
</div>

<script>
var S={get:function(k){try{var v=localStorage.getItem('ds_'+k);return v?JSON.parse(v):null;}catch(e){return null;}},set:function(k,v){try{localStorage.setItem('ds_'+k,JSON.stringify(v));}catch(e){}},del:function(k){localStorage.removeItem('ds_'+k);}};
var DP={gevoeligheid:75,openheid:60,humor:45,directheid:30,avontuur:20};
var PK=['gevoeligheid','openheid','humor','directheid','avontuur'];
var PL=['Gevoeligheid','Openheid','Humor','Directheid','Avontuur'];
var state={apiKey:S.get('apikey')||'',profile:S.get('lastProfile')||'OWN Sense',screen:'home',busy:false,prev:'home'};

function getProfiles(){return S.get('profiles')||['OWN Sense'];}
function saveProfiles(p){S.set('profiles',p);}
function getPD(name){var d=S.get('pd_'+name);if(!d)d={props:Object.assign({},DP),messages:[],apiHist:[],count:0,lastActive:null};return d;}
function savePD(name,d){d.lastActive=new Date().toISOString();S.set('pd_'+name,d);}
function curD(){return getPD(state.profile);}
function saveCurD(d){savePD(state.profile,d);}

function goBack(){goScreen(state.prev===state.screen?'home':state.prev);}
function goScreen(s){
  state.prev=state.screen;state.screen=s;S.set('lastProfile',state.profile);
  var T={home:'Home',senses:'Mijn Senses',own:'OWN Sense',vertel:'Vertel',import:'Typ / Import',apikey:'Instellingen',compare:'Vergelijken',menu:'Menu'};
  document.getElementById('pageTitle').textContent=T[s]||s;
  var isV=s==='vertel';
  document.getElementById('profbar').style.display=isV?'flex':'none';
  document.getElementById('inputbar').style.display=isV?'flex':'none';
  document.getElementById('btnBack').style.visibility=s==='home'?'hidden':'visible';
  document.getElementById('pname').textContent=state.profile;
  ['home','senses','own','vertel','import'].forEach(function(t){var e=document.getElementById('tab-'+t);if(e)e.classList.toggle('active',t===s);});
  var mc=document.getElementById('mainContent');mc.innerHTML='';
  ({home:rHome,senses:rSenses,own:rOWN,vertel:rVertel,import:rImport,apikey:rApiKey,compare:rCompare,menu:rMenu})[s]&&({home:rHome,senses:rSenses,own:rOWN,vertel:rVertel,import:rImport,apikey:rApiKey,compare:rCompare,menu:rMenu})[s](mc);
  mc.scrollTop=0;rDrawer();
}

function rDrawer(){
  var ps=getProfiles(),cs=ps.filter(function(p){return p!=='OWN Sense';});
  var h='<div style="font-size:18px;font-weight:800;color:var(--t);margin-bottom:2px">Mijn Senses</div><div style="font-size:12px;color:var(--r);margin-bottom:18px">Alle dossiers &amp; gesprekken</div><div class="dlabel">Persoonlijk</div>'
    +'<div class="drow" onclick="selProf(\'OWN Sense\')"><div style="width:9px;height:9px;border-radius:5px;background:var(--r)"></div><div style="flex:1;font-size:14px;font-weight:500">OWN Sense</div><div class="badge">'+getPD('OWN Sense').count+'</div></div>';
  if(cs.length){h+='<div class="dlabel">Contacten</div>';cs.forEach(function(p){var d=getPD(p);h+='<div class="drow" onclick="selProf(\''+p+'\')"><div style="width:9px;height:9px;border-radius:5px;background:var(--r)"></div><div style="flex:1;font-size:14px;font-weight:500">'+p+'</div><div class="badge">'+d.count+'</div></div>';});}
  h+='<div class="dlabel">Acties</div><div class="drow" onclick="newSense()"><div style="width:9px;height:9px;border-radius:5px;border:2px solid var(--r)"></div><div style="font-size:14px;color:var(--r);font-weight:600">+ Nieuw Sense aanmaken</div></div>';
  document.getElementById('drawer').innerHTML=h;
}
function openDrawer(){rDrawer();document.getElementById('drawer').classList.add('open');document.getElementById('ovl').classList.add('show');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('ovl').classList.remove('show');}
function selProf(n){state.profile=n;document.getElementById('pname').textContent=n;S.set('lastProfile',n);closeDrawer();goScreen('vertel');}
function newSense(){closeDrawer();var n=prompt('Naam van de persoon (bv. "Lisa"):');if(!n||!n.trim())return;var nm=n.trim()+'Sense';var ps=getProfiles();if(ps.indexOf(nm)===-1){ps.push(nm);saveProfiles(ps);}toast('✅ '+nm+' aangemaakt!');selProf(nm);}

function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('app').appendChild(t);setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},2500);}
function timeAgo(iso){var d=Math.floor((Date.now()-new Date(iso))/1000);if(d<60)return'Zojuist';if(d<3600)return Math.floor(d/60)+' min';if(d<86400)return Math.floor(d/3600)+' uur';return Math.floor(d/86400)+' d';}

function rProps(pfx,props){return PK.map(function(k,i){var v=props[k]||0;return'<div class="prop"><div class="pn">'+PL[i]+'</div><div class="track"><div class="fill" id="'+pfx+i+'" style="width:'+v+'%"></div></div><div class="pct" id="'+pfx+'p'+i+'">'+v+'%</div></div>';}).join('');}

function updProps(pfx,u,p){PK.forEach(function(k,i){if(u[k]!==null&&u[k]!==undefined){var v=Math.min(100,Math.max(0,parseInt(u[k])));if(!isNaN(v)){p[k]=v;var e=document.getElementById(pfx+i);var ep=document.getElementById(pfx+'p'+i);if(e)e.style.width=v+'%';if(ep)ep.textContent=v+'%';}}});return p;}

async function cmpAdvies(c1,c2){

}

async function callAPI(sys,msgs,maxTok){
  var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok||800,system:sys,messages:msgs})});
  var data=await res.json();if(data.error)throw new Error(data.error.message);
  return(data.content&&data.content[0]&&data.content[0].text)||'';
}

}

function exportData(){var ps=getProfiles();var exp={exported:new Date().toISOString(),profiles:{}};ps.forEach(function(p){exp.profiles[p]=getPD(p);});var b=new Blob([JSON.stringify(exp,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='DateSense_'+new Date().toISOString().split('T')[0]+'.json';a.click();toast('✅ Data geëxporteerd!');}
function clearAll(){if(!confirm('Weet je zeker dat je ALLE DateSense data wil verwijderen?'))return;var ps=getProfiles();ps.forEach(function(p){S.del('pd_'+p);});S.del('profiles');S.del('lastProfile');state.profile='OWN Sense';toast('🗑️ Alle data verwijderd');goScreen('home');}

if(!S.get('profiles'))saveProfiles(['OWN Sense']);
goScreen('home');
if(!state.apiKey){setTimeout(function(){var b=document.createElement('div');b.style.cssText='position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:#AE0000;color:white;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:100;cursor:pointer;white-space:nowrap';b.textContent='⚙️ Stel je API key in om te starten';b.onclick=function(){if(b.parentNode)b.parentNode.removeChild(b);goScreen('apikey');};document.getElementById('app').appendChild(b);setTimeout(function(){if(b.parentNode)b.parentNode.removeChild(b);},8000);},1000);}
</script>
