<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DateSense — Jouw persoonlijke dating coach</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow:hidden}
:root{--r:#AE0000;--rl:#FFF5F5;--g:#F8F9FA;--b:#E5E5E5;--m:#888;--t:#1A1A1A;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}

.app{width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}

/* Top bar */
.topbar{display:flex;align-items:center;padding:12px 14px 8px;padding-top:calc(12px + var(--st));flex-shrink:0;background:#fff;border-bottom:1px solid var(--b)}
.tb-title{flex:1;font-size:17px;font-weight:700;text-align:center;color:var(--t)}
.ico{width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:none;border:none;border-radius:19px}
.ico:active{background:var(--g)}

/* Logo bar */
.logobar{display:flex;align-items:center;gap:12px;padding:8px 16px 10px;flex-shrink:0}
.av{width:42px;height:42px;border-radius:21px;overflow:hidden;flex-shrink:0;border:2px solid var(--b);background:#eee}
.brand{font-size:22px;font-weight:800;color:var(--t);letter-spacing:-.5px;line-height:1}
.brand .dot{color:var(--r)}
.tag{font-size:11px;color:var(--r);font-style:italic;margin-top:2px}

/* Scrollable main */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Nav */
.nav{background:#fff;border-top:1px solid var(--b);display:flex;padding:6px 0;padding-bottom:calc(6px + var(--sb));flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;color:var(--m);background:none;border:none}
.tab.active{color:var(--r)}
.tab svg{width:23px;height:23px}
.tab span{font-size:10px;font-weight:600}

/* Overlay + Drawer */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none}
.overlay.show{display:block}
.drawer{position:absolute;top:0;left:0;width:83%;max-width:310px;height:100%;background:#fff;z-index:51;overflow-y:auto;transform:translateX(-100%);transition:transform .26s ease}
.drawer.open{transform:translateX(0)}
.dr-inner{padding:calc(24px + var(--st)) 20px 32px}
.drow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #F2F2F2;cursor:pointer}
.drow:active{opacity:.6}
.dbadge{background:#EBEBEB;border-radius:10px;padding:3px 10px;font-size:12px;color:var(--m);font-weight:600}
.dlbl{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1.1px;margin:16px 0 8px}

/* Cards & buttons */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.btn-r{width:100%;padding:17px 8px;border-radius:13px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--r);color:#fff}
.btn-r:active{opacity:.8}
.btn-g{width:100%;padding:17px 8px;border-radius:13px;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--g);color:#333;border:1px solid var(--b)}
.sh{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin:20px 0 12px}
.ncard{border-radius:13px;padding:14px 16px;background:var(--g);margin-bottom:10px;border-left:5px solid #999}
.ncard.s{border-left-color:var(--r)} .ncard.a{border-left-color:#E07800} .ncard.c{border-left-color:#0066CC}
.ncat{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.ncard.s .ncat{color:var(--r)} .ncard.a .ncat{color:#E07800} .ncard.c .ncat{color:#0066CC}
.ntext{font-size:14px;color:#333;line-height:1.5}
.nlink{font-size:13px;color:var(--r);margin-top:6px;cursor:pointer;display:block;font-weight:600}

/* Mic button */
.mic-btn{width:120px;height:120px;border-radius:60px;background:var(--r);display:flex;align-items:center;justify-content:center;margin:14px auto 12px;cursor:pointer;border:none;box-shadow:0 8px 28px rgba(174,0,0,.3)}
.mic-btn:active{transform:scale(.95)}
.mic-btn.sm{width:80px;height:80px;border-radius:40px;box-shadow:0 6px 20px rgba(174,0,0,.25)}

/* Senses list */
.srow{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--b);cursor:pointer}
.srow:active{opacity:.7}
.sdot{width:10px;height:10px;border-radius:5px;background:var(--r);flex-shrink:0}
.del-btn{background:#FFF0F0;border:none;color:var(--r);font-size:12px;font-weight:700;padding:6px 12px;border-radius:10px;cursor:pointer;font-family:inherit;flex-shrink:0}

/* Dossier detail */
.tabs-bar{display:flex;border-bottom:1px solid var(--b);background:#fff;flex-shrink:0}
.dtab{flex:1;padding:12px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--m);cursor:pointer;border-bottom:3px solid transparent}
.dtab.active{color:var(--r);border-bottom-color:var(--r)}
.match-bar{background:var(--g);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.match-fill{height:8px;background:var(--r);border-radius:4px;transition:width .6s}

/* Props */
.prop{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.pn{width:96px;font-size:13px;color:#333;flex-shrink:0}
.track{flex:1;height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.fill{height:100%;background:var(--r);border-radius:3px;transition:width .6s ease}
.pct{width:38px;font-size:12px;color:var(--r);font-weight:700;text-align:right}

/* ── VERTEL SCHERM ── */
.vertel-wrap{display:flex;flex-direction:column;height:100%}

/* Active dossier bar */
.active-dossier-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-bottom:2px solid var(--r);flex-shrink:0}
.ad-dot{width:9px;height:9px;border-radius:5px;background:var(--r);flex-shrink:0}
.ad-name{flex:1;font-size:15px;font-weight:700;color:var(--t)}
.ad-switch{font-size:13px;color:var(--r);cursor:pointer;font-weight:700;background:none;border:none;padding:4px 10px;border-radius:8px;background:var(--rl)}

/* Props compact */
.props-compact{padding:10px 16px 0;flex-shrink:0;background:#fff}
.prop-c{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pn-c{width:84px;font-size:12px;color:#555;flex-shrink:0}
.track-c{flex:1;height:5px;background:var(--b);border-radius:3px;overflow:hidden}
.fill-c{height:100%;background:var(--r);border-radius:3px;transition:width .6s ease}
.pct-c{width:32px;font-size:11px;color:var(--r);font-weight:700;text-align:right}

/* Chat area */
.chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg-ai{display:flex;flex-direction:column;gap:4px}
.bbl-ai{background:var(--rl);border:1px solid #FFD5D5;border-radius:16px 16px 16px 4px;padding:14px 16px;font-size:16px;color:#222;line-height:1.6;max-width:94%}
.bbl-ai .sender{font-size:11px;font-weight:700;color:var(--r);margin-bottom:6px;letter-spacing:.8px}
.msg-user{display:flex;justify-content:flex-end}
.bbl-user{background:var(--r);border-radius:16px 16px 4px 16px;padding:14px 16px;font-size:16px;color:#fff;line-height:1.6;max-width:94%}

/* Segments */
.seg-wrap{background:#fff;border-radius:10px;padding:12px 14px;margin-top:8px;border:1px solid #EEE;font-size:15px;line-height:2.2}
.seg{border-radius:4px;padding:2px 6px;cursor:pointer;display:inline}
.seg-own{background:#BBDEFB;color:#0D47A1}
.seg-contact{background:#FFE0B2;color:#BF360C}
.seg-legend{font-size:11px;color:#aaa;margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.seg-legend span{padding:2px 10px;border-radius:4px}

/* Dossier suggestie */
.doss-suggest{background:#FFF8E1;border:2px solid #FFE082;border-radius:14px;padding:14px 16px;margin-top:8px}
.ds-lbl{font-size:11px;font-weight:700;color:#E65100;margin-bottom:8px;letter-spacing:.5px}
.ds-txt{font-size:15px;color:#333;margin-bottom:12px;line-height:1.5}
.ds-btns{display:flex;gap:8px;flex-wrap:wrap}

/* AI actions */
.ai-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.aa{padding:10px 16px;border-radius:20px;font-size:14px;border:none;cursor:pointer;font-family:inherit;font-weight:700}
.aa:active{opacity:.7}
.aa.r{background:var(--r);color:#fff}
.aa.g{background:var(--g);color:#555;border:1px solid var(--b)}
.aa.y{background:#FFF8E1;color:#E65100;border:1px solid #FFE082}

/* Typing */
.typing{display:flex;align-items:center;gap:6px;padding:14px 16px;background:var(--rl);border:1px solid #FFD5D5;border-radius:16px;width:fit-content}
.typing span{width:8px;height:8px;border-radius:4px;background:var(--r);animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* Input bar */
.input-bar{display:flex;flex-direction:column;background:#fff;border-top:1px solid var(--b);flex-shrink:0;padding:10px 16px;padding-bottom:calc(10px + var(--sb));gap:10px}
.input-row{display:flex;align-items:flex-end;gap:10px}
.input-area{flex:1;background:var(--g);border:1.5px solid var(--b);border-radius:20px;padding:12px 16px;font-size:16px;color:#333;outline:none;font-family:inherit;resize:none;min-height:48px;max-height:120px;line-height:1.4}
.input-area:focus{border-color:#bbb}
.input-area::placeholder{color:#bbb}
.rnd{width:44px;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none}
.rnd:active{opacity:.7}
.rnd.gr{background:var(--g);border:1.5px solid var(--b)}
.rnd.rd{background:var(--r)}
.input-hint{font-size:12px;color:#bbb;text-align:center}

/* Forms */
.form-input{width:100%;padding:15px 18px;border:1.5px solid var(--b);border-radius:14px;font-size:16px;font-family:inherit;outline:none;color:var(--t);margin-bottom:14px;background:#fff}
.form-input:focus{border-color:var(--r)}
.form-btn{width:100%;padding:17px;background:var(--r);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px}
.form-btn:active{opacity:.85}
.form-btn.sec{background:var(--g);color:#333;border:1px solid var(--b)}

/* Compare */
.cmp-row{display:flex;gap:3px;margin-bottom:5px}
.cmp-lbl{flex:2;font-size:13px;color:#555;padding:11px 12px;background:#FAFAFA;border-radius:10px 0 0 10px;display:flex;align-items:center}
.cmp-v{flex:1;font-size:13px;text-align:center;padding:11px 6px;display:flex;align-items:center;justify-content:center}
.cmp-v.t1{background:#FFF5F5} .cmp-v.t2{background:#F5F5FF;border-radius:0 10px 10px 0}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:200;white-space:nowrap;pointer-events:none;animation:fup .3s ease}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hdate{font-size:11px;color:#bbb;text-align:center;margin:6px 0;font-weight:600}
.sync-bar{font-size:11px;text-align:center;padding:2px;flex-shrink:0;min-height:16px;color:transparent}
.sync-bar.s{color:var(--r)} .sync-bar.ok{color:#4CAF50}

/* OWN moods */
.mbtn{padding:10px 16px;border-radius:22px;background:var(--g);border:1px solid var(--b);font-size:14px;cursor:pointer;font-family:inherit}
.mbtn.on{background:#FFE8E8;color:var(--r);border-color:#FFD5D5;font-weight:700}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;background:var(--g);border-radius:13px;margin-bottom:10px;cursor:pointer;border:1px solid var(--b)}

/* Timeline */
.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #F5F5F5}
.tl-dot{width:10px;height:10px;border-radius:5px;flex-shrink:0;margin-top:4px}
.tl-dot.u{background:var(--r)} .tl-dot.a{background:#4CAF50}
.tl-body{flex:1}
.tl-time{font-size:11px;color:#aaa;margin-bottom:4px}
.tl-text{font-size:14px;color:#333;line-height:1.5}
</style>
</head>

<script>
// ── Config ─────────────────────────────────────────────────────
const SURL='https://ghuqjtdrkwssyqvcubcd.supabase.co';
const SKEY='sb_publishable_ShIeY18JCYiH8fyXm_anHw_Y1jP2skq';
const sb=supabase.createClient(SURL,SKEY);
const PK=['gevoeligheid','openheid','humor','directheid','avontuur'];
const PL=['Gevoeligheid','Openheid','Humor','Directheid','Avontuur'];
const DP={gevoeligheid:75,openheid:60,humor:45,directheid:30,avontuur:20};

// ── State ──────────────────────────────────────────────────────
var S={
  user:null,
  apiKey:localStorage.getItem('ds_ak')||'',
  // Het actieve dossier voor het VERTEL scherm (universeel inputvak)
  activeDossier:'OWN Sense',
  screen:'home',
  prev:'home',
  busy:false,
  profiles:[],
  pdata:{},  // profileData
  apiHist:{}, // api history per dossier
  // Dossier detail view
  viewDossier:null,
  viewTab:'overzicht'
};

// ── Helpers ────────────────────────────────────────────────────
function sync(s){var e=document.getElementById('syncBar');if(s==='s'){e.textContent='↑ Synchroniseren...';e.className='sync-bar s';}else if(s==='ok'){e.textContent='✓ Gesynchroniseerd';e.className='sync-bar ok';setTimeout(function(){e.textContent='';e.className='sync-bar';},2000);}else{e.textContent='';e.className='sync-bar';}}

function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.getElementById('app').appendChild(t);setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},2500);}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

// ── Auth ───────────────────────────────────────────────────────
async function init(){
  var {data:{session}}=await sb.auth.getSession();
  if(session){S.user=session.user;await loadAll();goScreen('home');}
  else goScreen('login');
  sb.auth.onAuthStateChange(async function(ev,ses){
    if(ev==='SIGNED_IN'&&ses){S.user=ses.user;await loadAll();goScreen('home');}
    else if(ev==='SIGNED_OUT'){S.user=null;S.profiles=[];S.pdata={};goScreen('login');}
  });
}

async function doLogin(){
  var e=document.getElementById('lEmail').value.trim(),p=document.getElementById('lPw').value,err=document.getElementById('lErr');
  err.textContent='Even wachten...';err.style.color='#888';
  try{await sb.auth.signInWithPassword({email:e,password:p});}
  catch(x){err.style.color='var(--r)';err.textContent=x.message;}
}
async function doRegister(){
  var e=document.getElementById('rEmail').value.trim(),p=document.getElementById('rPw').value,err=document.getElementById('rErr');
  if(p.length<6){err.style.color='var(--r)';err.textContent='Min. 6 tekens';return;}
  err.textContent='Bezig...';err.style.color='#888';

// ── Data ───────────────────────────────────────────────────────
async function loadAll(){
  if(!S.user)return;
  var {data}=await sb.from('sense_profiles').select('*').eq('user_id',S.user.id).order('created_at');
  S.profiles=['OWN Sense'];S.pdata={};
  if(!data||!data.length){await ensureP('OWN Sense');}
  else{data.forEach(function(p){if(p.name!=='OWN Sense')S.profiles.push(p.name);S.pdata[p.name]={props:p.props||{...DP},count:p.entry_count||0,lastActive:p.last_active};});if(!S.pdata['OWN Sense'])await ensureP('OWN Sense');}
}
async function ensureP(name){
  if(!S.user||S.pdata[name])return;
  await sb.from('sense_profiles').upsert({user_id:S.user.id,name,props:{...DP},entry_count:0},{onConflict:'user_id,name'});
  S.pdata[name]={props:{...DP},count:0,lastActive:null};
  if(name!=='OWN Sense'&&!S.profiles.includes(name))S.profiles.push(name);
}
async function saveP(name,props,count){
  if(!S.user)return;sync('s');
  await sb.from('sense_profiles').upsert({user_id:S.user.id,name,props,entry_count:count,last_active:new Date().toISOString()},{onConflict:'user_id,name'});
  if(S.pdata[name]){S.pdata[name].props=props;S.pdata[name].count=count;S.pdata[name].lastActive=new Date().toISOString();}
  sync('ok');
}
async function saveMsg(pn,role,html){if(!S.user)return;await sb.from('sense_messages').insert({user_id:S.user.id,profile_name:pn,role,html});}
async function loadMsgs(pn){if(!S.user)return[];var {data}=await sb.from('sense_messages').select('*').eq('user_id',S.user.id).eq('profile_name',pn).order('created_at').limit(40);return data||[];}
async function loadApiH(pn){if(!S.user)return[];var {data}=await sb.from('sense_api_history').select('*').eq('user_id',S.user.id).eq('profile_name',pn).order('created_at').limit(20);return(data||[]).map(r=>({role:r.role,content:r.content}));}
async function saveApiM(pn,role,content){if(!S.user)return;await sb.from('sense_api_history').insert({user_id:S.user.id,profile_name:pn,role,content});}
async function delP(name){
  if(!S.user)return;
  await sb.from('sense_profiles').delete().eq('user_id',S.user.id).eq('name',name);
  await sb.from('sense_messages').delete().eq('user_id',S.user.id).eq('profile_name',name);
  await sb.from('sense_api_history').delete().eq('user_id',S.user.id).eq('profile_name',name);
  S.profiles=S.profiles.filter(p=>p!==name);delete S.pdata[name];delete S.apiHist[name];
}

${cats.map(c=>`<div class="cat-row"><span style="font-size:15px;font-weight:600">${c[0]}</span><div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;color:var(--m)">${c[1]} gevuld</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9,6 15,12 9,18"/></svg></div></div>`).join('')}
<div class="sh">Activiteit</div>
<div style="background:var(--g);border-radius:14px;padding:16px;font-size:14px;color:#555;line-height:1.6">${d.count>0?d.count+' entries opgeslagen. <span style="color:var(--r);cursor:pointer" onclick="setActiveDossier(\'OWN Sense\')">Voeg meer toe →</span>':'Nog geen entries. <span style="color:var(--r);cursor:pointer" onclick="setActiveDossier(\'OWN Sense\')">Begin nu →</span>'}</div>
<div style="margin-top:14px"><button class="btn-r" onclick="setActiveDossier('OWN Sense')">✏️ Vertel iets over jezelf</button></div></div>`;
}

// ── VERTEL — Universeel inputvak ───────────────────────────────
async function rVertel(el){
  var d=S.pdata[S.activeDossier]||{props:{...DP},count:0};

  // Active dossier bar bovenaan
  el.innerHTML=`
<div class="active-dossier-bar">
  <div class="ad-dot"></div>
  <div class="ad-name">${S.activeDossier}</div>
  <button class="ad-switch" onclick="openDrawer()">⇄ Wissel</button>
</div>
<div class="props-compact" id="propsArea">
${PK.map((k,i)=>`<div class="prop-c"><div class="pn-c">${PL[i]}</div><div class="track-c"><div class="fill-c" id="vp${i}" style="width:${d.props[k]||0}%"></div></div><div class="pct-c" id="vpp${i}">${d.props[k]||0}%</div></div>`).join('')}
</div>
<div style="padding:6px 16px 8px;font-size:12px;color:#aaa;text-align:center;font-style:italic;border-bottom:1px solid var(--b)">

</div>
<div class="chat" id="chatArea"></div>`;

  // Laad berichten

  var welcome=document.createElement('div');welcome.className='msg-ai';
  welcome.innerHTML=`<div class="bbl-ai"><div class="sender">DATESENSE</div>${d.count>0?`Welkom terug bij <strong>${S.activeDossier}</strong>! Je hebt hier al ${d.count} entries. Vertel me meer.`:'Welkom! Vertel me wat er in je hoofd zit. Ik help je alles op de juiste plek te zetten. Je kan ook wisselen van dossier via de knop bovenaan.'}</div>`;

      var div=document.createElement('div');div.className=m.role==='user'?'msg-user':'msg-ai';
      div.innerHTML=m.role==='user'?`<div class="bbl-user">${m.html}</div>`:`<div class="bbl-ai"><div class="sender">DATESENSE</div>${m.html}</div>`;
      ca.appendChild(div);

  if(!S.apiKey){var w=document.createElement('div');w.className='msg-ai';w.innerHTML='<div class="bbl-ai" style="background:#FFF8E1;border-color:#FFE082"><div class="sender" style="color:#F57F17">LET OP</div>Voeg je Anthropic API key toe via ⚙️ rechtsboven!</div>';ca.appendChild(w);}
  ca.scrollTop=ca.scrollHeight;
  S.apiHist[S.activeDossier]=await loadApiH(S.activeDossier);
}

function rImport(el){
  var items=[['📋','Plak tekst','WhatsApp gesprek, notitie, dagboek...'],['📸','Screenshot','Foto van gesprek uploaden'],['🎤','Spraakmemo','Ingesproken bericht transcriberen'],['📧','Email','Email conversatie importeren']];

}

function rSettings(el){el.innerHTML=`<div style="padding:32px 20px"><div style="font-size:20px;font-weight:800;color:var(--t);margin-bottom:8px">Anthropic API Key</div><p style="font-size:15px;color:#666;line-height:1.6;margin-bottom:22px">Nodig om DateSensei te activeren. Aanmaken op <strong>console.anthropic.com</strong>.</p><input class="form-input" id="akField" type="password" placeholder="sk-ant-api..." value="${S.apiKey||''}"/><button class="form-btn" onclick="saveKey()">Opslaan &amp; activeren</button>${S.apiKey?'<div style="margin-top:14px;padding:14px;background:#F0FFF4;border-radius:12px;font-size:15px;color:#2E7D32">✅ API key actief!</div>':''}<div style="margin-top:28px;padding-top:22px;border-top:1px solid var(--b)"><div style="font-size:20px;font-weight:800;color:var(--t);margin-bottom:8px">Account</div><p style="font-size:15px;color:#666;margin-bottom:14px">Ingelogd als: <strong>${S.user?S.user.email:''}</strong></p><button class="form-btn sec" onclick="doSignOut()">Uitloggen</button></div></div>`;}
function saveKey(){var k=document.getElementById('akField').value.trim();if(!k){alert('Vul een geldige key in.');return;}S.apiKey=k;localStorage.setItem('ds_ak',k);toast('✅ API key opgeslagen!');goScreen('home');}

// ── Compare ────────────────────────────────────────────────────
function rCompare(el){
  var cs=S.profiles.filter(p=>p!=='OWN Sense');
  if(cs.length<2){el.innerHTML='<div style="text-align:center;padding:80px 30px;color:var(--m)"><div style="font-size:48px;margin-bottom:16px">⚖️</div><p style="font-size:15px;line-height:1.6">Je hebt minimaal 2 contactdossiers nodig.<br><br><span style="color:var(--r);cursor:pointer;font-weight:600" onclick="newSense()">+ Nieuw Sense aanmaken</span></p></div>';return;}
  var c1=cs[0],c2=cs[1],d1=S.pdata[c1]||{props:{...DP},count:0},d2=S.pdata[c2]||{props:{...DP},count:0};
  var rows=PK.map((k,i)=>{var v1=d1.props[k]||0,v2=d2.props[k]||0;var s1=v1>=v2?'⭐ ':'',s2=v2>v1?'⭐ ':'';return`<div class="cmp-row"><div class="cmp-lbl">${PL[i]}</div><div class="cmp-v t1">${s1}${v1}%</div><div class="cmp-v t2">${s2}${v2}%</div></div>`;}).join('');
  el.innerHTML=`<div style="padding:16px 16px 32px"><div style="display:flex;gap:8px;margin-bottom:16px"><div style="flex:2"></div><div style="flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--r);background:#FFF5F5;padding:10px 6px;border-radius:12px">${c1}<br><span style="font-size:22px;font-weight:800">${d1.count}</span><br><span style="font-size:11px;font-weight:400">entries</span></div><div style="flex:1;text-align:center;font-size:13px;font-weight:700;color:#3949AB;background:#F5F5FF;padding:10px 6px;border-radius:12px">${c2}<br><span style="font-size:22px;font-weight:800">${d2.count}</span><br><span style="font-size:11px;font-weight:400">entries</span></div></div>${rows}<div id="cmpBox" style="background:var(--rl);border:1.5px solid #FFD5D5;border-radius:14px;padding:16px;margin-top:18px"><div style="font-size:12px;font-weight:700;color:var(--r);margin-bottom:10px;letter-spacing:.5px">AI ANALYSE</div><div style="font-size:15px;color:#333;line-height:1.6">Voeg meer data toe voor een betere analyse.</div><div style="display:flex;gap:10px;margin-top:14px"><button class="aa r" onclick="cmpAdvies('${c1}','${c2}')">AI Analyse</button><button class="aa g" onclick="setActiveDossier('${c1}')">Open ${c1}</button></div></div></div>`;
}

async function cmpAdvies(c1,c2){
  if(!S.apiKey){toast('⚠️ Eerst API key instellen!');return;}
  var box=document.getElementById('cmpBox');if(box)box.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  var d1=S.pdata[c1]||{props:{...DP}},d2=S.pdata[c2]||{props:{...DP}};
  var sys='Je bent DateSensei. Vergelijk '+c1+' en '+c2+' op basis van hun eigenschappen. Eerlijk, concreet advies in het Nederlands. Max 4 zinnen.';
  try{var t=await callAPI(sys,[{role:'user',content:'Vergelijk '+c1+' ('+JSON.stringify(d1.props)+') met '+c2+' ('+JSON.stringify(d2.props)+').'}],500);if(box)box.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--r);margin-bottom:10px;letter-spacing:.5px">ADVIES</div><div style="font-size:15px;color:#333;line-height:1.6">'+t+'</div>';}
  catch(x){if(box)box.innerHTML='<div style="color:red">Fout: '+x.message+'</div>';}
}

// ── API ────────────────────────────────────────────────────────
async function callAPI(sys,msgs,maxTok){
  var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok||800,system:sys,messages:msgs})});
  var data=await res.json();if(data.error)throw new Error(data.error.message);
  return(data.content&&data.content[0]&&data.content[0].text)||'';
}

// ── Chat functions ─────────────────────────────────────────────
function addMsg(role,html){
  var ca=document.getElementById('chatArea');if(!ca)return;
  var d=document.createElement('div');d.className=role==='user'?'msg-user':'msg-ai';
  d.innerHTML=role==='user'?`<div class="bbl-user">${html}</div>`:`<div class="bbl-ai"><div class="sender">DATESENSE</div>${html}</div>`;
  ca.appendChild(d);ca.scrollTop=ca.scrollHeight;
  saveMsg(S.activeDossier,role,html);
}
function showT(){var ca=document.getElementById('chatArea');if(!ca)return;var d=document.createElement('div');d.className='msg-ai';d.id='typ';d.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';ca.appendChild(d);ca.scrollTop=ca.scrollHeight;}
function hideT(){var t=document.getElementById('typ');if(t)t.remove();}

function quickFill(){
  var isOwn=S.activeDossier==='OWN Sense';
  var ex=isOwn?['Ik voel me vandaag erg goed in mijn vel.','Ik merk dat ik steeds directer word in gesprekken.','Na de date van gisteren voel ik me onzeker.','Ik zoek iemand die eerlijk en avontuurlijk is.','Ik ben gevoelig maar dat vind ik een kracht.']:['Ze stuurde een heel lief berichtje gisteren.','Hij heeft al 3 dagen niet gereageerd.','De date was super leuk, er was duidelijk een klik.','Ik weet niet of ze echt interesse heeft.','Ze was heel open en eerlijk tijdens ons gesprek.'];
  var inp=document.getElementById('msgInput');inp.value=ex[Math.floor(Math.random()*ex.length)];inp.focus();autoResize(inp);
}

// ── Auto dossier detectie ──────────────────────────────────────
function detectPerson(text){
  var cs=S.profiles.filter(p=>p!=='OWN Sense');
  for(var p of cs){var fn=p.replace('Sense','').toLowerCase();if(text.toLowerCase().includes(fn))return{type:'existing',name:p,fn:p.replace('Sense','')};}
  var words=text.split(/\s+/);
  var common=new Set(['Ik','De','Het','Een','En','Maar','Dit','Dat','Die','Wat','Hoe','Haar','Zijn','Mijn','Heel','Fijn','Goed','Leuk','Was','Had','Heb','Ben','Ze','Hij','Wij','Dat','Als','Dan','Nu','Wel','Niet','Ook']);
  for(var i=1;i<words.length;i++){var w=words[i].replace(/[^a-zA-ZÀ-ÿ]/g,'');if(w.length>2&&w[0]===w[0].toUpperCase()&&w[0]!==w[0].toLowerCase()&&!common.has(w))return{type:'new',name:w,sn:w+'Sense'};}
  return null;
}

async function sendMsg(){
  if(S.busy)return;
  if(!S.apiKey){toast('⚠️ Eerst API key instellen via ⚙️');return;}
  var inp=document.getElementById('msgInput');var txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';S.busy=true;
  addMsg('user',txt);

  // Auto-detectie alleen als actief dossier OWN Sense is
  if(S.activeDossier==='OWN Sense'){
    var det=detectPerson(txt);
    if(det){
      var sugHtml='';
      if(det.type==='existing'){
        sugHtml=`<div class="doss-suggest"><div class="ds-lbl">📁 DOSSIER DETECTIE</div><div class="ds-txt">Ik zie dat je het over <strong>${det.fn}</strong> hebt. Dit opslaan in <strong>${det.name}</strong>?</div><div class="ds-btns"><button class="aa r" onclick="switchAndProcess('${det.name}','${escQ(txt)}')">Ja, in ${det.name}</button><button class="aa g" onclick="continueOwn('${escQ(txt)}')">Nee, in OWN Sense</button><button class="aa y" onclick="openDrawer()">Ander dossier kiezen</button></div></div>`;
      } else {
        sugHtml=`<div class="doss-suggest"><div class="ds-lbl">🆕 NIEUWE PERSOON</div><div class="ds-txt">Ik zie de naam <strong>${det.name}</strong>. Wil je een dossier aanmaken voor ${det.name}?</div><div class="ds-btns"><button class="aa r" onclick="createAndProcess('${det.name}','${escQ(txt)}')">Ja, maak ${det.sn} aan</button><button class="aa g" onclick="continueOwn('${escQ(txt)}')">Nee, in OWN Sense</button><button class="aa y" onclick="openDrawer()">Ander dossier kiezen</button></div></div>`;
      }
      addMsg('ai',sugHtml);
      S.busy=false;return;
    }
  }
  await processMsg(txt);
}

function escQ(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

async function switchAndProcess(name,txt){
  S.activeDossier=name;
  document.querySelector('.ad-name').textContent=name;
  document.querySelector('.ad-dot').style.background='var(--r)';
  await ensureP(name);
  S.apiHist[name]=await loadApiH(name);
  // Update props display
  var d=S.pdata[name]||{props:{...DP}};
  PK.forEach((k,i)=>{var v=d.props[k]||0;var e=document.getElementById('vp'+i);var ep=document.getElementById('vpp'+i);if(e)e.style.width=v+'%';if(ep)ep.textContent=v+'%';});
  toast('📁 Gewisseld naar '+name);
  S.busy=false;
  // Update hint tekst
  var hint=document.querySelector('.active-dossier-bar').nextElementSibling.nextElementSibling;
  if(hint)hint.textContent='Vertel me over '+name.replace('Sense','')+'...';
  await processMsg(txt);
}

async function createAndProcess(firstName,txt){
  var sn=firstName+'Sense';
  await ensureP(sn);
  toast('✅ '+sn+' aangemaakt!');
  await switchAndProcess(sn,txt);
}

async function continueOwn(txt){
  S.busy=false;
  await processMsg(txt);
}

async function processMsg(txt){
  if(!S.apiHist[S.activeDossier])S.apiHist[S.activeDossier]=[];
  S.apiHist[S.activeDossier].push({role:'user',content:txt});
  if(S.apiHist[S.activeDossier].length>20)S.apiHist[S.activeDossier]=S.apiHist[S.activeDossier].slice(-20);
  await saveApiM(S.activeDossier,'user',txt);
  showT();
  var pd=S.pdata[S.activeDossier]||{props:{...DP},count:0};var p=pd.props;
  var isOwn=S.activeDossier==='OWN Sense';
  var sys=`Je bent DateSensei, een empathische AI dating coach in de DateSense app. Actief dossier: "${S.activeDossier}". ${isOwn?'Dit is het persoonlijk profiel van de gebruiker zelf.':'Dit is een dossier over een contactpersoon genaamd '+S.activeDossier.replace('Sense','')+'.'} Eigenschappen nu: Gevoeligheid ${p.gevoeligheid}%, Openheid ${p.openheid}%, Humor ${p.humor}%, Directheid ${p.directheid}%, Avontuur ${p.avontuur}%.

Reageer ALTIJD in het Nederlands. Wees warm, direct, eerlijk. Max 2-3 zinnen.

Geef antwoord als puur geldig JSON (GEEN markdown, GEEN tekst buiten JSON):
{"reactie":"...","segmenten":[{"tekst":"...","dossier":"OWN of voornaam persoon"}],"props_update":{"gevoeligheid":null,"openheid":null,"humor":null,"directheid":null,"avontuur":null},"advies_vraag":true}`;
  try{
    var raw=await callAPI(sys,S.apiHist[S.activeDossier],800);
    var clean=raw.replace(/```json|```/g,'').trim();var parsed=JSON.parse(clean);
    hideT();
    S.apiHist[S.activeDossier].push({role:'assistant',content:raw});
    await saveApiM(S.activeDossier,'assistant',raw);
    if(parsed.props_update)pd.props=updProps(parsed.props_update,pd.props);
    pd.count=(pd.count||0)+1;S.pdata[S.activeDossier]=pd;
    await saveP(S.activeDossier,pd.props,pd.count);
    var html=parsed.reactie||'Begrepen, opgeslagen.';
    if(parsed.segmenten&&parsed.segmenten.length){html+='<div class="seg-wrap">';parsed.segmenten.forEach(s=>{var own=s.dossier==='OWN'||s.dossier==='OWN Sense';html+=`<span class="seg ${own?'seg-own':'seg-contact'}" title="→ ${s.dossier}">${s.tekst}</span> `;});html+='<div class="seg-legend"><span style="background:#BBDEFB;color:#0D47A1">OWN Sense</span><span style="background:#FFE0B2;color:#BF360C">Contact</span></div></div>';}
    if(parsed.advies_vraag)html+='<div class="ai-actions"><button class="aa r" onclick="askAdvice()">Ja, graag advies</button><button class="aa g" onclick="justSave()">Nee, gewoon opslaan</button></div>';
    addMsg('ai',html);
  }catch(x){hideT();addMsg('ai','Fout: '+x.message);console.error(x);}
  S.busy=false;
}

function updProps(u,p){
  PK.forEach((k,i)=>{if(u[k]!==null&&u[k]!==undefined){var v=Math.min(100,Math.max(0,parseInt(u[k])));if(!isNaN(v)){p[k]=v;var e=document.getElementById('vp'+i);var ep=document.getElementById('vpp'+i);if(e)e.style.width=v+'%';if(ep)ep.textContent=v+'%';}}});
  return p;
}

async function askAdvice(){
  if(S.busy)return;S.busy=true;addMsg('user','Ja, graag advies.');
  if(!S.apiHist[S.activeDossier])S.apiHist[S.activeDossier]=[];
  S.apiHist[S.activeDossier].push({role:'user',content:'Ja, graag advies.'});
  await saveApiM(S.activeDossier,'user','Ja, graag advies.');
  showT();
  var sys=`Je bent DateSensei, empathische AI dating coach. Dossier: "${S.activeDossier}". Geef CONCREET eerlijk advies. Max 3-4 zinnen, 1-2 actiestappen. Warm maar direct. Nederlands. Geen JSON.`;
  try{var t=await callAPI(sys,S.apiHist[S.activeDossier],500);hideT();S.apiHist[S.activeDossier].push({role:'assistant',content:t});await saveApiM(S.activeDossier,'assistant',t);addMsg('ai',`<span style="font-size:11px;font-weight:700;color:var(--r);letter-spacing:.8px">ADVIES</span><br><br>${t}`);}
  catch(x){hideT();addMsg('ai','Advies fout: '+x.message);}
  S.busy=false;
}

function justSave(){
  addMsg('ai',`✅ Opgeslagen in <strong>${S.activeDossier}</strong>. Vertel me gerust meer.`);
  if(!S.apiHist[S.activeDossier])S.apiHist[S.activeDossier]=[];
  S.apiHist[S.activeDossier].push({role:'user',content:'Nee, gewoon opslaan.'});
  S.apiHist[S.activeDossier].push({role:'assistant',content:'Opgeslagen.'});
}

function timeAgo(iso){var d=Math.floor((Date.now()-new Date(iso))/1000);if(d<60)return'Zojuist';if(d<3600)return Math.floor(d/60)+' min';if(d<86400)return Math.floor(d/3600)+' uur';return Math.floor(d/86400)+' d geleden';}

// ── Init ───────────────────────────────────────────────────────
init();
</script>
