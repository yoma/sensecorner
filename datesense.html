<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DateSense — Jouw persoonlijke dating coach</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:16px;overflow:hidden}
:root{--r:#AE0000;--rl:#FFF5F5;--g:#F8F9FA;--b:#E5E5E5;--m:#888;--t:#1A1A1A;--safe-bottom:env(safe-area-inset-bottom,0px)}

/* Full screen app */
.app{width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}

/* Top bar */
.topbar{display:flex;align-items:center;padding:12px 16px 8px;padding-top:calc(12px + env(safe-area-inset-top,0px));gap:6px;flex-shrink:0;background:#fff;border-bottom:1px solid var(--b)}
.topbar-title{flex:1;font-size:16px;font-weight:700;text-align:center;color:var(--t)}
.ico{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:none;border:none;border-radius:18px}
.ico:active{background:var(--g)}

/* Logo bar */
.logobar{display:flex;align-items:center;gap:12px;padding:8px 16px 12px;background:#fff;flex-shrink:0}
.avatar{width:44px;height:44px;border-radius:22px;overflow:hidden;flex-shrink:0;border:2px solid var(--b);background:#eee;display:flex;align-items:center;justify-content:center}
.brand{font-size:22px;font-weight:800;color:var(--t);letter-spacing:-0.5px;line-height:1}
.brand .dot{color:var(--r)}
.tagline{font-size:11px;color:var(--r);font-style:italic;margin-top:2px}

/* Profile bar */
.profbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--b);flex-shrink:0}
.pdot{width:9px;height:9px;border-radius:5px;background:var(--r);flex-shrink:0}
.pname{flex:1;font-size:15px;font-weight:600;color:var(--t)}
.pswitch{font-size:14px;color:var(--r);cursor:pointer;font-weight:600;background:none;border:none;padding:4px 8px}

/* Main scroll */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}

/* Props */
.props-wrap{padding:14px 16px 4px;flex-shrink:0;background:#fff}
.prop{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pn{width:96px;font-size:13px;color:#333;flex-shrink:0}
.track{flex:1;height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.fill{height:100%;background:var(--r);border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.pct{width:38px;font-size:12px;color:var(--r);font-weight:700;text-align:right}

/* Hint */
.hint{font-size:12px;color:#aaa;text-align:center;line-height:1.6;padding:8px 16px 10px;font-style:italic;border-bottom:1px solid var(--b);flex-shrink:0}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg-ai{display:flex;flex-direction:column;gap:4px}
.bbl-ai{background:var(--rl);border:1px solid #FFD5D5;border-radius:16px 16px 16px 4px;padding:13px 15px;font-size:15px;color:#333;line-height:1.55;max-width:92%}
.bbl-ai .sender{font-size:11px;font-weight:700;color:var(--r);margin-bottom:5px;letter-spacing:.8px}
.msg-user{display:flex;justify-content:flex-end}
.bbl-user{background:var(--r);border-radius:16px 16px 4px 16px;padding:13px 15px;font-size:15px;color:#fff;line-height:1.55;max-width:92%}

/* Segments */
.seg-wrap{background:#fff;border-radius:10px;padding:12px;margin-top:8px;border:1px solid #EEE;font-size:14px;line-height:2.2}
.seg{border-radius:4px;padding:2px 6px;cursor:pointer;display:inline}
.seg-own{background:#BBDEFB;color:#0D47A1}
.seg-contact{background:#FFE0B2;color:#BF360C}
.seg-legend{font-size:11px;color:#aaa;margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.seg-legend span{padding:2px 10px;border-radius:4px}

/* Dossier suggestion box */
.dossier-suggest{background:#FFF8E1;border:1.5px solid #FFE082;border-radius:12px;padding:13px 15px;margin-top:8px}
.dossier-suggest .ds-title{font-size:12px;font-weight:700;color:#F57F17;margin-bottom:8px;letter-spacing:.5px}
.dossier-suggest .ds-text{font-size:14px;color:#333;margin-bottom:10px;line-height:1.5}
.dossier-suggest .ds-btns{display:flex;gap:8px;flex-wrap:wrap}

/* Action buttons */
.ai-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.aa{padding:9px 16px;border-radius:20px;font-size:14px;border:none;cursor:pointer;font-family:inherit;font-weight:600}
.aa:active{opacity:.8}
.aa.r{background:var(--r);color:#fff}
.aa.g{background:var(--g);color:#555;border:1px solid var(--b)}
.aa.y{background:#FFF8E1;color:#E65100;border:1px solid #FFE082}

/* Typing */
.typing{display:flex;align-items:center;gap:5px;padding:13px 15px;background:var(--rl);border:1px solid #FFD5D5;border-radius:16px;width:fit-content}
.typing span{width:8px;height:8px;border-radius:4px;background:var(--r);animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Input bar */
.inputbar{display:flex;align-items:center;gap:10px;padding:10px 16px;padding-bottom:calc(10px + var(--safe-bottom));background:#fff;border-top:1px solid var(--b);flex-shrink:0}
.inputfield{flex:1;background:var(--g);border:1px solid var(--b);border-radius:24px;padding:11px 18px;font-size:15px;color:#333;outline:none;font-family:inherit}
.inputfield:focus{border-color:#ccc}
.inputfield::placeholder{color:#bbb}
.rnd{width:44px;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none}
.rnd:active{opacity:.8}
.rnd.gr{background:var(--g);border:1px solid var(--b)}
.rnd.rd{background:var(--r)}

/* Nav */
.nav{background:#fff;border-top:1px solid var(--b);display:flex;padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--m);background:none;border:none}
.tab.active{color:var(--r)}
.tab svg{width:24px;height:24px}
.tab span{font-size:10px;font-weight:600;letter-spacing:.3px}

/* Overlay + Drawer */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none}
.overlay.show{display:block}
.drawer{position:absolute;top:0;left:0;width:82%;max-width:320px;height:100%;background:#fff;z-index:51;padding:60px 22px 24px;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.drawer.open{transform:translateX(0)}
.drow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #F0F0F0;cursor:pointer}
.drow:active{opacity:.7}
.badge{background:#F0F0F0;border-radius:12px;padding:3px 10px;font-size:12px;color:var(--m);font-weight:600}
.dlabel{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1.2px;margin:18px 0 8px}
.dlabel:first-child{margin-top:0}

/* Home */
.home-wrap{padding:16px 16px 32px}
.mic-btn{width:120px;height:120px;border-radius:60px;background:var(--r);display:flex;align-items:center;justify-content:center;margin:16px auto 12px;cursor:pointer;border:none;box-shadow:0 8px 28px rgba(174,0,0,.3)}
.mic-btn:active{transform:scale(.95)}
.mic-btn.sm{width:80px;height:80px;border-radius:40px}
.home-sub{font-size:14px;color:var(--m);text-align:center;line-height:1.65;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.btn-r{width:100%;padding:18px 10px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;background:var(--r);color:#fff}
.btn-r:active{opacity:.85}
.btn-g{width:100%;padding:18px 10px;border-radius:14px;border:none;font-size:14px;font-weight:500;cursor:pointer;text-align:center;font-family:inherit;background:var(--g);color:#333;border:1px solid var(--b)}
.sh{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin:20px 0 12px}
.ncard{border-radius:14px;padding:14px 16px;background:var(--g);margin-bottom:10px;border-left:5px solid #999}
.ncard.s{border-left-color:var(--r)}
.ncard.a{border-left-color:#E07800}
.ncard.c{border-left-color:#0066CC}
.ncat{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
.ncard.s .ncat{color:var(--r)}
.ncard.a .ncat{color:#E07800}
.ncard.c .ncat{color:#0066CC}
.ntext{font-size:14px;color:#333;line-height:1.5}
.nlink{font-size:13px;color:var(--r);margin-top:6px;cursor:pointer;display:block;font-weight:600}

/* Senses list */
.srow{display:flex;align-items:center;gap:13px;padding:16px 0;border-bottom:1px solid var(--b);cursor:pointer}
.sdot{width:10px;height:10px;border-radius:5px;background:var(--r);flex-shrink:0}
.del-btn{background:#FFF0F0;border:none;color:var(--r);font-size:12px;font-weight:700;padding:6px 12px;border-radius:10px;cursor:pointer;font-family:inherit}

/* OWN */
.mbtn{padding:10px 16px;border-radius:22px;background:var(--g);border:1px solid var(--b);font-size:14px;cursor:pointer;font-family:inherit}
.mbtn.on{background:#FFE8E8;color:var(--r);border-color:#FFD5D5;font-weight:600}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;background:var(--g);border-radius:13px;margin-bottom:10px;cursor:pointer}

/* Forms */
.form-input{width:100%;padding:14px 18px;border:1.5px solid var(--b);border-radius:14px;font-size:15px;font-family:inherit;outline:none;color:var(--t);margin-bottom:14px;background:#fff}
.form-input:focus{border-color:var(--r)}
.form-btn{width:100%;padding:17px;background:var(--r);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px}
.form-btn:active{opacity:.85}
.form-btn.sec{background:var(--g);color:#333;border:1px solid var(--b)}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 22px;border-radius:24px;font-size:14px;font-weight:600;z-index:200;white-space:nowrap;pointer-events:none;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Sync */
.sync-bar{font-size:11px;text-align:center;padding:3px;flex-shrink:0;min-height:18px}
.sync-bar.syncing{color:var(--r)}
.sync-bar.synced{color:#4CAF50}

/* Date divider */
.hdate{font-size:11px;color:#bbb;text-align:center;margin:6px 0;font-weight:600;letter-spacing:.5px}

/* Compare */
.cmp-row{display:flex;gap:3px;margin-bottom:5px}
.cmp-label{flex:2;font-size:13px;color:#555;padding:11px 12px;background:#FAFAFA;border-radius:10px 0 0 10px;display:flex;align-items:center}
.cmp-val{flex:1;font-size:13px;text-align:center;padding:11px 8px;display:flex;align-items:center;justify-content:center}
.cmp-val.t1{background:#FFF5F5}
.cmp-val.t2{background:#F5F5FF;border-radius:0 10px 10px 0}
</style>
</head>

<script>
const SUPA_URL='https://ghuqjtdrkwssyqvcubcd.supabase.co';
const SUPA_KEY='sb_publishable_ShIeY18JCYiH8fyXm_anHw_Y1jP2skq';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
const PK=['gevoeligheid','openheid','humor','directheid','avontuur'];
const PL=['Gevoeligheid','Openheid','Humor','Directheid','Avontuur'];
const DP={gevoeligheid:75,openheid:60,humor:45,directheid:30,avontuur:20};

var state={user:null,apiKey:localStorage.getItem('ds_apikey')||'',profile:'OWN Sense',screen:'home',prev:'home',busy:false,profiles:[],profileData:{},apiHist:{}};

// ── Sync ───────────────────────────────────────────────────────
function setSyncStatus(s){var el=document.getElementById('syncBar');if(s==='syncing'){el.textContent='↑ Synchroniseren...';el.className='sync-bar syncing';}else if(s==='synced'){el.textContent='✓ Gesynchroniseerd';el.className='sync-bar synced';setTimeout(function(){el.textContent='';el.className='sync-bar';},2000);}else{el.textContent='';el.className='sync-bar';}}

// ── Toast ──────────────────────────────────────────────────────
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('app').appendChild(t);setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},2500);}

// ── Auth ───────────────────────────────────────────────────────
async function initAuth(){
  var {data:{session}}=await sb.auth.getSession();
  if(session){state.user=session.user;await loadAllProfiles();goScreen('home');}
  else{goScreen('login');}
  sb.auth.onAuthStateChange(function(event,session){
    if(event==='SIGNED_IN'&&session){state.user=session.user;loadAllProfiles().then(function(){goScreen('home');});}
    else if(event==='SIGNED_OUT'){state.user=null;state.profiles=[];state.profileData={};goScreen('login');}
  });
}

async function signUp(e,p){var {error}=await sb.auth.signUp({email:e,password:p});if(error)throw error;}
async function signIn(e,p){var {error}=await sb.auth.signInWithPassword({email:e,password:p});if(error)throw error;}
async function signOut(){await sb.auth.signOut();}

// ── Data ───────────────────────────────────────────────────────
async function loadAllProfiles(){
  if(!state.user)return;
  var {data,error}=await sb.from('sense_profiles').select('*').eq('user_id',state.user.id).order('created_at');
  if(error){console.error(error);return;}
  state.profiles=['OWN Sense'];state.profileData={};
  if(!data||!data.length){await ensureProfile('OWN Sense');}
  else{data.forEach(function(p){if(p.name!=='OWN Sense')state.profiles.push(p.name);state.profileData[p.name]={props:p.props||Object.assign({},DP),count:p.entry_count||0,lastActive:p.last_active};});if(!state.profileData['OWN Sense'])await ensureProfile('OWN Sense');}
}

async function ensureProfile(name){
  if(!state.user||state.profileData[name])return;
  var props=Object.assign({},DP);
  await sb.from('sense_profiles').upsert({user_id:state.user.id,name:name,props:props,entry_count:0},{onConflict:'user_id,name'});
  state.profileData[name]={props:props,count:0,lastActive:null};
  if(name!=='OWN Sense'&&state.profiles.indexOf(name)===-1)state.profiles.push(name);
}

async function updateProfile(name,props,count){
  if(!state.user)return;setSyncStatus('syncing');
  await sb.from('sense_profiles').upsert({user_id:state.user.id,name:name,props:props,entry_count:count,last_active:new Date().toISOString()},{onConflict:'user_id,name'});
  if(state.profileData[name]){state.profileData[name].props=props;state.profileData[name].count=count;state.profileData[name].lastActive=new Date().toISOString();}
  setSyncStatus('synced');
}

async function cmpAdvies(c1,c2){
  if(!state.apiKey){toast('⚠️ Eerst API key instellen!');return;}
  var box=document.getElementById('cmpBox');if(box)box.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  var d1=state.profileData[c1]||{props:Object.assign({},DP)},d2=state.profileData[c2]||{props:Object.assign({},DP)};
  var sys='Je bent DateSensei. Vergelijk '+c1+' en '+c2+' op basis van hun eigenschappen. Geef een eerlijk advies in het Nederlands. Max 4 zinnen.';
  try{var t=await callAPI(sys,[{role:'user',content:'Vergelijk '+c1+' ('+JSON.stringify(d1.props)+') met '+c2+' ('+JSON.stringify(d2.props)+').'}],400);if(box)box.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--r);margin-bottom:10px;letter-spacing:.5px">ADVIES</div><div style="font-size:14px;color:#333;line-height:1.6">'+t+'</div>';}
  catch(e){if(box)box.innerHTML='<div style="font-size:14px;color:red">Fout: '+e.message+'</div>';}
}

// ── Props ──────────────────────────────────────────────────────
function rPropsHtml(pfx,props){return PK.map(function(k,i){var v=(props&&props[k])||0;return'<div class="prop"><div class="pn">'+PL[i]+'</div><div class="track"><div class="fill" id="'+pfx+i+'" style="width:'+v+'%"></div></div><div class="pct" id="'+pfx+'p'+i+'">'+v+'%</div></div>';}).join('');}

function updPropsUI(pfx,u,p){PK.forEach(function(k,i){if(u[k]!==null&&u[k]!==undefined){var v=Math.min(100,Math.max(0,parseInt(u[k])));if(!isNaN(v)){p[k]=v;var e=document.getElementById(pfx+i);var ep=document.getElementById(pfx+'p'+i);if(e)e.style.width=v+'%';if(ep)ep.textContent=v+'%';}}});return p;}

// ── API ────────────────────────────────────────────────────────
async function callAPI(sys,msgs,maxTok){
  var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok||800,system:sys,messages:msgs})});
  var data=await res.json();if(data.error)throw new Error(data.error.message);
  return(data.content&&data.content[0]&&data.content[0].text)||'';
}

// ── Chat ───────────────────────────────────────────────────────
function addMsg(role,html){
  var ca=document.getElementById('chatArea');if(!ca)return;
  var d=document.createElement('div');d.className=role==='user'?'msg-user':'msg-ai';
  d.innerHTML=role==='user'?'<div class="bbl-user">'+html+'</div>':'<div class="bbl-ai"><div class="sender">DATESENSE</div>'+html+'</div>';
  ca.appendChild(d);ca.scrollTop=ca.scrollHeight;
  saveMessage(state.profile,role,html);
}

function showT(){var ca=document.getElementById('chatArea');if(!ca)return;var d=document.createElement('div');d.className='msg-ai';d.id='typ';d.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';ca.appendChild(d);ca.scrollTop=ca.scrollHeight;}
function hideT(){var t=document.getElementById('typ');if(t)t.remove();}

function quickFill(){
  var isOwn=state.profile==='OWN Sense';
  var ex=isOwn?['Ik voel me vandaag erg goed in mijn vel.','Ik merk dat ik steeds directer word in gesprekken.','Na de date van gisteren voel ik me onzeker.','Ik zoek iemand die eerlijk en avontuurlijk is.','Ik ben gevoelig maar dat vind ik een kracht.']:['Ze stuurde een heel lief berichtje gisteren.','Hij heeft al 3 dagen niet gereageerd.','De date was super leuk, er was duidelijk een klik.','Ik weet niet of ze echt interesse heeft.','Ze was heel open en eerlijk tijdens ons gesprek.'];
  document.getElementById('msgInput').value=ex[Math.floor(Math.random()*ex.length)];document.getElementById('msgInput').focus();
}

// ── Auto dossier detectie ──────────────────────────────────────
function detectPersonInText(text){
  // Check bestaande dossiers
  var cs=state.profiles.filter(function(p){return p!=='OWN Sense';});
  for(var i=0;i<cs.length;i++){
    var firstName=cs[i].replace('Sense','').toLowerCase();
    if(text.toLowerCase().indexOf(firstName)!==-1)return{type:'existing',name:cs[i],firstName:firstName};
  }
  // Zoek naar namen (woord met hoofdletter dat geen zinsbegin is)
  var words=text.split(/\s+/);
  for(var j=1;j<words.length;j++){
    var w=words[j].replace(/[^a-zA-ZÀ-ÿ]/g,'');
    if(w.length>2&&w[0]===w[0].toUpperCase()&&w[0]!==w[0].toLowerCase()){
      // Filter common words
      var common=['Ik','De','Het','Een','En','Maar','Dit','Dat','Die','Wat','Hoe','Haar','Zijn','Mijn','Onze','Heel','Fijn','Goed','Leuk'];
      if(common.indexOf(w)===-1)return{type:'new',name:w,senseNaam:w+'Sense'};
    }
  }
  return null;
}

async function sendMsg(){
  if(state.busy)return;
  if(!state.apiKey){toast('⚠️ Eerst API key instellen via ⚙️');return;}
  var inp=document.getElementById('msgInput');var txt=inp.value.trim();if(!txt)return;
  inp.value='';state.busy=true;addMsg('user',txt);

  // Auto detecteer persoon in tekst
  if(state.profile==='OWN Sense'){
    var detected=detectPersonInText(txt);
    if(detected){
      if(detected.type==='existing'){
        // Stel voor om te wisselen naar bestaand dossier
        var switchHtml='<div class="dossier-suggest"><div class="ds-title">📁 DOSSIER DETECTIE</div><div class="ds-text">Ik zie dat je het over <strong>'+detected.firstName+'</strong> hebt. Wil je dit opslaan in <strong>'+detected.name+'</strong>?</div><div class="ds-btns"><button class="aa r" onclick="switchAndResend(\''+detected.name+'\',\''+txt.replace(/'/g,"\\'")+'\')" >Ja, opslaan in '+detected.name+'</button><button class="aa g" onclick="continueInOWN()">Nee, bewaar in OWN Sense</button></div></div>';
        addMsg('ai',switchHtml);
        state.busy=false;return;
      } else if(detected.type==='new'){
        // Stel voor om nieuw dossier aan te maken
        var newHtml='<div class="dossier-suggest"><div class="ds-title">🆕 NIEUWE PERSOON HERKEND</div><div class="ds-text">Ik zie de naam <strong>'+detected.name+'</strong> in je bericht. Wil je een dossier aanmaken voor '+detected.name+'?</div><div class="ds-btns"><button class="aa r" onclick="createAndResend(\''+detected.name+'\',\''+txt.replace(/'/g,"\\'")+'\')" >Ja, maak '+detected.senseNaam+' aan</button><button class="aa g" onclick="continueInOWN()">Nee, bewaar in OWN Sense</button></div></div>';
        addMsg('ai',newHtml);
        state.busy=false;return;
      }
    }
  }

  await processMsg(txt);
}

async function switchAndResend(profileName,txt){
  state.profile=profileName;
  document.getElementById('pname').textContent=profileName;
  await ensureProfile(profileName);
  state.apiHist[profileName]=await loadApiHistory(profileName);
  // Update props display
  var d=state.profileData[profileName]||{props:Object.assign({},DP)};
  PK.forEach(function(k,i){var v=d.props[k]||0;var e=document.getElementById('vp'+i);var ep=document.getElementById('vpp'+i);if(e)e.style.width=v+'%';if(ep)ep.textContent=v+'%';});
  toast('📁 Gewisseld naar '+profileName);
  state.busy=false;
  var inp=document.getElementById('msgInput');
  inp.value=txt;
  sendMsg();
}

async function createAndResend(firstName,txt){
  var senseNaam=firstName+'Sense';
  await ensureProfile(senseNaam);
  state.profiles.push(senseNaam);
  toast('✅ '+senseNaam+' aangemaakt!');
  switchAndResend(senseNaam,txt);
}

function continueInOWN(){
  var inp=document.getElementById('msgInput');
  // Continue processing — remove the suggestion and process in OWN
  state.busy=false;
  // Just process normally in OWN Sense
  var lastMsg=state.apiHist[state.profile]||[];
  // Get the last user message from chat
  var ca=document.getElementById('chatArea');
  if(ca){
    var userBubbles=ca.querySelectorAll('.bbl-user');
    if(userBubbles.length){
      var lastTxt=userBubbles[userBubbles.length-1].textContent;
      processMsg(lastTxt);
    }
  }
}

async function processMsg(txt){
  if(!state.apiHist[state.profile])state.apiHist[state.profile]=[];
  state.apiHist[state.profile].push({role:'user',content:txt});
  if(state.apiHist[state.profile].length>20)state.apiHist[state.profile]=state.apiHist[state.profile].slice(-20);
  await saveApiMsg(state.profile,'user',txt);
  showT();
  var pd=state.profileData[state.profile]||{props:Object.assign({},DP),count:0};
  var p=pd.props;
  var sys='Je bent DateSensei, een empathische AI dating coach in de DateSense app. Actief dossier: "'+state.profile+'". '+(state.profile==='OWN Sense'?'Dit is het persoonlijk profiel van de gebruiker zelf.':'Dit is een dossier over een contactpersoon genaamd '+state.profile.replace('Sense','')+'.')+' Eigenschappen nu: Gevoeligheid '+p.gevoeligheid+'%, Openheid '+p.openheid+'%, Humor '+p.humor+'%, Directheid '+p.directheid+'%, Avontuur '+p.avontuur+'%.\n\nReageer ALTIJD in het Nederlands. Wees warm, direct, eerlijk. Max 2-3 zinnen.\n\nGeef antwoord als puur geldig JSON (GEEN markdown, GEEN tekst buiten JSON):\n{"reactie":"...","segmenten":[{"tekst":"...","dossier":"OWN of voornaam persoon"}],"props_update":{"gevoeligheid":null,"openheid":null,"humor":null,"directheid":null,"avontuur":null},"advies_vraag":true}';
  try{
    var raw=await callAPI(sys,state.apiHist[state.profile],800);
    var clean=raw.replace(/```json|```/g,'').trim();var parsed=JSON.parse(clean);
    hideT();
    state.apiHist[state.profile].push({role:'assistant',content:raw});
    await saveApiMsg(state.profile,'assistant',raw);
    if(parsed.props_update){pd.props=updPropsUI('vp',parsed.props_update,pd.props);}
    pd.count=(pd.count||0)+1;
    state.profileData[state.profile]=pd;
    await updateProfile(state.profile,pd.props,pd.count);
    var html=parsed.reactie||'Begrepen, opgeslagen.';
    if(parsed.segmenten&&parsed.segmenten.length){html+='<div class="seg-wrap">';parsed.segmenten.forEach(function(s){var own=s.dossier==='OWN'||s.dossier==='OWN Sense';html+='<span class="seg '+(own?'seg-own':'seg-contact')+'" title="→ '+s.dossier+'">'+s.tekst+'</span> ';});html+='<div class="seg-legend"><span style="background:#BBDEFB;color:#0D47A1">OWN Sense</span><span style="background:#FFE0B2;color:#BF360C">Contact</span></div></div>';}
    if(parsed.advies_vraag)html+='<div class="ai-actions"><button class="aa r" onclick="askAdvice()">Ja, graag advies</button><button class="aa g" onclick="justSave()">Nee, gewoon opslaan</button></div>';
    addMsg('ai',html);
  }catch(e){hideT();addMsg('ai','Fout: '+e.message);console.error(e);}
  state.busy=false;
}

async function askAdvice(){
  if(state.busy)return;state.busy=true;addMsg('user','Ja, graag advies.');
  if(!state.apiHist[state.profile])state.apiHist[state.profile]=[];
  state.apiHist[state.profile].push({role:'user',content:'Ja, graag advies.'});
  await saveApiMsg(state.profile,'user','Ja, graag advies.');
  showT();
  var sys='Je bent DateSensei, empathische AI dating coach. Dossier: "'+state.profile+'". Geef CONCREET eerlijk advies. Max 3-4 zinnen, 1-2 actiestappen. Warm maar direct. Nederlands. Geen JSON.';
  try{var t=await callAPI(sys,state.apiHist[state.profile],500);hideT();state.apiHist[state.profile].push({role:'assistant',content:t});await saveApiMsg(state.profile,'assistant',t);addMsg('ai','<span style="font-size:11px;font-weight:700;color:var(--r);letter-spacing:.8px">ADVIES</span><br><br>'+t);}
  catch(e){hideT();addMsg('ai','Advies fout: '+e.message);}
  state.busy=false;
}

function justSave(){
  addMsg('ai','✅ Opgeslagen in <strong>'+state.profile+'</strong>. Vertel me gerust meer.');
  if(!state.apiHist[state.profile])state.apiHist[state.profile]=[];
  state.apiHist[state.profile].push({role:'user',content:'Nee, gewoon opslaan.'});
  state.apiHist[state.profile].push({role:'assistant',content:'Opgeslagen.'});
}

// ── Utilities ──────────────────────────────────────────────────
function timeAgo(iso){var d=Math.floor((Date.now()-new Date(iso))/1000);if(d<60)return'Zojuist';if(d<3600)return Math.floor(d/60)+' min';if(d<86400)return Math.floor(d/3600)+' uur';return Math.floor(d/86400)+' d geleden';}

initAuth();
