<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DateSense — Jouw persoonlijke dating coach</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow:hidden}
:root{--r:#AE0000;--rl:#FFF5F5;--g:#F8F9FA;--b:#E5E5E5;--m:#888;--t:#1A1A1A;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}

.app{width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}

/* Topbar */
.topbar{display:flex;align-items:center;padding:12px 14px 8px;padding-top:calc(12px + var(--st));flex-shrink:0;background:#fff;border-bottom:1px solid var(--b)}
.tb-title{flex:1;font-size:17px;font-weight:700;text-align:center;color:var(--t)}
.ico{width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:none;border:none;border-radius:19px}
.ico:active{background:var(--g)}

/* Logobar */
.logobar{display:flex;align-items:center;gap:12px;padding:8px 16px 10px;flex-shrink:0}
.av{width:42px;height:42px;border-radius:21px;overflow:hidden;flex-shrink:0;border:2px solid var(--b);background:#eee}
.brand{font-size:22px;font-weight:800;color:var(--t);letter-spacing:-.5px;line-height:1}
.brand .dot{color:var(--r)}
.tag{font-size:11px;color:var(--r);font-style:italic;margin-top:2px}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Nav */
.nav{background:#fff;border-top:1px solid var(--b);display:flex;padding:6px 0;padding-bottom:calc(6px + var(--sb));flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;color:var(--m);background:none;border:none}
.tab.active{color:var(--r)}
.tab svg{width:23px;height:23px}
.tab span{font-size:10px;font-weight:600}

/* Drawer */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none}
.overlay.show{display:block}
.drawer{position:absolute;top:0;left:0;width:83%;max-width:310px;height:100%;background:#fff;z-index:51;overflow-y:auto;transform:translateX(-100%);transition:transform .26s ease}
.drawer.open{transform:translateX(0)}
.dr-in{padding:calc(24px + var(--st)) 20px 32px}
.drow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #F2F2F2;cursor:pointer}
.drow:active{opacity:.6}
.dbadge{background:#EBEBEB;border-radius:10px;padding:3px 10px;font-size:12px;color:var(--m);font-weight:600}
.dlbl{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1.1px;margin:16px 0 8px}

/* Buttons */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.btn-r{width:100%;padding:17px 8px;border-radius:13px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--r);color:#fff}
.btn-r:active{opacity:.8}
.btn-g{width:100%;padding:17px 8px;border-radius:13px;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--g);color:#333;border:1px solid var(--b)}
.sh{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin:20px 0 12px}
.ncard{border-radius:13px;padding:14px 16px;background:var(--g);margin-bottom:10px;border-left:5px solid #999}
.ncard.s{border-left-color:var(--r)} .ncard.a{border-left-color:#E07800} .ncard.c{border-left-color:#0066CC}
.ncat{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.ncard.s .ncat{color:var(--r)} .ncard.a .ncat{color:#E07800} .ncard.c .ncat{color:#0066CC}
.ntext{font-size:14px;color:#333;line-height:1.5}
.nlink{font-size:13px;color:var(--r);margin-top:6px;cursor:pointer;display:block;font-weight:600}

/* Mic */
.mic-btn{width:120px;height:120px;border-radius:60px;background:var(--r);display:flex;align-items:center;justify-content:center;margin:14px auto 12px;cursor:pointer;border:none;box-shadow:0 8px 28px rgba(174,0,0,.3)}
.mic-btn:active{transform:scale(.95)}
.mic-btn.sm{width:80px;height:80px;border-radius:40px}

/* Senses */
.srow{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--b);cursor:pointer}
.srow:active{opacity:.7}
.sdot{width:10px;height:10px;border-radius:5px;background:var(--r);flex-shrink:0}
.del-btn{background:#FFF0F0;border:none;color:var(--r);font-size:12px;font-weight:700;padding:6px 12px;border-radius:10px;cursor:pointer;font-family:inherit;flex-shrink:0}

/* Dossier detail */
.tabs-bar{display:flex;border-bottom:1px solid var(--b);background:#fff;flex-shrink:0}
.dtab{flex:1;padding:13px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--m);cursor:pointer;border-bottom:3px solid transparent}
.dtab.active{color:var(--r);border-bottom-color:var(--r)}
.prop{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.pn{width:96px;font-size:13px;color:#333;flex-shrink:0}
.track{flex:1;height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.fill{height:100%;background:var(--r);border-radius:3px;transition:width .6s ease}
.pct{width:38px;font-size:12px;color:var(--r);font-weight:700;text-align:right}
.match-bar{background:var(--g);border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid var(--b)}

/* ══ VERTEL scherm ══ */
.vertel-screen{display:flex;flex-direction:column;height:100%}

/* Neutraal welkom */
.vertel-welcome{padding:20px 16px 14px;text-align:center;border-bottom:1px solid var(--b);flex-shrink:0}
.vertel-welcome h2{font-size:18px;font-weight:700;color:var(--t);margin-bottom:6px}
.vertel-welcome p{font-size:14px;color:var(--m);line-height:1.6}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg-ai{display:flex;flex-direction:column;gap:4px}
.bbl-ai{background:var(--rl);border:1px solid #FFD5D5;border-radius:16px 16px 16px 4px;padding:14px 16px;font-size:16px;color:#222;line-height:1.6;max-width:96%}
.bbl-ai .sndr{font-size:11px;font-weight:700;color:var(--r);margin-bottom:6px;letter-spacing:.8px}
.msg-user{display:flex;justify-content:flex-end}
.bbl-user{background:var(--r);border-radius:16px 16px 4px 16px;padding:14px 16px;font-size:16px;color:#fff;line-height:1.6;max-width:96%}

/* Gekleurde segmenten */
.seg-result{background:#fff;border:1.5px solid var(--b);border-radius:14px;padding:14px 16px;margin-top:8px}
.seg-result-title{font-size:11px;font-weight:700;color:var(--r);letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.seg-text-area{font-size:15px;line-height:2.2;margin-bottom:12px}
.seg{border-radius:4px;padding:2px 7px;cursor:pointer;display:inline;font-size:15px}
.seg:active{opacity:.7}
.seg-own{background:#BBDEFB;color:#0D47A1}
.seg-c1{background:#FFE0B2;color:#E65100}
.seg-c2{background:#C8E6C9;color:#1B5E20}
.seg-c3{background:#E1BEE7;color:#6A1B9A}
.seg-c4{background:#FFE082;color:#E65100}
.seg-unk{background:#EEEEEE;color:#555}
.seg-legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.seg-leg-item{display:flex;align-items:center;gap:4px;font-size:12px}
.seg-leg-dot{width:10px;height:10px;border-radius:5px;flex-shrink:0}
.seg-actions{display:flex;gap:8px;flex-wrap:wrap}

/* AI actions */
.ai-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.aa{padding:10px 16px;border-radius:20px;font-size:14px;border:none;cursor:pointer;font-family:inherit;font-weight:700}
.aa:active{opacity:.7}
.aa.r{background:var(--r);color:#fff}
.aa.g{background:var(--g);color:#555;border:1px solid var(--b)}

/* Typing */
.typing{display:flex;align-items:center;gap:6px;padding:14px 16px;background:var(--rl);border:1px solid #FFD5D5;border-radius:16px;width:fit-content}
.typing span{width:8px;height:8px;border-radius:4px;background:var(--r);animation:bnc .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* Neutraal inputvak onderaan */
.input-bar{background:#fff;border-top:2px solid var(--b);flex-shrink:0;padding:12px 16px;padding-bottom:calc(12px + var(--sb))}
.input-row{display:flex;align-items:flex-end;gap:10px}
.input-area{flex:1;background:var(--g);border:1.5px solid var(--b);border-radius:20px;padding:13px 18px;font-size:16px;color:#333;outline:none;font-family:inherit;resize:none;min-height:50px;max-height:130px;line-height:1.4}
.input-area:focus{border-color:#aaa;background:#fff}
.input-area::placeholder{color:#bbb}
.rnd{width:46px;height:46px;border-radius:23px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none}
.rnd:active{opacity:.7}
.rnd.gr{background:var(--g);border:1.5px solid var(--b)}
.rnd.rd{background:var(--r)}
.input-tip{font-size:12px;color:#ccc;text-align:center;margin-bottom:8px}

/* Forms */
.form-input{width:100%;padding:15px 18px;border:1.5px solid var(--b);border-radius:14px;font-size:16px;font-family:inherit;outline:none;color:var(--t);margin-bottom:14px;background:#fff}
.form-input:focus{border-color:var(--r)}
.form-btn{width:100%;padding:17px;background:var(--r);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px}
.form-btn:active{opacity:.85}
.form-btn.sec{background:var(--g);color:#333;border:1px solid var(--b)}

/* Compare */
.cmp-row{display:flex;gap:3px;margin-bottom:5px}
.cmp-lbl{flex:2;font-size:13px;color:#555;padding:11px 12px;background:#FAFAFA;border-radius:10px 0 0 10px;display:flex;align-items:center}
.cmp-v{flex:1;font-size:13px;text-align:center;padding:11px 6px;display:flex;align-items:center;justify-content:center}
.cmp-v.t1{background:#FFF5F5} .cmp-v.t2{background:#F5F5FF;border-radius:0 10px 10px 0}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:200;white-space:nowrap;pointer-events:none;animation:fup .3s ease}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hdate{font-size:11px;color:#bbb;text-align:center;margin:6px 0;font-weight:600}
.sync-bar{font-size:11px;text-align:center;padding:2px;flex-shrink:0;min-height:16px;color:transparent}
.sync-bar.s{color:var(--r)} .sync-bar.ok{color:#4CAF50}
.mbtn{padding:10px 16px;border-radius:22px;background:var(--g);border:1px solid var(--b);font-size:14px;cursor:pointer;font-family:inherit}
.mbtn.on{background:#FFE8E8;color:var(--r);border-color:#FFD5D5;font-weight:700}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;background:var(--g);border-radius:13px;margin-bottom:10px;cursor:pointer;border:1px solid var(--b)}
.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #F5F5F5}
.tl-dot{width:10px;height:10px;border-radius:5px;flex-shrink:0;margin-top:4px}
.tl-dot.u{background:var(--r)} .tl-dot.a{background:#4CAF50}
.tl-time{font-size:11px;color:#aaa;margin-bottom:4px}
.tl-text{font-size:14px;color:#333;line-height:1.5}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="overlay" id="ovl" onclick="closeDrawer()"></div>

  <div class="topbar">
    <button class="ico" id="btnBack" onclick="goBack()" style="visibility:hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" width="22" height="22"><polyline points="15,18 9,12 15,6"/></svg>

    <button class="ico" onclick="goScreen('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </div>

  <div class="logobar">
    <div class="av"><svg width="42" height="42" viewBox="0 0 42 42"><rect width="42" height="42" fill="#E0E0E0"/><circle cx="21" cy="16" r="8" fill="#BDBDBD"/><ellipse cx="21" cy="36" rx="14" ry="9" fill="#BDBDBD"/></svg></div>
    <div><div class="brand">Date<span>Sense</span><span class="dot">.</span></div><div class="tag">Jouw persoonlijke dating coach</div></div>
  </div>

  <div class="sync-bar" id="syncBar"></div>
  <div class="main" id="mainContent"></div>

  <!-- Neutraal inputvak — alleen op Vertel scherm -->
  <div id="inputBar" style="display:none">
    <div class="input-bar">
      <div class="input-tip">Typ alles in één keer — ik sorteer het automatisch</div>
      <div class="input-row">
        <button class="rnd gr" onclick="quickFill()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <textarea class="input-area" id="msgInput" placeholder="Vertel me alles wat er in je hoofd zit..." rows="2" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="rnd rd" onclick="sendMsg()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>
        </button>
        <button class="rnd rd">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="tab active" id="tab-home" onclick="goScreen('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span>Home</span></button>
    <button class="tab" id="tab-senses" onclick="goScreen('senses')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Senses</span></button>
    <button class="tab" id="tab-own" onclick="goScreen('own')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M12 14c-5 0-8 2.5-8 4v2h16v-2c0-1.5-3-4-8-4z"/></svg><span>OWN</span></button>
    <button class="tab" id="tab-vertel" onclick="goScreen('vertel')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg><span>Vertel</span></button>

  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────
const SURL='https://ghuqjtdrkwssyqvcubcd.supabase.co';
const SKEY='sb_publishable_ShIeY18JCYiH8fyXm_anHw_Y1jP2skq';
const sb=supabase.createClient(SURL,SKEY);
const PK=['gevoeligheid','openheid','humor','directheid','avontuur'];
const PL=['Gevoeligheid','Openheid','Humor','Directheid','Avontuur'];
const DP={gevoeligheid:75,openheid:60,humor:45,directheid:30,avontuur:20};

// Kleur toewijzing per dossier index
const SEG_COLORS=['seg-own','seg-c1','seg-c2','seg-c3','seg-c4'];
const SEG_DOT_COLORS=['#BBDEFB','#FFE0B2','#C8E6C9','#E1BEE7','#FFE082'];

var S={
  user:null,
  apiKey:localStorage.getItem('ds_ak')||'',
  screen:'home',prev:'home',
  busy:false,
  profiles:[],
  pdata:{},
  apiHist:{},
  viewDossier:null,viewTab:'overzicht'
};

// ── Helpers ────────────────────────────────────────────────────
function sync(s){var e=document.getElementById('syncBar');if(s==='s'){e.textContent='↑ Synchroniseren...';e.className='sync-bar s';}else if(s==='ok'){e.textContent='✓ Gesynchroniseerd';e.className='sync-bar ok';setTimeout(()=>{e.textContent='';e.className='sync-bar';},2000);}else{e.textContent='';e.className='sync-bar';}}
function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.getElementById('app').appendChild(t);setTimeout(()=>{if(t.parentNode)t.parentNode.removeChild(t);},2500);}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

// ── Auth ───────────────────────────────────────────────────────
async function init(){
  var {data:{session}}=await sb.auth.getSession();
  if(session){S.user=session.user;await loadAll();goScreen('home');}
  else goScreen('login');
  sb.auth.onAuthStateChange(async(ev,ses)=>{
    if(ev==='SIGNED_IN'&&ses){S.user=ses.user;await loadAll();goScreen('home');}
    else if(ev==='SIGNED_OUT'){S.user=null;S.profiles=[];S.pdata={};goScreen('login');}
  });
}
async function doLogin(){
  var e=document.getElementById('lEmail').value.trim(),p=document.getElementById('lPw').value,err=document.getElementById('lErr');
  err.textContent='Even wachten...';err.style.color='#888';
  try{await sb.auth.signInWithPassword({email:e,password:p});}
  catch(x){err.style.color='var(--r)';err.textContent=x.message;}
}
async function doRegister(){
  var e=document.getElementById('rEmail').value.trim(),p=document.getElementById('rPw').value,err=document.getElementById('rErr');
  if(p.length<6){err.style.color='var(--r)';err.textContent='Min. 6 tekens';return;}
  err.textContent='Bezig...';err.style.color='#888';
  try{await sb.auth.signUp({email:e,password:p});err.style.color='#4CAF50';err.textContent='✅ Controleer je email!';}
  catch(x){err.style.color='var(--r)';err.textContent=x.message;}
}
async function doSignOut(){closeDrawer();await sb.auth.signOut();toast('👋 Tot ziens!');}

// ── Data ───────────────────────────────────────────────────────
async function loadAll(){
  if(!S.user)return;
  var {data}=await sb.from('sense_profiles').select('*').eq('user_id',S.user.id).order('created_at');
  S.profiles=['OWN Sense'];S.pdata={};
  if(!data||!data.length){await ensureP('OWN Sense');}
  else{data.forEach(p=>{if(p.name!=='OWN Sense')S.profiles.push(p.name);S.pdata[p.name]={props:p.props||{...DP},count:p.entry_count||0,lastActive:p.last_active};});if(!S.pdata['OWN Sense'])await ensureP('OWN Sense');}
}
async function ensureP(name){
  if(!S.user||S.pdata[name])return;
  await sb.from('sense_profiles').upsert({user_id:S.user.id,name,props:{...DP},entry_count:0},{onConflict:'user_id,name'});
  S.pdata[name]={props:{...DP},count:0,lastActive:null};
  if(name!=='OWN Sense'&&!S.profiles.includes(name))S.profiles.push(name);
}
async function saveP(name,props,count){
  if(!S.user)return;sync('s');
  await sb.from('sense_profiles').upsert({user_id:S.user.id,name,props,entry_count:count,last_active:new Date().toISOString()},{onConflict:'user_id,name'});
  if(S.pdata[name]){S.pdata[name].props=props;S.pdata[name].count=count;S.pdata[name].lastActive=new Date().toISOString();}
  sync('ok');
}
async function saveMsg(pn,role,html){if(!S.user)return;await sb.from('sense_messages').insert({user_id:S.user.id,profile_name:pn,role,html});}
async function loadMsgs(pn){if(!S.user)return[];var {data}=await sb.from('sense_messages').select('*').eq('user_id',S.user.id).eq('profile_name',pn).order('created_at').limit(40);return data||[];}
async function loadApiH(pn){if(!S.user)return[];var {data}=await sb.from('sense_api_history').select('*').eq('user_id',S.user.id).eq('profile_name',pn).order('created_at').limit(20);return(data||[]).map(r=>({role:r.role,content:r.content}));}
async function saveApiM(pn,role,content){if(!S.user)return;await sb.from('sense_api_history').insert({user_id:S.user.id,profile_name:pn,role,content});}
async function delP(name){
  if(!S.user)return;
  await sb.from('sense_profiles').delete().eq('user_id',S.user.id).eq('name',name);
  await sb.from('sense_messages').delete().eq('user_id',S.user.id).eq('profile_name',name);
  await sb.from('sense_api_history').delete().eq('user_id',S.user.id).eq('profile_name',name);
  S.profiles=S.profiles.filter(p=>p!==name);delete S.pdata[name];delete S.apiHist[name];
}

  if(S.user){
    var {data}=await sb.from('sense_messages').select('*').eq('user_id',S.user.id).order('created_at',{ascending:false}).limit(20);
    if(data)allMsgs=data.reverse();
  }

  el.innerHTML=`
<div class="vertel-welcome">
  <h2>Wat is er in je hoofd?</h2>
  <p>Typ alles in één keer — over jezelf, over Elise, over Tom...<br>Ik splits het op en sla elk stuk op in het juiste dossier.</p>
</div>
<div class="chat" id="chatArea"></div>`;

  var ca=document.getElementById('chatArea');

  // Welcome bericht
  var welcome=document.createElement('div');welcome.className='msg-ai';
  welcome.innerHTML=`<div class="bbl-ai"><div class="sndr">DATESENSE</div>Vertel me alles wat er speelt — in één bericht mag! Ik herken automatisch of iets over jou gaat of over iemand anders, en sla het op in het juiste dossier. Jij bevestigt altijd.</div>`;
  ca.appendChild(welcome);

  // Toon recente berichten als context
  if(allMsgs.length){
    var sep=document.createElement('div');sep.className='hdate';sep.textContent='Recente activiteit';ca.appendChild(sep);
    allMsgs.slice(-6).forEach(m=>{
      var div=document.createElement('div');div.className=m.role==='user'?'msg-user':'msg-ai';
      var label=m.profile_name!=='OWN Sense'?` <span style="font-size:11px;background:#EEE;padding:1px 6px;border-radius:4px;color:#666">${m.profile_name}</span>`:'';
      div.innerHTML=m.role==='user'?`<div class="bbl-user">${m.html}${label}</div>`:`<div class="bbl-ai"><div class="sndr">DATESENSE</div>${m.html}</div>`;
      ca.appendChild(div);
    });
  }

  if(!S.apiKey){var w=document.createElement('div');w.className='msg-ai';w.innerHTML='<div class="bbl-ai" style="background:#FFF8E1;border-color:#FFE082"><div class="sndr" style="color:#F57F17">LET OP</div>Voeg je Anthropic API key toe via ⚙️ rechtsboven!</div>';ca.appendChild(w);}
  ca.scrollTop=ca.scrollHeight;
}

function rImport(el){
  var items=[['📋','Plak tekst','WhatsApp gesprek, notitie, dagboek...'],['📸','Screenshot','Foto van gesprek uploaden'],['🎤','Spraakmemo','Ingesproken bericht transcriberen'],['📧','Email','Email conversatie importeren']];
  el.innerHTML=`<div style="padding:16px 16px 32px"><div class="sh">Typ of importeer</div>${items.map(x=>`<div style="display:flex;align-items:center;gap:14px;padding:18px 16px;background:var(--g);border-radius:14px;margin-bottom:12px;cursor:pointer;border:1px solid var(--b)" onclick="goScreen('vertel')"><span style="font-size:26px;width:36px;text-align:center;flex-shrink:0">${x[0]}</span><div><div style="font-size:15px;font-weight:600">${x[1]}</div><div style="font-size:13px;color:var(--m);margin-top:3px">${x[2]}</div></div></div>`).join('')}<div style="text-align:center;padding:24px 0"><div style="font-size:13px;color:var(--m);margin-bottom:14px">of spreek direct in</div><button class="mic-btn sm" onclick="goScreen('vertel')"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></button></div></div>`;
}

function rSettings(el){el.innerHTML=`<div style="padding:32px 20px"><div style="font-size:20px;font-weight:800;color:var(--t);margin-bottom:8px">Anthropic API Key</div><p style="font-size:15px;color:#666;line-height:1.6;margin-bottom:22px">Nodig om DateSensei te activeren. Aanmaken op <strong>console.anthropic.com</strong>.</p><input class="form-input" id="akField" type="password" placeholder="sk-ant-api..." value="${S.apiKey||''}"/><button class="form-btn" onclick="saveKey()">Opslaan &amp; activeren</button>${S.apiKey?'<div style="margin-top:14px;padding:14px;background:#F0FFF4;border-radius:12px;font-size:15px;color:#2E7D32">✅ API key actief!</div>':''}<div style="margin-top:28px;padding-top:22px;border-top:1px solid var(--b)"><div style="font-size:20px;font-weight:800;color:var(--t);margin-bottom:8px">Account</div><p style="font-size:15px;color:#666;margin-bottom:14px">Ingelogd als: <strong>${S.user?S.user.email:''}</strong></p><button class="form-btn sec" onclick="doSignOut()">Uitloggen</button></div></div>`;}
function saveKey(){var k=document.getElementById('akField').value.trim();if(!k){alert('Vul een geldige key in.');return;}S.apiKey=k;localStorage.setItem('ds_ak',k);toast('✅ API key opgeslagen!');goScreen('home');}

// ── Compare ────────────────────────────────────────────────────
function rCompare(el){
  var cs=S.profiles.filter(p=>p!=='OWN Sense');
  if(cs.length<2){el.innerHTML='<div style="text-align:center;padding:80px 30px;color:var(--m)"><div style="font-size:48px;margin-bottom:16px">⚖️</div><p style="font-size:15px;line-height:1.6">Je hebt minimaal 2 contactdossiers nodig.<br><br><span style="color:var(--r);cursor:pointer;font-weight:600" onclick="newSenseFromDrawer()">+ Nieuw Sense aanmaken</span></p></div>';return;}
  var c1=cs[0],c2=cs[1],d1=S.pdata[c1]||{props:{...DP},count:0},d2=S.pdata[c2]||{props:{...DP},count:0};
  var rows=PK.map((k,i)=>{var v1=d1.props[k]||0,v2=d2.props[k]||0;return`<div class="cmp-row"><div class="cmp-lbl">${PL[i]}</div><div class="cmp-v t1">${v1>=v2?'⭐ ':''}${v1}%</div><div class="cmp-v t2">${v2>v1?'⭐ ':''}${v2}%</div></div>`;}).join('');
  el.innerHTML=`<div style="padding:16px 16px 32px"><div style="display:flex;gap:8px;margin-bottom:16px"><div style="flex:2"></div><div style="flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--r);background:#FFF5F5;padding:10px 6px;border-radius:12px">${c1}<br><span style="font-size:22px;font-weight:800">${d1.count}</span><br><span style="font-size:11px">entries</span></div><div style="flex:1;text-align:center;font-size:13px;font-weight:700;color:#3949AB;background:#F5F5FF;padding:10px 6px;border-radius:12px">${c2}<br><span style="font-size:22px;font-weight:800">${d2.count}</span><br><span style="font-size:11px">entries</span></div></div>${rows}<div id="cmpBox" style="background:var(--rl);border:1.5px solid #FFD5D5;border-radius:14px;padding:16px;margin-top:18px"><div style="font-size:12px;font-weight:700;color:var(--r);margin-bottom:10px;letter-spacing:.5px">AI ANALYSE</div><div style="font-size:15px;color:#333;line-height:1.6">Voeg meer data toe voor een betere analyse.</div><div style="display:flex;gap:10px;margin-top:14px"><button class="aa r" onclick="cmpAdvies('${c1}','${c2}')">AI Analyse</button><button class="aa g" onclick="viewDossier('${c1}')">Open ${c1}</button></div></div></div>`;
}
async function cmpAdvies(c1,c2){
  if(!S.apiKey){toast('⚠️ Eerst API key instellen!');return;}
  var box=document.getElementById('cmpBox');if(box)box.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  var d1=S.pdata[c1]||{props:{...DP}},d2=S.pdata[c2]||{props:{...DP}};
  try{var t=await callAPI('Je bent DateSensei. Vergelijk '+c1+' en '+c2+' eerlijk. Nederlands. Max 4 zinnen.',[{role:'user',content:'Vergelijk '+c1+' ('+JSON.stringify(d1.props)+') met '+c2+' ('+JSON.stringify(d2.props)+').'}],500);if(box)box.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--r);margin-bottom:10px;letter-spacing:.5px">ADVIES</div><div style="font-size:15px;color:#333;line-height:1.6">'+t+'</div>';}
  catch(x){if(box)box.innerHTML='<div style="color:red">Fout: '+x.message+'</div>';}
}

// ── API ────────────────────────────────────────────────────────
async function callAPI(sys,msgs,maxTok){
  var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok||800,system:sys,messages:msgs})});
  var data=await res.json();if(data.error)throw new Error(data.error.message);
  return(data.content&&data.content[0]&&data.content[0].text)||'';
}

// ── Chat ───────────────────────────────────────────────────────
function addMsg(role,html,pn){
  var ca=document.getElementById('chatArea');if(!ca)return;
  var d=document.createElement('div');d.className=role==='user'?'msg-user':'msg-ai';
  d.innerHTML=role==='user'?`<div class="bbl-user">${html}</div>`:`<div class="bbl-ai"><div class="sndr">DATESENSE</div>${html}</div>`;
  ca.appendChild(d);ca.scrollTop=ca.scrollHeight;
  if(pn)saveMsg(pn,role,html);
}
function showT(){var ca=document.getElementById('chatArea');if(!ca)return;var d=document.createElement('div');d.className='msg-ai';d.id='typ';d.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';ca.appendChild(d);ca.scrollTop=ca.scrollHeight;}
function hideT(){var t=document.getElementById('typ');if(t)t.remove();}

function quickFill(){
  var ex=['Had een toffe date met Elise gisteren. Ze was heel open. Maar ik voel me zelf ook wat onzeker de laatste tijd.','Tom heeft al 3 dagen niet gereageerd. Ik twijfel of ik nog een berichtje moet sturen.','Ik merkte vandaag dat ik veel directer ben geworden in gesprekken. Katrien vroeg ook of we nog eens kunnen afspreken.'];
  var inp=document.getElementById('msgInput');inp.value=ex[Math.floor(Math.random()*ex.length)];inp.focus();autoResize(inp);
}

// ── Kern: segment analyse & opslaan ───────────────────────────
async function sendMsg(){
  if(S.busy)return;
  if(!S.apiKey){toast('⚠️ Eerst API key instellen via ⚙️');return;}
  var inp=document.getElementById('msgInput');var txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';S.busy=true;
  addMsg('user',txt,null); // toon bericht, sla nog niet op
  showT();

  // Bouw lijst van bestaande dossiers voor context
  var dossierLijst=S.profiles.join(', ');

  var sys=`Je bent DateSensei, een empathische AI dating coach. De gebruiker heeft de volgende dossiers: ${dossierLijst}.

Analyseer de input van de gebruiker en splits het op in segmenten. Elk segment hoort bij:
- "OWN Sense": als het over de gebruiker zelf gaat (gevoelens, eigenschappen, persoonlijke reflecties)
- Een bestaand dossier (bv. "EliseSense"): als het over die persoon gaat
- "NIEUW:Naam": als je een nieuwe naam herkent die nog geen dossier heeft

Geef antwoord als geldig JSON (geen markdown):
{
  "segmenten": [
    {"tekst": "deel van de originele tekst", "dossier": "OWN Sense of DossierNaam of NIEUW:Naam", "type": "gevoel/feit/patroon/eigenschap"},
    ...
  ],
  "nieuwe_namen": ["Naam1", "Naam2"],
  "reactie": "korte empathische reactie in het Nederlands (max 2 zinnen)"
}`;

  try{
    var raw=await callAPI(sys,[{role:'user',content:txt}],1000);
    var clean=raw.replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(clean);
    hideT();

    // Verwerk nieuwe namen
    var nieuweNamen=parsed.nieuwe_namen||[];
    for(var naam of nieuweNamen){
      await ensureP(naam+'Sense');
    }

    // Bouw gekleurde segmenten HTML
    var allDossiers=['OWN Sense',...S.profiles.filter(p=>p!=='OWN Sense')];
    var dossierKleur={};
    allDossiers.forEach((p,i)=>{dossierKleur[p]=SEG_COLORS[i%SEG_COLORS.length];});
    // ook nieuwe namen
    nieuweNamen.forEach((n,i)=>{dossierKleur[n+'Sense']=SEG_COLORS[(allDossiers.length+i)%SEG_COLORS.length];});

    var segHtml='<div class="seg-text-area">';
    var legend={};
    parsed.segmenten.forEach(seg=>{
      var doss=seg.dossier;
      if(doss.startsWith('NIEUW:')){doss=doss.replace('NIEUW:','')+'Sense';}
      var cls=dossierKleur[doss]||'seg-unk';
      legend[doss]=cls;
      segHtml+=`<span class="seg ${cls}" title="${doss}" data-dossier="${doss}" data-tekst="${seg.tekst.replace(/"/g,'&quot;')}">${seg.tekst}</span> `;
    });
    segHtml+='</div>';

    // Legenda
    var legHtml='<div class="seg-legend">';
    Object.entries(legend).forEach(([name,cls])=>{
      var col=cls==='seg-own'?SEG_DOT_COLORS[0]:cls==='seg-c1'?SEG_DOT_COLORS[1]:cls==='seg-c2'?SEG_DOT_COLORS[2]:cls==='seg-c3'?SEG_DOT_COLORS[3]:SEG_DOT_COLORS[4];
      legHtml+=`<div class="seg-leg-item"><div class="seg-leg-dot" style="background:${col}"></div><span>${name}</span></div>`;
    });
    legHtml+='</div>';

    // Acties
    var actieHtml=`<div class="seg-actions">
      <button class="aa r" onclick="bevestigAlles()">✅ Alles goedkeuren & opslaan</button>
      <button class="aa g" onclick="pasAan()">✏️ Aanpassen</button>
    </div>`;

    var resultHtml=`<div class="seg-result">
      <div class="seg-result-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--r)" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        KLIK OP GEKLEURDE TEKST OM AAN TE PASSEN
      </div>
      ${segHtml}
      ${legHtml}
      ${actieHtml}
    </div>`;

    var html=parsed.reactie+'<br>'+resultHtml;

    // Sla pending segmenten op voor bevestiging
    window._pendingSegmenten=parsed.segmenten.map(seg=>{
      var doss=seg.dossier;
      if(doss.startsWith('NIEUW:'))doss=doss.replace('NIEUW:','')+'Sense';
      return{...seg,dossier:doss};
    });
    window._pendingTxt=txt;

    addMsg('ai',html,null);

  }catch(x){
    hideT();
    addMsg('ai','Fout: '+x.message,null);
    console.error(x);
  }
  S.busy=false;
}

// ── Segment klik — aanpassen ───────────────────────────────────
document.addEventListener('click',function(e){
  if(e.target.classList.contains('seg')&&e.target.dataset.dossier){
    var huidig=e.target.dataset.dossier;
    var opties=['OWN Sense',...S.profiles.filter(p=>p!=='OWN Sense')];
    var keuze=prompt(`Segment: "${e.target.dataset.tekst}"\n\nHuidige toewijzing: ${huidig}\n\nWijs toe aan (kies nummer):\n${opties.map((p,i)=>(i+1)+'. '+p).join('\n')}\n\nOf typ een nieuwe naam:`);
    if(!keuze)return;
    var idx=parseInt(keuze)-1;
    var nieuwDossier=opties[idx]||keuze.trim();
    if(!nieuwDossier)return;
    if(!nieuwDossier.endsWith('Sense')&&nieuwDossier!=='OWN Sense')nieuwDossier=nieuwDossier+'Sense';
    e.target.dataset.dossier=nieuwDossier;
    e.target.textContent=e.target.dataset.tekst;
    // Update pending
    if(window._pendingSegmenten){
      var idx2=window._pendingSegmenten.findIndex(s=>s.tekst===e.target.dataset.tekst);
      if(idx2>=0)window._pendingSegmenten[idx2].dossier=nieuwDossier;
    }
    toast('✏️ Gewijzigd naar '+nieuwDossier);
  }
});

async function bevestigAlles(){
  if(!window._pendingSegmenten){toast('Niets te bevestigen');return;}
  var segs=window._pendingSegmenten;

  // Groepeer per dossier
  var perDossier={};
  segs.forEach(seg=>{
    if(!perDossier[seg.dossier])perDossier[seg.dossier]=[];
    perDossier[seg.dossier].push(seg.tekst);
  });

  // Sla op per dossier
  for(var [dossier,teksten] of Object.entries(perDossier)){
    await ensureP(dossier);
    var samengevat=teksten.join(' ');
    await saveMsg(dossier,'user',samengevat);

    // Update eigenschappen via AI voor OWN Sense
    if(dossier==='OWN Sense'){
      await updateEigenschappen(dossier,samengevat);
    } else {
      // Update count voor contact dossier
      var pd=S.pdata[dossier]||{props:{...DP},count:0};
      pd.count=(pd.count||0)+1;
      S.pdata[dossier]=pd;
      await saveP(dossier,pd.props,pd.count);
    }
  }

  window._pendingSegmenten=null;

  // Toon bevestiging
  var bevestigHtml='<div style="background:#F0FFF4;border:1.5px solid #A5D6A7;border-radius:12px;padding:14px 16px">';
  bevestigHtml+='<div style="font-size:12px;font-weight:700;color:#2E7D32;margin-bottom:10px;letter-spacing:.5px">✅ OPGESLAGEN</div>';
  Object.entries(perDossier).forEach(([doss,teksten])=>{
    bevestigHtml+=`<div style="font-size:14px;color:#333;margin-bottom:6px">→ <strong>${doss}</strong>: ${teksten.join(', ').substring(0,60)}...</div>`;
  });
  bevestigHtml+='<div class="ai-actions" style="margin-top:10px"><button class="aa r" onclick="askAdviceAll()">Ja, graag advies</button><button class="aa g">Nee, gewoon opslaan</button></div>';
  bevestigHtml+='</div>';
  addMsg('ai',bevestigHtml,null);
  toast('✅ Opgeslagen in '+(Object.keys(perDossier).length)+' dossier(s)!');
}

async function updateEigenschappen(dossier,tekst){
  if(!S.apiKey)return;
  var pd=S.pdata[dossier]||{props:{...DP},count:0};
  var sys=`Je bent DateSensei. Analyseer deze tekst en update de OWN Sense eigenschappen indien relevant. Huidig: ${JSON.stringify(pd.props)}. Geef ALLEEN geldig JSON terug: {"gevoeligheid":null,"openheid":null,"humor":null,"directheid":null,"avontuur":null}. Null als geen update nodig.`;
  try{
    var raw=await callAPI(sys,[{role:'user',content:tekst}],300);
    var clean=raw.replace(/```json|```/g,'').trim();
    var updates=JSON.parse(clean);
    PK.forEach(k=>{if(updates[k]!==null&&updates[k]!==undefined){var v=Math.min(100,Math.max(0,parseInt(updates[k])));if(!isNaN(v))pd.props[k]=v;}});
    pd.count=(pd.count||0)+1;
    S.pdata[dossier]=pd;
    await saveP(dossier,pd.props,pd.count);
  }catch(x){
    pd.count=(pd.count||0)+1;S.pdata[dossier]=pd;await saveP(dossier,pd.props,pd.count);
  }
}

function pasAan(){toast('Klik op een gekleurd segment om de toewijzing te wijzigen.');}

async function askAdviceAll(){
  if(!S.apiKey||S.busy)return;S.busy=true;
  showT();
  var ctx=window._pendingTxt||'Recente input';
  var sys='Je bent DateSensei, empathische AI dating coach. Geef concreet eerlijk advies op basis van de input. Max 3-4 zinnen, 2 actiestappen. Warm maar direct. Nederlands.';
  try{var t=await callAPI(sys,[{role:'user',content:ctx}],500);hideT();addMsg('ai',`<span style="font-size:11px;font-weight:700;color:var(--r);letter-spacing:.8px">ADVIES</span><br><br>${t}`,null);}
  catch(x){hideT();addMsg('ai','Fout: '+x.message,null);}
  S.busy=false;
}

// ── Utils ──────────────────────────────────────────────────────
function timeAgo(iso){var d=Math.floor((Date.now()-new Date(iso))/1000);if(d<60)return'Zojuist';if(d<3600)return Math.floor(d/60)+' min';if(d<86400)return Math.floor(d/3600)+' uur';return Math.floor(d/86400)+' d geleden';}

// ── Init ───────────────────────────────────────────────────────
init();
</script>
