<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DateSense — Jouw persoonlijke dating coach</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow:hidden}
:root{--r:#AE0000;--rl:#FFF5F5;--g:#F8F9FA;--b:#E5E5E5;--m:#888;--t:#1A1A1A;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}

.app{width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}

/* Topbar */
.topbar{display:flex;align-items:center;padding:12px 14px 8px;padding-top:calc(12px + var(--st));flex-shrink:0;background:#fff;border-bottom:1px solid var(--b)}
.tb-title{flex:1;font-size:17px;font-weight:700;text-align:center;color:var(--t)}
.ico{width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:none;border:none;border-radius:19px}
.ico:active{background:var(--g)}

/* Logobar */
.logobar{display:flex;align-items:center;gap:12px;padding:8px 16px 10px;flex-shrink:0}
.av{width:42px;height:42px;border-radius:21px;overflow:hidden;flex-shrink:0;border:2px solid var(--b);background:#eee}
.brand{font-size:22px;font-weight:800;color:var(--t);letter-spacing:-.5px;line-height:1}
.brand .dot{color:var(--r)}
.tag{font-size:11px;color:var(--r);font-style:italic;margin-top:2px}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Nav */
.nav{background:#fff;border-top:1px solid var(--b);display:flex;padding:6px 0;padding-bottom:calc(6px + var(--sb));flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;color:var(--m);background:none;border:none}
.tab.active{color:var(--r)}
.tab svg{width:23px;height:23px}
.tab span{font-size:10px;font-weight:600}

/* Drawer */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none}
.overlay.show{display:block}
.drawer{position:absolute;top:0;left:0;width:83%;max-width:310px;height:100%;background:#fff;z-index:51;overflow-y:auto;transform:translateX(-100%);transition:transform .26s ease}
.drawer.open{transform:translateX(0)}
.dr-in{padding:calc(24px + var(--st)) 20px 32px}
.drow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #F2F2F2;cursor:pointer}
.drow:active{opacity:.6}
.dbadge{background:#EBEBEB;border-radius:10px;padding:3px 10px;font-size:12px;color:var(--m);font-weight:600}
.dlbl{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1.1px;margin:16px 0 8px}

/* Buttons */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.btn-r{width:100%;padding:17px 8px;border-radius:13px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--r);color:#fff}
.btn-r:active{opacity:.8}
.btn-g{width:100%;padding:17px 8px;border-radius:13px;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--g);color:#333;border:1px solid var(--b)}
.sh{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin:20px 0 12px}
.ncard{border-radius:13px;padding:14px 16px;background:var(--g);margin-bottom:10px;border-left:5px solid #999}
.ncard.s{border-left-color:var(--r)} .ncard.a{border-left-color:#E07800} .ncard.c{border-left-color:#0066CC}
.ncat{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.ncard.s .ncat{color:var(--r)} .ncard.a .ncat{color:#E07800} .ncard.c .ncat{color:#0066CC}
.ntext{font-size:14px;color:#333;line-height:1.5}
.nlink{font-size:13px;color:var(--r);margin-top:6px;cursor:pointer;display:block;font-weight:600}

/* Mic */
.mic-btn{width:120px;height:120px;border-radius:60px;background:var(--r);display:flex;align-items:center;justify-content:center;margin:14px auto 12px;cursor:pointer;border:none;box-shadow:0 8px 28px rgba(174,0,0,.3)}
.mic-btn:active{transform:scale(.95)}
.mic-btn.sm{width:80px;height:80px;border-radius:40px}

/* Senses lijst */
.srow{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--b);cursor:pointer}
.srow:active{opacity:.7}
.sdot{width:10px;height:10px;border-radius:5px;background:var(--r);flex-shrink:0}
.del-btn{background:#FFF0F0;border:none;color:var(--r);font-size:12px;font-weight:700;padding:6px 12px;border-radius:10px;cursor:pointer;font-family:inherit;flex-shrink:0}

/* Dossier detail */
.tabs-bar{display:flex;border-bottom:1px solid var(--b);background:#fff;flex-shrink:0}
.dtab{flex:1;padding:13px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--m);cursor:pointer;border-bottom:3px solid transparent}
.dtab.active{color:var(--r);border-bottom-color:var(--r)}
.prop{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.pn{width:96px;font-size:13px;color:#333;flex-shrink:0}
.track{flex:1;height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.fill{height:100%;background:var(--r);border-radius:3px;transition:width .6s ease}
.pct{width:38px;font-size:12px;color:var(--r);font-weight:700;text-align:right}
.match-bar{background:var(--g);border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid var(--b)}

/* Prop leeg state */
.prop-empty{text-align:center;padding:22px 16px;background:var(--g);border-radius:12px;margin-bottom:14px;border:1px solid var(--b)}
.prop-empty-icon{font-size:28px;margin-bottom:8px}
.prop-empty-text{font-size:13px;color:var(--m);line-height:1.6}

/* ══ VERTEL scherm ══ */
.chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg-ai{display:flex;flex-direction:column;gap:4px}
.bbl-ai{background:var(--rl);border:1px solid #FFD5D5;border-radius:16px 16px 16px 4px;padding:14px 16px;font-size:15px;color:#222;line-height:1.6;max-width:96%}
.bbl-ai .sndr{font-size:11px;font-weight:700;color:var(--r);margin-bottom:6px;letter-spacing:.8px}
.msg-user{display:flex;justify-content:flex-end}
.bbl-user{background:var(--r);border-radius:16px 16px 4px 16px;padding:14px 16px;font-size:15px;color:#fff;line-height:1.6;max-width:96%}

/* Gekleurde segmenten */
.seg-result{background:#fff;border:1.5px solid var(--b);border-radius:14px;padding:14px 16px;margin-top:8px}
.seg-result-title{font-size:11px;font-weight:700;color:var(--r);letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.seg-text-area{font-size:15px;line-height:2.4;margin-bottom:12px}
.seg{border-radius:4px;padding:2px 7px;cursor:pointer;display:inline;font-size:15px;transition:opacity .1s}
.seg:active{opacity:.6}
.seg.negeer{background:#EEEEEE!important;color:#aaa!important;text-decoration:line-through;opacity:.7}
.seg-own{background:#BBDEFB;color:#0D47A1}
.seg-c1{background:#FFE0B2;color:#E65100}
.seg-c2{background:#C8E6C9;color:#1B5E20}
.seg-c3{background:#E1BEE7;color:#6A1B9A}
.seg-c4{background:#FFE082;color:#884400}
.seg-unk{background:#EEEEEE;color:#555}
.seg-legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.seg-leg-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#444}
.seg-leg-dot{width:10px;height:10px;border-radius:5px;flex-shrink:0}
.seg-actions{display:flex;gap:8px;flex-wrap:wrap}

/* AI action knoppen */
.ai-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.aa{padding:10px 16px;border-radius:20px;font-size:14px;border:none;cursor:pointer;font-family:inherit;font-weight:700}
.aa:active{opacity:.7}
.aa.r{background:var(--r);color:#fff}
.aa.g{background:var(--g);color:#555;border:1px solid var(--b)}

/* Typing indicator */
.typing{display:flex;align-items:center;gap:6px;padding:14px 16px;background:var(--rl);border:1px solid #FFD5D5;border-radius:16px;width:fit-content}
.typing span{width:8px;height:8px;border-radius:4px;background:var(--r);animation:bnc .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* Input bar */
.input-bar{background:#fff;border-top:2px solid var(--b);flex-shrink:0;padding:12px 16px;padding-bottom:calc(12px + var(--sb))}
.input-row{display:flex;align-items:flex-end;gap:10px}
.input-area{flex:1;background:var(--g);border:1.5px solid var(--b);border-radius:20px;padding:13px 18px;font-size:16px;color:#333;outline:none;font-family:inherit;resize:none;min-height:50px;max-height:130px;line-height:1.4}
.input-area:focus{border-color:#aaa;background:#fff}
.input-area::placeholder{color:#bbb}
.rnd{width:46px;height:46px;border-radius:23px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none}
.rnd:active{opacity:.7}
.rnd.gr{background:var(--g);border:1.5px solid var(--b)}
.rnd.rd{background:var(--r)}
.input-tip{font-size:12px;color:#ccc;text-align:center;margin-bottom:8px}

/* Forms */
.form-input{width:100%;padding:15px 18px;border:1.5px solid var(--b);border-radius:14px;font-size:16px;font-family:inherit;outline:none;color:var(--t);margin-bottom:14px;background:#fff}
.form-input:focus{border-color:var(--r)}
.form-btn{width:100%;padding:17px;background:var(--r);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px}
.form-btn:active{opacity:.85}
.form-btn.sec{background:var(--g);color:#333;border:1px solid var(--b)}

/* Compare */
.cmp-row{display:flex;gap:3px;margin-bottom:5px}
.cmp-lbl{flex:2;font-size:13px;color:#555;padding:11px 12px;background:#FAFAFA;border-radius:10px 0 0 10px;display:flex;align-items:center}
.cmp-v{flex:1;font-size:13px;text-align:center;padding:11px 6px;display:flex;align-items:center;justify-content:center}
.cmp-v.t1{background:#FFF5F5} .cmp-v.t2{background:#F5F5FF;border-radius:0 10px 10px 0}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:400;white-space:nowrap;pointer-events:none;animation:fup .3s ease}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hdate{font-size:11px;color:#bbb;text-align:center;margin:6px 0;font-weight:600}
.sync-bar{font-size:11px;text-align:center;padding:2px;flex-shrink:0;min-height:16px;color:transparent}
.sync-bar.s{color:var(--r)} .sync-bar.ok{color:#4CAF50}
.mbtn{padding:10px 16px;border-radius:22px;background:var(--g);border:1px solid var(--b);font-size:14px;cursor:pointer;font-family:inherit}
.mbtn.on{background:#FFE8E8;color:var(--r);border-color:#FFD5D5;font-weight:700}
.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #F5F5F5}
.tl-dot{width:10px;height:10px;border-radius:5px;flex-shrink:0;margin-top:4px}
.tl-dot.u{background:var(--r)} .tl-dot.a{background:#4CAF50}
.tl-time{font-size:11px;color:#aaa;margin-bottom:4px}
.tl-text{font-size:14px;color:#333;line-height:1.5}

/* ══ SEGMENT MODAL (bottom sheet) ══ */
.seg-modal-overlay{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;justify-content:flex-end}
.seg-modal-overlay.show{display:flex}
.seg-modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.seg-modal-sheet{position:relative;z-index:1;background:#fff;border-radius:22px 22px 0 0;padding:0 0 calc(16px + var(--sb));max-height:75vh;display:flex;flex-direction:column}
.seg-modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.seg-modal-header{padding:14px 20px 12px;border-bottom:1px solid var(--b)}
.seg-modal-title{font-size:13px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.seg-modal-quote{background:var(--rl);border-radius:10px;padding:10px 14px;font-size:14px;color:#333;line-height:1.5;font-style:italic;border-left:3px solid var(--r)}
.seg-modal-body{overflow-y:auto;padding:12px 20px 0;flex:1}
.seg-modal-subtitle{font-size:12px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.seg-modal-opt{display:flex;align-items:center;gap:12px;padding:14px 14px;border-radius:13px;margin-bottom:8px;cursor:pointer;border:1.5px solid var(--b);background:#fff}
.seg-modal-opt:active{opacity:.7}
.seg-modal-opt.active{border-color:var(--r);background:var(--rl)}
.seg-modal-opt.negeer-opt{border-color:#ddd;background:#FAFAFA}
.seg-modal-opt.negeer-opt.active{border-color:#999;background:#F0F0F0}
.smo-dot{width:12px;height:12px;border-radius:6px;flex-shrink:0}
.smo-lbl{flex:1;font-size:15px;font-weight:600;color:var(--t)}
.smo-check{font-size:18px}

/* ══ VERTEL REDESIGN ══ */
.ai-result-box{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-top:8px}
.ai-result-header{background:var(--r);color:#fff;padding:14px 16px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.seg-text-wrap{padding:16px;font-size:15px;line-height:2.3;border-bottom:1px solid var(--b)}
.seg{border-radius:5px;padding:2px 8px;cursor:pointer;display:inline;font-size:15px;transition:opacity .15s}
.seg:active{opacity:.6}
.seg.negeer{background:#EEEEEE!important;color:#aaa!important;text-decoration:line-through;opacity:.6}
.seg-own{background:#BBDEFB;color:#0D47A1}
.seg-c1{background:#C8E6C9;color:#1B5E20}
.seg-c2{background:#FFE0B2;color:#E65100}
.seg-c3{background:#E1BEE7;color:#6A1B9A}
.seg-c4{background:#FFE082;color:#884400}
.seg-unk{background:#EEEEEE;color:#555}

/* Samenvatting kaartjes */
.dossier-cards{display:flex;flex-wrap:wrap;gap:10px;padding:14px 16px;border-bottom:1px solid var(--b)}
.dossier-card{flex:1;min-width:80px;max-width:110px;border-radius:12px;padding:12px 10px;text-align:center;border:1.5px solid var(--b);cursor:default}
.dossier-card-num{font-size:26px;font-weight:800;margin-bottom:4px}
.dossier-card-lbl{font-size:12px;font-weight:600;color:#555}

/* Nieuwe personen sectie */
.nieuw-box{padding:14px 16px;background:#FFF8E1;border-bottom:1px solid #FFE082}
.nieuw-box-title{font-size:13px;font-weight:700;color:#E07800;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.nieuw-person{background:#fff;border:1px solid #FFE082;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.nieuw-person-quote{font-size:13px;color:#555;font-style:italic;margin-bottom:8px;line-height:1.5}
.nieuw-btns{display:flex;gap:8px}
.btn-toevoegen{flex:1;padding:9px;background:#2E7D32;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-negeer-p{flex:1;padding:9px;background:#F5F5F5;color:#666;border:1px solid #ddd;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* Actie knoppen onderaan */
.result-actions{padding:14px 16px;display:flex;gap:10px}
.btn-voeg-alles{flex:2;padding:16px;background:var(--r);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-voeg-alles:active{opacity:.85}
.btn-hoe-werkt{flex:1;padding:16px;background:#F5F5F5;color:#555;border:1px solid var(--b);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* Opgeslagen bevestiging */
.saved-confirm{background:#F0FFF4;border:1.5px solid #A5D6A7;border-radius:14px;padding:16px;margin-top:8px}
.saved-confirm-title{font-size:13px;font-weight:700;color:#2E7D32;margin-bottom:10px;letter-spacing:.3px}
.saved-row{font-size:14px;color:#333;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.saved-dot{width:8px;height:8px;border-radius:4px;flex-shrink:0}

/* Segment modal redesign */
.seg-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0}
.seg-modal-btn{padding:14px 12px;border-radius:12px;border:2px solid var(--b);background:#fff;cursor:pointer;font-family:inherit;text-align:left;font-size:14px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:10px;transition:border-color .15s,background .15s;border-left-width:5px}
.seg-modal-btn:active{opacity:.75}
.seg-modal-btn.active{background:#FAFAFA}
.seg-modal-btn.negeer-btn{border-left-color:#ddd;color:#888}
.seg-modal-btn.negeer-btn.active{background:#F5F5F5;border-color:#ddd}
.seg-modal-check{margin-left:auto;font-size:16px;flex-shrink:0}

/* ══ OWN SENSE CATEGORIEËN ══ */
.own-cat{background:#fff;border:1.5px solid var(--b);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.own-cat.filled{border-color:#C8E6C9}
.own-cat-head{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;user-select:none}
.own-cat-head:active{background:var(--g)}
.own-cat-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.own-cat-info{flex:1;min-width:0}
.own-cat-title{font-size:15px;font-weight:700;color:var(--t)}
.own-cat-prog{font-size:12px;color:var(--m);margin-top:2px}
.own-cat-prog.done{color:#2E7D32}
.own-cat-arrow{color:var(--m);transition:transform .2s;flex-shrink:0;font-size:18px}
.own-cat.open .own-cat-arrow{transform:rotate(90deg)}
.own-cat-body{display:none;padding:0 16px 16px;border-top:1px solid #F0F0F0}
.own-cat.open .own-cat-body{display:block}
.own-q-label{font-size:12px;font-weight:700;color:var(--m);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.own-ta{width:100%;padding:12px 14px;border:1.5px solid var(--b);border-radius:11px;font-size:14px;font-family:inherit;color:var(--t);resize:none;outline:none;min-height:72px;line-height:1.5;background:#fff}
.own-ta:focus{border-color:var(--r);background:#fff}
.own-ta::placeholder{color:#ccc}
.own-save-btn{width:100%;padding:13px;background:var(--r);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.own-save-btn:active{opacity:.8}
.own-save-btn:disabled{opacity:.5;pointer-events:none}
.own-last-saved{font-size:12px;color:#2E7D32;text-align:center;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Drawer overlay -->
  <div class="overlay" id="ovl" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer"><div class="dr-in" id="drIn"></div></div>

  <!-- Topbar -->
  <div class="topbar">
    <button class="ico" id="btnBack" onclick="goBack()" style="visibility:hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" width="22" height="22"><polyline points="15,18 9,12 15,6"/></svg>
    </button>

// ══ Helpers ═════════════════════════════════════════════════════
function sync(s){var e=document.getElementById('syncBar');if(s==='s'){e.textContent='↑ Synchroniseren...';e.className='sync-bar s';}else if(s==='ok'){e.textContent='✓ Gesynchroniseerd';e.className='sync-bar ok';setTimeout(()=>{e.textContent='';e.className='sync-bar';},2000);}else{e.textContent='';e.className='sync-bar';}}

function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>{if(t.parentNode)t.parentNode.removeChild(t);},2500);}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}

function timeAgo(iso){
  var d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60)return'Zojuist';
  if(d<3600)return Math.floor(d/60)+' min geleden';
  if(d<86400)return Math.floor(d/3600)+' uur geleden';
  if(d<172800)return'Gisteren';
  return Math.floor(d/86400)+' d geleden';
}

// Render eigenschappen (alleen als er data is)
function renderProps(props){
  var hasData=PK.some(k=>(props[k]||0)>0);
  if(!hasData){
    return`<div class="prop-empty">
      <div class="prop-empty-icon">📊</div>
      <div style="font-size:14px;font-weight:700;color:#333;margin-bottom:6px">Nog geen eigenschappen ingeschat</div>
      <div class="prop-empty-text">Voeg meer entries toe via <strong>Vertel</strong>, of vul<br>de categorieën in bij <strong>OWN Sense</strong>.</div>
    </div>`;
  }
  return PK.map((k,i)=>{
    var v=props[k]||0;
    return`<div class="prop">
      <div class="pn">${PL[i]}</div>
      <div class="track"><div class="fill" style="width:${v}%"></div></div>
      <div class="pct">${v}%</div>
    </div>`;
  }).join('');
}

// ══ Data ═════════════════════════════════════════════════════════
async function loadAll(){
  if(!S.user)return;
  var {data}=await sb.from('sense_profiles').select('*').eq('user_id',S.user.id).order('created_at');
  S.profiles=['OWN Sense'];S.pdata={};
  if(!data||!data.length){
    await ensureP('OWN Sense');
  } else {
    // Patronen van oude hardcoded defaults
    var OLD_DEFAULTS=[
      {gevoeligheid:75,openheid:60,humor:45,directheid:30,avontuur:20},
      {gevoeligheid:75,openheid:65,humor:45,directheid:35,avontuur:20}
    ];
    function isOldDefault(p){
      return OLD_DEFAULTS.some(function(d){return PK.every(function(k){return p[k]===d[k];});});
    }
    data.forEach(p=>{
      if(p.name!=='OWN Sense')S.profiles.push(p.name);
      var savedProps=p.props||{};
      var mergedProps={};
      PK.forEach(k=>{mergedProps[k]=savedProps[k]!==undefined?savedProps[k]:0;});
      // Reset automatisch als het de oude hardcoded defaults zijn
      if(!savedProps._v && isOldDefault(mergedProps)){
        PK.forEach(k=>{mergedProps[k]=0;});
      }
      S.pdata[p.name]={
        props:mergedProps,
        count:p.entry_count||0,
        lastActive:p.last_active,
        categories:savedProps.categories||{}
      };
    });
    if(!S.pdata['OWN Sense'])await ensureP('OWN Sense');
  }
}

async function ensureP(name){
  if(!S.user||S.pdata[name])return;
  await sb.from('sense_profiles').upsert(
    {user_id:S.user.id,name,props:{...DP},entry_count:0},
    {onConflict:'user_id,name'}
  );
  S.pdata[name]={props:{...DP},count:0,lastActive:null,categories:{}};
  if(name!=='OWN Sense'&&!S.profiles.includes(name))S.profiles.push(name);
}

async function saveP(name,props,count,categories){
  if(!S.user)return;
  sync('s');
  var propsToSave={...props,_v:1};  // _v:1 = bewust opgeslagen, nooit auto-reset
  if(categories)propsToSave.categories=categories;
  await sb.from('sense_profiles').upsert(
    {user_id:S.user.id,name,props:propsToSave,entry_count:count,last_active:new Date().toISOString()},
    {onConflict:'user_id,name'}
  );
  if(S.pdata[name]){
    S.pdata[name].props=props;
    S.pdata[name].count=count;
    S.pdata[name].lastActive=new Date().toISOString();
    if(categories)S.pdata[name].categories=categories;
  }
  sync('ok');
}

}

async function delP(name){
  if(!S.user)return;
  await sb.from('sense_profiles').delete().eq('user_id',S.user.id).eq('name',name);
  await sb.from('sense_messages').delete().eq('user_id',S.user.id).eq('profile_name',name);

async function switchTab(tab){
  S.viewTab=tab;
  document.querySelectorAll('.dtab').forEach(t=>{
    var map={'overzicht':'Overzicht','tijdlijn':'Tijdlijn','advies':'Advies'};
    t.classList.toggle('active',t.textContent===map[tab]);
  });
  await loadTab(S.viewDossier,tab,S.pdata[S.viewDossier]||{props:{...DP},count:0,categories:{}});
}

async function loadTab(name,tab,d){
  var cont=document.getElementById('tabContent');if(!cont)return;
  if(tab==='overzicht'){
    var hasData=PK.some(k=>(d.props[k]||0)>0);
    var isOwnDossier=name==='OWN Sense';
    var cats=d.categories||{};
    var personName=name.replace('Sense','').trim();

    // Contact invulcategorieën definitie
    var CONTACT_CATS=[
      {id:'karakter_contact',title:'Karakter & Persoonlijkheid',icon:'🧠',prompts:[
        {q:'Hoe zou jij '+personName+' omschrijven?',ph:'Bv: open, gesloten, grappig, serieus...'},
        {q:'Hoe gedraagt hij/zij zich in gesprekken?',ph:'Bv: luistert goed, praat veel, vermijdt onderwerp...'},
        {q:'Wat zijn opvallende eigenschappen of gewoontes?',ph:'Bv: altijd te laat, erg ambitieus, warm naar anderen...'}
      ]},
      {id:'patronen_contact',title:'Patronen & Gedrag',icon:'🔄',prompts:[
        {q:'Welke patronen merk je op?',ph:'Bv: trekt zich terug als het spannend wordt, blaast warm en koud...'},
        {q:'Hoe reageert hij/zij op emoties of conflict?',ph:'Bv: vermijdt conflict, wordt defensief, blijft rustig...'},
        {q:'Is hij/zij consistent in woorden en daden?',ph:'Bv: zegt X maar doet Y, of altijd betrouwbaar...'}
      ]},
      {id:'gevoel_contact',title:'Jouw Gevoel bij Hem/Haar',icon:'❤️',prompts:[
        {q:'Hoe voel jij je bij deze persoon?',ph:'Bv: energiek, onzeker, rustig, geprikkeld...'},
        {q:'Wat trekt jou aan in hem/haar?',ph:'Bv: humor, diepgang, energie, uiterlijk...'},
        {q:'Wat stoort of twijfelt je?',ph:'Bv: reageert traag, weinig initiatief, onduidelijkheid...'}
      ]}
    ];

    function contactCatProgress(catId){
      var catData=cats[catId]||{};
      var cat=CONTACT_CATS.find(function(c){return c.id===catId;});
      if(!cat)return{filled:0,total:0};
      var filled=cat.prompts.filter(function(_,i){return(catData['a'+i]||'').trim().length>0;}).length;
      return{filled:filled,total:cat.prompts.length};
    }

    var contactFilled=CONTACT_CATS.reduce(function(s,c){return s+contactCatProgress(c.id).filled;},0);
    var contactTotal=CONTACT_CATS.reduce(function(s,c){return s+c.prompts.length;},0);

    // Bouw HTML
    var html='';

    // Eigenschappen
    html+='<div style="font-size:14px;font-weight:700;color:#333;margin-bottom:12px">Eigenschappen</div>';
    html+=renderProps(d.props);

    // OWN: reset knop + tip
    if(isOwnDossier){
      if(hasData){
        html+='<button onclick="resetOwnProps()" style="margin-bottom:16px;padding:8px 16px;background:#FFF0F0;color:var(--r);border:1px solid #FFD5D5;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">↺ Reset naar 0%</button>';
      }
      html+='<div style="background:#FFF8E1;border:1.5px solid #FFE082;border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:14px;color:#555;line-height:1.6">';
      html+='💡 <strong>Vul je profiel in</strong> via de <strong>OWN</strong> tab onderaan om je eigenschappen automatisch te berekenen.';
      html+='<div style="margin-top:10px"><button class="btn-r" style="max-width:200px;padding:12px" onclick="goScreen(\'own\')">→ Naar OWN Sense</button></div>';
      html+='</div>';
    }

    // Contact: invulcategorieën
    if(!isOwnDossier){
      html+='<div style="font-size:14px;font-weight:700;color:#333;margin:18px 0 4px">Wat weet jij over '+personName+'?</div>';
      html+='<div style="font-size:13px;color:var(--m);margin-bottom:12px;line-height:1.5">Vul in wat je weet. Dit + je opgeslagen berichten bepalen samen de eigenschappen.</div>';
      html+='<div style="background:var(--g);border-radius:12px;padding:10px 16px;margin-bottom:14px;border:1px solid var(--b)">';
      html+='<span style="font-size:13px;color:#555">'+contactFilled+'/'+contactTotal+' vragen beantwoord · eigenschappen worden automatisch bijgewerkt</span>';
      html+='</div>';

      CONTACT_CATS.forEach(function(cat){
        var prog=contactCatProgress(cat.id);
        var catData=cats[cat.id]||{};
        var isFilled=prog.filled>0;
        html+='<div class="own-cat '+(isFilled?'filled':'')+'" id="cc-'+cat.id+'">';
        html+='<div class="own-cat-head" onclick="toggleContactCat(\''+cat.id+'\')">';
        html+='<div class="own-cat-icon">'+cat.icon+'</div>';
        html+='<div class="own-cat-info">';
        html+='<div class="own-cat-title">'+cat.title+'</div>';
        html+='<div class="own-cat-prog '+(prog.filled===prog.total?'done':'')+'">';
        html+=prog.filled+'/'+prog.total+' vragen beantwoord'+(prog.filled===prog.total?' ✓':'');
        html+='</div></div>';
        html+='<div class="own-cat-arrow">›</div>';
        html+='</div>'; // own-cat-head
        html+='<div class="own-cat-body">';
        cat.prompts.forEach(function(p,i){
          var saved=(catData['a'+i]||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          html+='<div class="own-q-label">'+p.q+'</div>';
          html+='<textarea class="own-ta" id="cc-'+cat.id+'-a'+i+'" placeholder="'+p.ph+'" rows="2" oninput="autoResize(this)">'+saved+'</textarea>';
        });
        html+='<button class="own-save-btn" onclick="saveContactCat(\''+name+'\',\''+cat.id+'\')">';
        html+='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Opslaan</button>';
        html+='</div>'; // own-cat-body
        html+='</div>'; // own-cat
      });
    }

    // Status
    html+='<div style="font-size:14px;font-weight:700;color:#333;margin:18px 0 10px">Status</div>';
    html+='<div style="background:var(--g);border-radius:12px;padding:14px 16px;font-size:14px;color:#555;line-height:1.6;border:1px solid var(--b)">';
    html+=d.count+' entries opgeslagen'+(d.lastActive?' · Laatste: '+timeAgo(d.lastActive):'');
    html+='</div>';

    if(!isOwnDossier){
      html+='<div style="margin-top:16px"><div class="g2"><button class="btn-r" onclick="goScreen(\'vertel\')">✏️ Voeg toe</button><button class="btn-g" onclick="switchTab(\'advies\')">💡 Advies</button></div></div>';
    }

    cont.innerHTML=html;
  }
  else if(tab==='tijdlijn'){
    cont.innerHTML='<div style="text-align:center;color:var(--m);padding:20px;font-size:14px">Tijdlijn laden...</div>';

    var msgs=await loadMsgs(name);
    if(!msgs.length){
      cont.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--m)">
        <div style="font-size:36px;margin-bottom:10px">📋</div>
        <p style="font-size:14px;line-height:1.6">Nog geen entries voor <strong>${name}</strong>.<br>Ga naar Vertel om iets toe te voegen.</p>
        <button class="btn-r" style="margin-top:16px;max-width:200px" onclick="goScreen('vertel')">Vertel iets</button>
      </div>`;
      return;
    }
    var lastDate='';
    cont.innerHTML=msgs.map(m=>{
      var dd=new Date(m.created_at).toLocaleDateString('nl-BE',{day:'numeric',month:'long',year:'numeric'});
      var ds=dd!==lastDate?(lastDate=dd,`<div class="hdate">${dd}</div>`):'';
      var isU=m.role==='user';
      var txt=isU?m.html:(m.html.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().substring(0,180)+(m.html.length>200?'...':''));
      return`${ds}<div class="tl-item">
        <div class="tl-dot ${isU?'u':'a'}"></div>
        <div style="flex:1">
          <div class="tl-time">${new Date(m.created_at).toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'})} · ${isU?'Jij':'DateSensei'}</div>
          <div class="tl-text">${txt}</div>
        </div>
      </div>`;
    }).join('');
  }
  else if(tab==='advies'){
    cont.innerHTML=`<div style="background:var(--rl);border:1.5px solid #FFD5D5;border-radius:14px;padding:16px">
      <div style="font-size:12px;font-weight:700;color:var(--r);margin-bottom:10px;letter-spacing:.5px">AI ADVIES</div>
      <div id="advTxt" style="font-size:15px;color:#333;line-height:1.6">${d.count>0?'Klik voor een analyse van dit dossier.':'Voeg eerst entries toe voor advies.'}</div>
      ${d.count>0?`<button class="aa r" style="margin-top:14px" onclick="genAdvies('${name}')">Genereer advies</button>`:''}
    </div>`;
  }
}

async function genAdvies(name){
  if(!S.apiKey){toast('⚠️ Eerst API key instellen!');return;}
  var box=document.getElementById('advTxt');if(box)box.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  var d=S.pdata[name]||{props:{...DP}};
  var msgs=await loadMsgs(name);
  var ctx=msgs.slice(-10).filter(m=>m.role==='user').map(m=>m.html.replace(/<[^>]*>/g,' ').trim()).join('\n');
  var sys=`Je bent DateSensei, empathische AI dating coach. Analyseer dossier "${name}" en geef concreet eerlijk advies. Nederlands. Max 5 zinnen, 2 concrete actiestappen.`;
  try{
    var t=await callAPI(sys,[{role:'user',content:`Dossier: ${name}\nEigenschappen: ${JSON.stringify(d.props)}\nRecente entries:\n${ctx||'Geen entries.'}`}],600);
    if(box)box.innerHTML=t.replace(/\n/g,'<br>');
  }catch(x){if(box)box.innerHTML='<span style="color:red">Fout: '+x.message+'</span>';}
}

async function resetOwnProps(){
  if(!confirm('Reset alle eigenschappen naar 0%? Je ingevulde categorieën blijven bewaard.'))return;
  var d=S.pdata['OWN Sense']||{props:{...DP},count:0,categories:{}};
  PK.forEach(k=>{d.props[k]=0;});
  S.pdata['OWN Sense']=d;
  await saveP('OWN Sense',d.props,d.count,d.categories);
  toast('↺ Eigenschappen gereset naar 0%');
  // Herlaad tab
  await loadTab('OWN Sense',S.viewTab,d);
}

  var el=document.getElementById('cc-'+catId);
  if(!el)return;
  el.classList.toggle('open');
  if(el.classList.contains('open'))el.querySelectorAll('.own-ta').forEach(ta=>autoResize(ta));
}

async function saveContactCat(dosName,catId){
  var d=S.pdata[dosName]||{props:{...DP},count:0,categories:{}};
  if(!d.categories)d.categories={};
  var CONTACT_CATS_IDS=['karakter_contact','patronen_contact','gevoel_contact'];
  // Verzamel antwoorden voor dit catId
  var answers={};
  var ta0=document.getElementById('cc-'+catId+'-a0');
  var ta1=document.getElementById('cc-'+catId+'-a1');
  var ta2=document.getElementById('cc-'+catId+'-a2');
  if(ta0)answers['a0']=ta0.value.trim();
  if(ta1)answers['a1']=ta1.value.trim();
  if(ta2)answers['a2']=ta2.value.trim();
  d.categories[catId]=answers;
  S.pdata[dosName]=d;
  await saveP(dosName,d.props,d.count,d.categories);
  // Update progress indicator
  var filled=Object.values(answers).filter(v=>v.length>0).length;
  var catEl=document.getElementById('cc-'+catId);
  if(catEl){
    var progEl=catEl.querySelector('.own-cat-prog');
    if(progEl){progEl.textContent=filled+'/3 vragen beantwoord'+(filled===3?' ✓':'');progEl.className='own-cat-prog'+(filled===3?' done':'');}
    if(filled>0)catEl.classList.add('filled');
  }
  toast('💾 Opgeslagen — eigenschappen worden bijgewerkt...');
  // Automatisch herberekenen op de achtergrond
  herbereken(dosName);
}

async function herbereken(dosName,silent=true){
  if(!S.apiKey)return;  // Geen API key? Stilletjes skippen
  if(!silent)toast('⏳ Eigenschappen berekenen...');
  var d=S.pdata[dosName]||{props:{...DP},count:0,categories:{}};
  var cats=d.categories||{};

  // Verzamel alle manuele invoer
  var manualText='';
  Object.entries(cats).forEach(([catId,answers])=>{
    Object.values(answers).forEach(v=>{if(v&&v.trim())manualText+=v.trim()+' ';});
  });

  // Verzamel opgeslagen berichten
  var msgs=await loadMsgs(dosName);
  var msgText=msgs.slice(-20).filter(m=>m.role==='user').map(m=>m.html.replace(/<[^>]*>/g,' ').trim()).join(' ');

  var combinedContext=(manualText+' '+msgText).trim();
  if(!combinedContext){toast('Voeg eerst info toe via de invulvakjes of via Vertel.');return;}

  var sys=`Je bent DateSensei. Analyseer alles wat beschikbaar is over "${dosName.replace('Sense','')}" en schat de 5 eigenschappen in.
Gebruik 0 als er werkelijk geen info is voor een eigenschap.
Geef ENKEL geldig JSON (geen markdown):
{"gevoeligheid":X,"openheid":X,"humor":X,"directheid":X,"avontuur":X}
Elk getal 0-100.`;

  try{
    var raw=await callAPI(sys,[{role:'user',content:combinedContext}],200);
    var clean=raw.replace(/```json|```/g,'').trim();
    var updates=JSON.parse(clean);
    PK.forEach(k=>{
      if(updates[k]!==undefined&&updates[k]!==null){
        var v=Math.min(100,Math.max(0,parseInt(updates[k])));
        if(!isNaN(v))d.props[k]=v;
      }
    });
    d.props._v=1;
    S.pdata[dosName]=d;
    await saveP(dosName,d.props,d.count,d.categories);
    if(!silent)toast('✅ Eigenschappen bijgewerkt!');
    // Herlaad overzicht tab als het zichtbaar is
    if(S.screen==='dossier'&&S.viewDossier===dosName&&S.viewTab==='overzicht'){
      await loadTab(dosName,'overzicht',d);
    }
  }catch(x){if(!silent)toast('Fout: '+x.message);}
}

async function callAPI(sys,msgs,maxTok){
  var res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok||800,system:sys,messages:msgs})
  });
  var data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return(data.content&&data.content[0]&&data.content[0].text)||'';
}

function dossierSegClass(dosName){
  var all=['OWN Sense',...S.profiles.filter(p=>p!=='OWN Sense')];
  var i=all.indexOf(dosName);
  return SEG_COLORS[i>=0?i%SEG_COLORS.length:0];
}

// ══ Segment Modal ════════════════════════════════════════════════
function openSegModal(idx){
  _segModalIdx=idx;
  var segs=window._pendingSegmenten;
  if(!segs||idx<0||idx>=segs.length)return;
  var seg=segs[idx];

  document.getElementById('segModalQuote').textContent='"'+seg.tekst+'"';

  var allDossiers=['OWN Sense',...S.profiles.filter(p=>p!=='OWN Sense')];
  var optsHtml='<div class="seg-modal-grid">';

  // Dossier opties — grid met gekleurde linker borders
  window._modalDossiers=allDossiers;
  allDossiers.forEach(function(p,i){
    var col=SEG_DOT_COLORS[i%SEG_DOT_COLORS.length];
    var isActive=!seg.negeer&&seg.dossier===p;
    optsHtml+='<button class="seg-modal-btn'+(isActive?' active':'')+'" style="border-left-color:'+col+'" onclick="selectSegOptByIdx('+i+')">';
    optsHtml+='<span style="flex:1">'+dn(p)+'</span>';
    if(isActive)optsHtml+='<span class="seg-modal-check">✓</span>';
    optsHtml+='</button>';
  });

  // Negeren optie
  optsHtml+='<button class="seg-modal-btn negeer-btn'+(seg.negeer?' active':'')+'" onclick="selectSegOptByIdx(-1)">';
  optsHtml+='<span style="flex:1">🚫 Negeren</span>';
  if(seg.negeer)optsHtml+='<span class="seg-modal-check">✓</span>';
  optsHtml+='</button>';

  optsHtml+='</div>';

  document.getElementById('segModalOpts').innerHTML=optsHtml;
  document.getElementById('segModal').classList.add('show');
}

function closeSegModal(){
  document.getElementById('segModal').classList.remove('show');
  _segModalIdx=-1;
}

function selectSegOptByIdx(i){
  if(i===-1){selectSegOpt('NEGEER');return;}
  var dos=(window._modalDossiers||[])[i];
  if(dos)selectSegOpt(dos);
}

function selectSegOpt(dossier){
  var segs=window._pendingSegmenten;
  if(!segs||_segModalIdx<0)return;

  if(dossier==='NEGEER'){
    segs[_segModalIdx].negeer=true;
    segs[_segModalIdx].dossier=segs[_segModalIdx].dossier||'OWN Sense';
  } else {
    segs[_segModalIdx].negeer=false;
    segs[_segModalIdx].dossier=dossier;
  }

  closeSegModal();
  // Herrender segmenten
  rerenderSegmenten();
  toast('✏️ Gewijzigd');
}

function rerenderSegmenten(){
  // Herrender de gekleurde tekst sectie na aanpassing
  var segs=window._pendingSegmenten;
  if(!segs)return;
  var wrapEl=document.querySelector('.seg-text-wrap');
  if(!wrapEl)return;
  var newHtml='';
  segs.forEach(function(seg,idx){
    var cls=seg.negeer?'seg-unk seg negeer':(dossierSegClass(seg.dossier)+' seg');
    newHtml+='<span class="'+cls+'" data-idx="'+idx+'" onclick="openSegModal('+idx+')">'+seg.tekst+'</span> ';
  });
  wrapEl.innerHTML=newHtml;

  // Update kaartjes
  var telPerDossier={};
  segs.forEach(function(seg){
    if(!seg.negeer)telPerDossier[seg.dossier]=(telPerDossier[seg.dossier]||0)+1;
  });
  var cardsEl=document.querySelector('.dossier-cards');
  if(cardsEl){
    var cardsHtml='';
    Object.entries(telPerDossier).forEach(function(entry){
      var d=entry[0],cnt=entry[1];
      var col=dossierColor(d);
      cardsHtml+='<div class="dossier-card" style="border-color:'+col+'">';
      cardsHtml+='<div class="dossier-card-num" style="color:'+col+'">'+cnt+'</div>';
      cardsHtml+='<div class="dossier-card-lbl">'+dn(d)+'</div>';
      cardsHtml+='</div>';
    });
    cardsEl.innerHTML=cardsHtml;
  }
}

// ══ Verstuur bericht ══════════════════════════════════════════════
async function sendMsg(){
  if(S.busy)return;
  if(!S.apiKey){toast('⚠️ Eerst API key instellen via ⚙️');return;}
  var inp=document.getElementById('msgInput');
  var txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';S.busy=true;

  addMsg('user',txt);
  showT();

  var dossierLijst=S.profiles.join(', ');

  var sys=`Je bent DateSensei, een empathische AI dating coach. De gebruiker heeft de volgende dossiers: ${dossierLijst}.

Analyseer de input en splits in segmenten. Elk segment hoort bij:
- "OWN Sense": over de gebruiker zelf
- Een bestaand dossier (bv. "EliseSense"): over die persoon
- "NIEUW:Naam": nieuwe naam zonder dossier

Geef ENKEL geldig JSON terug (geen markdown, geen uitleg):
{
  "segmenten": [
    {"tekst":"stuk tekst","dossier":"OWN Sense of DossierNaam of NIEUW:Naam","type":"gevoel/feit/patroon"}
  ],
  "nieuwe_namen": ["Naam1"],
  "reactie": "korte empathische reactie in het Nederlands (max 2 zinnen)"
}`;

  try{
    var raw=await callAPI(sys,[{role:'user',content:txt}],1000);
    var clean=raw.replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(clean);
    hideT();

    // Verwerk nieuwe namen
    for(var naam of (parsed.nieuwe_namen||[])){
      var nm=naam.endsWith('Sense')?naam:naam+'Sense';
      await ensureP(nm);
    }

    // Bouw gekleurde segmenten
    var allDossiers=['OWN Sense',...S.profiles.filter(p=>p!=='OWN Sense')];
    var dossierKleur={};
    allDossiers.forEach((p,i)=>{dossierKleur[p]=SEG_COLORS[i%SEG_COLORS.length];});
    (parsed.nieuwe_namen||[]).forEach((n,i)=>{
      var nm=n.endsWith('Sense')?n:n+'Sense';
      dossierKleur[nm]=SEG_COLORS[(allDossiers.length+i)%SEG_COLORS.length];
    });

    // Sla pending op
    window._pendingSegmenten=parsed.segmenten.map(seg=>{
      var doss=seg.dossier;
      if(doss.startsWith('NIEUW:'))doss=doss.replace('NIEUW:','').trim();
      if(!doss.endsWith('Sense')&&doss!=='OWN Sense')doss=doss+'Sense';
      return{...seg,dossier:doss,negeer:false};
    });

    window._pendingNieuwe=[];
    // Bouw gekleurde tekst
    var segHtml='<div class="seg-text-wrap">';
    window._pendingSegmenten.forEach(function(seg,idx){
      var cls=dossierKleur[seg.dossier]||'seg-unk';
      segHtml+='<span class="seg '+cls+'" data-idx="'+idx+'" onclick="openSegModal('+idx+')">'+seg.tekst+'</span> ';
    });
    segHtml+='</div>';

    // Tel segmenten per dossier
    var telPerDossier={};
    window._pendingSegmenten.forEach(function(seg){
      if(!seg.negeer)telPerDossier[seg.dossier]=(telPerDossier[seg.dossier]||0)+1;
    });

    // Samenvatting kaartjes
    var cardsHtml='<div class="dossier-cards">';
    Object.entries(telPerDossier).forEach(function(entry){
      var d=entry[0],cnt=entry[1];
      var col=dossierColor(d);
      cardsHtml+='<div class="dossier-card" style="border-color:'+col+'">';
      cardsHtml+='<div class="dossier-card-num" style="color:'+col+'">'+cnt+'</div>';
      cardsHtml+='<div class="dossier-card-lbl">'+dn(d)+'</div>';
      cardsHtml+='</div>';
    });
    // Onbekenden apart als er nieuwe namen zijn
    var nieuweCount=(parsed.nieuwe_namen||[]).length;
    if(nieuweCount){
      cardsHtml+='<div class="dossier-card" style="border-color:#bbb">';
      cardsHtml+='<div class="dossier-card-num" style="color:#888">'+nieuweCount+'</div>';
      cardsHtml+='<div class="dossier-card-lbl">Onbekend'+(nieuweCount>1?'en':'')+'</div>';
      cardsHtml+='</div>';
    }
    cardsHtml+='</div>';

    // Nieuwe personen: Toevoegen / Negeren per persoon
    var nieuwHtml='';
    if(nieuweCount){
      nieuwHtml='<div class="nieuw-box">';
      nieuwHtml+='<div class="nieuw-box-title">👥 Onbekenden gevonden:</div>';
      (parsed.nieuwe_namen||[]).forEach(function(naam){
        var nm=naam.endsWith('Sense')?naam:naam+'Sense';
        // Zoek relevante segmenten voor deze persoon
        var segsVoorNaam=window._pendingSegmenten.filter(function(s){return s.dossier===nm;});
        var quote=segsVoorNaam.length?'"'+segsVoorNaam[0].tekst+'"':'';
        nieuwHtml+='<div class="nieuw-person" id="nieuw-'+nm+'">';
        if(quote)nieuwHtml+='<div class="nieuw-person-quote">'+quote+'</div>';
        nieuwHtml+='<div style="font-size:14px;font-weight:700;margin-bottom:8px">'+naam+' — nieuwe dossier aanmaken?</div>';
        var nmIdx=window._pendingNieuwe=window._pendingNieuwe||[];
        window._pendingNieuwe.push(nm);
        var ni=window._pendingNieuwe.length-1;
        nieuwHtml+='<div class="nieuw-btns">';
        nieuwHtml+='<button class="btn-toevoegen" onclick="bevestigNieuweIdx('+ni+',true)">+ Toevoegen</button>';
        nieuwHtml+='<button class="btn-negeer-p" onclick="bevestigNieuweIdx('+ni+',false)">🚫 Negeren</button>';
        nieuwHtml+='</div></div>';
      });
      nieuwHtml+='</div>';
    }

    // Actieknoppen
    var actiesHtml='<div class="result-actions">';
    actiesHtml+='<button class="btn-voeg-alles" onclick="bevestigAlles()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>Voeg alles toe</button>';
    actiesHtml+='<button class="btn-hoe-werkt" onclick="toonHoeWerktDit()">? Hoe werkt dit</button>';
    actiesHtml+='</div>';

    var resultHtml='<div class="ai-result-box">'
      +'<div class="ai-result-header">✨ Klik op gekleurde tekst om aan te passen</div>'
      +segHtml
      +cardsHtml
      +nieuwHtml
      +actiesHtml
      +'</div>';

    addMsg('ai',parsed.reactie+'<br>'+resultHtml);

  }catch(x){
    hideT();
    addMsg('ai','Er ging iets mis: '+x.message);
    console.error(x);
  }
  S.busy=false;
}

// ══ Bevestig & Opslaan ════════════════════════════════════════════
async function bevestigAlles(){
  var segs=window._pendingSegmenten;
  if(!segs){toast('Niets te bevestigen');return;}

  // Filter negeer-segmenten
  var teOpslaan=segs.filter(s=>!s.negeer);
  var genegeerd=segs.filter(s=>s.negeer);

  if(!teOpslaan.length){
    toast('Alles als niet-relevant gemarkeerd — niets opgeslagen.');
    window._pendingSegmenten=null;
    return;
  }

  // Groepeer per dossier
  var perDossier={};
  teOpslaan.forEach(seg=>{
    if(!perDossier[seg.dossier])perDossier[seg.dossier]=[];
    perDossier[seg.dossier].push(seg.tekst);
  });

  // Sla op per dossier
  for(var [dossier,teksten] of Object.entries(perDossier)){
    await ensureP(dossier);
    var samengevat=teksten.join(' ');
    await saveMsg(dossier,'user',samengevat);

    var pd=S.pdata[dossier]||{props:{...DP},count:0,categories:{}};
    pd.count=(pd.count||0)+1;
    S.pdata[dossier]=pd;

    if(dossier==='OWN Sense'){
      await updateEigenschappenAI(dossier,samengevat);
    } else {
      await saveP(dossier,pd.props,pd.count,pd.categories);
      // Automatisch eigenschappen herberekenen op de achtergrond
      herbereken(dossier);
    }
  }

  window._pendingSegmenten=null;

  // Toon bevestiging
  var html='<div class="saved-confirm">';
  html+='<div class="saved-confirm-title">✅ Opgeslagen!</div>';
  Object.entries(perDossier).forEach(function(entry){
    var doss=entry[0], teksten=entry[1];
    var col=dossierColor(doss);
    html+='<div class="saved-row"><div class="saved-dot" style="background:'+col+'"></div>';
    html+='<span><strong>'+dn(doss)+'</strong> — '+teksten.length+' fragment'+(teksten.length>1?'s':'')+' opgeslagen</span></div>';
  });
  if(genegeerd.length){
    html+='<div style="font-size:13px;color:#aaa;margin-top:6px">'+genegeerd.length+' stukje'+(genegeerd.length>1?'s':'')+' genegeerd</div>';
  }
  html+='<div class="ai-actions" style="margin-top:12px">';
  html+='<button class="aa r" onclick="askAdviceNow()">💡 Advies</button>';
  html+='<button class="aa g" onclick="clearChat()">🔄 Nieuw gesprek</button>';
  html+='</div></div>';

  addMsg('ai',html);
  toast('✅ Opgeslagen in '+(Object.keys(perDossier).length)+' dossier(s)!');
  rDrawer(); // refresh badges
}

// Nieuwe persoon toevoegen of negeren
function bevestigNieuweIdx(idx,toevoegen){
  var dosName=(window._pendingNieuwe||[])[idx];
  if(dosName)bevestigNieuwe(dosName,toevoegen);
}

async function bevestigNieuwe(dosName,toevoegen){
  var box=document.getElementById('nieuw-'+dosName);
  if(toevoegen){
    // Dossier is al aangemaakt in ensureP tijdens sendMsg
    if(box){
      box.innerHTML='<div style="font-size:14px;color:#2E7D32;font-weight:600">✓ '+dn(dosName)+' toegevoegd aan je Senses</div>';
    }
  } else {
    // Negeer alle segmenten voor dit dossier
    if(window._pendingSegmenten){
      window._pendingSegmenten.forEach(function(seg){
        if(seg.dossier===dosName)seg.negeer=true;
      });
    }
    if(box){
      box.innerHTML='<div style="font-size:14px;color:#888">↷ '+dn(dosName)+' genegeerd</div>';
    }
  }
}

function toonHoeWerktDit(){
  var ca=document.getElementById('chatArea');if(!ca)return;
  var d=document.createElement('div');d.className='msg-ai';
  d.innerHTML='<div class="bbl-ai"><div class="sndr">DATESENSE</div>De gekleurde stukjes tonen wie iets over jou zegt of over wie het gaat. Tik op een stukje om het naar een ander dossier te verplaatsen of te negeren. Daarna tik je op <strong>Voeg alles toe</strong>.</div>';
  ca.appendChild(d);ca.scrollTop=ca.scrollHeight;
}

// Wis de chat na opslaan (voor een verse start)
function clearChat(){
  S.vertelMsgs=[];
  window._pendingSegmenten=null;
  var ca=document.getElementById('chatArea');
  if(!ca)return;
  ca.innerHTML='';
  var d=document.createElement('div');d.className='msg-ai';
  d.innerHTML='<div class="bbl-ai"><div class="sndr">DATESENSE</div>Klaar voor het volgende! Wat speelt er?</div>';
  ca.appendChild(d);
  // Welkomstbericht ook in S.vertelMsgs zetten
  S.vertelMsgs.push({role:'ai',html:'Klaar voor het volgende! Wat speelt er?'});
}

async function updateEigenschappenAI(dossier,tekst){
  if(!S.apiKey)return;
  var pd=S.pdata[dossier]||{props:{...DP},count:0,categories:{}};
  var sys=`Je bent DateSensei. Analyseer deze tekst en update de eigenschappen ENKEL als de tekst daar aanleiding toe geeft.
Huidig: ${JSON.stringify(pd.props)}.
Geef ENKEL geldig JSON: {"gevoeligheid":null,"openheid":null,"humor":null,"directheid":null,"avontuur":null}
null = geen update. Wees conservatief — gebruik kleine stapsgewijze aanpassingen.`;
  try{
    var raw=await callAPI(sys,[{role:'user',content:tekst}],200);
    var clean=raw.replace(/```json|```/g,'').trim();
    var updates=JSON.parse(clean);
    PK.forEach(k=>{
      if(updates[k]!==null&&updates[k]!==undefined){
        var v=Math.min(100,Math.max(0,parseInt(updates[k])));
        if(!isNaN(v))pd.props[k]=v;
      }
    });
    await saveP(dossier,pd.props,pd.count,pd.categories);
  }catch(x){
    await saveP(dossier,pd.props,pd.count,pd.categories);
  }
}

async function askAdviceNow(){
  if(!S.apiKey||S.busy)return;S.busy=true;
  showT();
  // Gebruik recent opgeslagen entries als context
  var allCtx='';
  for(var p of S.profiles){
    var msgs=await loadMsgs(p);
    var recent=msgs.slice(-3).filter(m=>m.role==='user').map(m=>m.html.replace(/<[^>]*>/g,' ').trim()).join(' ');
    if(recent)allCtx+=`[${p}]: ${recent}\n`;
  }
  var sys='Je bent DateSensei, empathische AI dating coach. Geef concreet eerlijk advies op basis van de recente input. Max 3-4 zinnen, 2 actiestappen. Warm maar direct. Nederlands.';
  try{
    var t=await callAPI(sys,[{role:'user',content:allCtx||'Geen recente data.'}],500);
    hideT();
    addMsg('ai',`<span style="font-size:11px;font-weight:700;color:var(--r);letter-spacing:.8px">ADVIES</span><br><br>${t.replace(/\n/g,'<br>')}`);
  }catch(x){hideT();addMsg('ai','Fout: '+x.message);}
  S.busy=false;
}

// ══ Microfoon (speech-to-text) ════════════════════════════════════
var _recognition=null;
var _micActive=false;

function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    toast('Spraakherkenning niet beschikbaar in deze browser');return;
  }
  if(_micActive){stopMic();return;}
  startMic();
}

function startMic(){
  var SRClass=window.SpeechRecognition||window.webkitSpeechRecognition;
  _recognition=new SRClass();
  _recognition.lang='nl-NL';
  _recognition.continuous=true;
  _recognition.interimResults=true;
  var inp=document.getElementById('msgInput');
  var finalText=inp.value;

  _recognition.onresult=function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){finalText+=e.results[i][0].transcript+' ';}
      else interim+=e.results[i][0].transcript;
    }
    inp.value=finalText+interim;
    autoResize(inp);
  };
  _recognition.onerror=function(){stopMic();};
  _recognition.onend=function(){stopMic();};
  _recognition.start();
  _micActive=true;
  var btn=document.getElementById('micBtn');
  if(btn)btn.style.background='#CC0000';
  toast('🎤 Luisteren...');
}

function stopMic(){
  if(_recognition)_recognition.stop();
  _micActive=false;
  var btn=document.getElementById('micBtn');
  if(btn)btn.style.background='var(--r)';
}

// ══ Init ══════════════════════════════════════════════════════════
init();
